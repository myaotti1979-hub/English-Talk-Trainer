<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f0f4f8">
<title>English Talk Trainer</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon-180.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon-180.png">
<link rel="apple-touch-icon" sizes="167x167" href="apple-touch-icon-167.png">
<link rel="apple-touch-icon" sizes="152x152" href="apple-touch-icon-152.png">
<link rel="apple-touch-icon" sizes="120x120" href="apple-touch-icon-120.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f0f4f8;--surface:#ffffff;--card:#ffffff;--border:#d1d9e6;
  --text:#1a2a3a;--muted:#5a6a7a;--accent:#4f46e5;--accent2:#6d5cdb;
  --green:#059669;--yellow:#b45309;--red:#dc2626;--blue:#2563eb;
  --orange:#c2410c;
  --font:'Outfit',system-ui,-apple-system,sans-serif;
  --mono:'JetBrains Mono','SF Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow-x:hidden;-webkit-tap-highlight-color:transparent;font-size:16px}
#app{max-width:520px;margin:0 auto;padding:16px;min-height:100vh;position:relative}

/* ── Buttons ── */
.btn{padding:14px 24px;border:none;border-radius:12px;font-family:var(--font);font-weight:600;font-size:16px;cursor:pointer;touch-action:manipulation;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(79,70,229,.25)}
.btn-primary:active{transform:scale(.97);filter:brightness(1.1)}
.btn-secondary{background:var(--surface);color:var(--text);border:1.5px solid var(--border)}
.btn-secondary:active{background:var(--bg)}
.btn-ghost{background:transparent;color:var(--muted);padding:10px 14px;font-size:15px}
.btn-ghost:active{color:var(--text)}
.btn-danger{background:#fef2f2;color:var(--red);border:1.5px solid #fecaca}
.btn:disabled{opacity:.4;pointer-events:none}

/* ── Cards ── */
.card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.card-glow{box-shadow:0 2px 16px rgba(79,70,229,.1)}

/* ── Inputs ── */
.input{width:100%;padding:14px 16px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font);font-size:16px;outline:none;transition:border .2s}
.input:focus{border-color:var(--accent)}
.input::placeholder{color:#8a9ab0}

/* ── Tags / Badges ── */
.tag{display:inline-block;padding:4px 10px;border-radius:20px;font-size:13px;font-weight:600;letter-spacing:.3px}
.tag-accent{background:#ede9fe;color:var(--accent)}
.tag-green{background:#d1fae5;color:var(--green)}
.tag-orange{background:#ffedd5;color:var(--orange)}

/* ── Home Screen ── */
.home-header{text-align:center;padding:36px 0 28px}
.home-header .pre{font-size:13px;font-weight:600;letter-spacing:3px;color:var(--accent);margin-bottom:8px;text-transform:uppercase}
.home-header h1{font-size:30px;font-weight:800;color:var(--text);margin-bottom:6px}
.home-header .sub{font-size:15px;color:var(--muted);font-weight:400}

.mode-card{position:relative;padding:24px;border-radius:20px;cursor:pointer;transition:all .25s;overflow:hidden;touch-action:manipulation}
.mode-card:active{transform:scale(.98)}
.mode-card .icon{font-size:36px;margin-bottom:12px}
.mode-card h3{font-size:20px;font-weight:700;margin-bottom:6px}
.mode-card p{font-size:15px;color:var(--muted);line-height:1.6}
.mode-card .arrow{position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:22px;color:var(--muted);transition:transform .2s}
.mode-card:active .arrow{transform:translateY(-50%) translateX(4px)}

.mode-freetalk{background:#ede9fe;border:1.5px solid #c4b5fd;color:#3b2e8a}
.mode-freetalk h3{color:#3b2e8a}
.mode-flash{background:#d1fae5;border:1.5px solid #86efac;color:#065f46}
.mode-flash h3{color:#065f46}

/* ── Chat UI ── */
.chat-area{display:flex;flex-direction:column;gap:12px;padding-bottom:110px;min-height:60vh}
.msg{max-width:85%;padding:16px 20px;border-radius:18px;font-size:16px;line-height:1.7;animation:msgIn .3s ease}
.msg-ai{background:var(--surface);border:1.5px solid var(--border);border-bottom-left-radius:4px;align-self:flex-start;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.msg-user{background:var(--accent);color:#fff;border-bottom-right-radius:4px;align-self:flex-end;box-shadow:0 1px 3px rgba(79,70,229,.2)}
.msg-system{align-self:center;background:#ede9fe;border:1.5px solid #c4b5fd;color:#4f46e5;font-size:14px;padding:10px 18px;border-radius:20px;text-align:center;font-weight:600}
.msg-feedback{background:#f0fdf4;border:1.5px solid #86efac;border-radius:14px;padding:18px;align-self:stretch;font-size:15px;line-height:1.7}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.chat-input-bar{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(transparent,var(--bg) 20%);padding:12px 16px 20px;z-index:100}
.chat-input-bar .inner{max-width:520px;margin:0 auto;display:flex;gap:8px;align-items:center}
.chat-input-bar .inner .input{flex:1;border-radius:24px;padding:14px 20px;background:var(--surface);font-size:16px}
.turn-indicator{max-width:520px;margin:0 auto 6px;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;text-align:center}
.turn-ai{background:#e0e7ff;color:#4338ca}
.turn-you{background:#d1fae5;color:#065f46}

/* ── Mic Button ── */
.mic-btn{width:64px;height:64px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:28px;transition:all .1s;touch-action:manipulation;flex-shrink:0;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
.mic-btn.idle{background:var(--surface);border:2.5px solid var(--border);color:var(--muted)}
.mic-btn.idle:active{background:var(--border);transform:scale(.88)}
.mic-btn.recording{background:var(--red);color:#fff;animation:pulse 1.2s infinite;border:3px solid #fca5a5;box-shadow:0 0 20px rgba(220,38,38,.4)}
.mic-btn.recording:active{transform:scale(.88);animation:none}
.mic-btn.processing{background:#e0e7ff;color:var(--accent);border:2.5px solid var(--accent);cursor:wait;opacity:.8}
.mic-btn.processing{background:var(--surface);border:2px solid var(--accent);color:var(--accent);animation:spin 1s linear infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.3)}50%{box-shadow:0 0 0 14px rgba(220,38,38,0)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* ── Flash Translation ── */
.flash-card{text-align:center;padding:32px 24px}
.flash-ja{font-size:24px;font-weight:700;margin-bottom:10px;line-height:1.5;color:var(--text)}
.flash-hint{font-size:14px;color:var(--muted);margin-bottom:24px}
.flash-answer{font-size:17px;padding:18px;background:var(--bg);border-radius:12px;margin-top:16px;border:1.5px solid var(--border);line-height:1.7;text-align:left}
.flash-answer .correct{color:var(--green);font-weight:600}
.flash-answer .wrong{color:var(--red);text-decoration:line-through}
.flash-result{display:flex;gap:12px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.flash-score{text-align:center;padding:12px 16px}
.flash-score .num{font-size:30px;font-weight:800}
.flash-score .label{font-size:13px;color:var(--muted);margin-top:2px}

/* ── Progress Bar ── */
.progress-bar{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin:12px 0}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .3s}

/* ── Session Summary ── */
.summary-header{text-align:center;padding:24px 0}
.summary-header .score{font-size:52px;font-weight:800;color:var(--accent)}
.summary-header .label{font-size:16px;color:var(--muted);margin-top:4px}

/* ── Loading / Typing ── */
.typing{display:flex;gap:5px;padding:16px;align-self:flex-start}
.typing span{width:10px;height:10px;background:#94a3b8;border-radius:50%;animation:typing .8s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes typing{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#c1cad6;border-radius:3px}

/* ── Misc ── */
.divider{height:1px;background:var(--border);margin:16px 0}
.text-sm{font-size:15px}.text-xs{font-size:13px}
.text-muted{color:var(--muted)}
.text-green{color:var(--green)}
.text-red{color:var(--red)}
.text-accent{color:var(--accent)}
.mt-8{margin-top:8px}.mt-16{margin-top:16px}.mt-24{margin-top:24px}
.mb-8{margin-bottom:8px}.mb-16{margin-bottom:16px}
.flex{display:flex}.gap-8{gap:8px}.gap-12{gap:12px}
.items-center{align-items:center}.justify-between{justify-content:space-between}
.w-full{width:100%}
.hidden{display:none!important}

/* ── Topic Pills ── */
.topic-grid{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
.topic-pill{padding:10px 18px;border-radius:20px;background:var(--bg);border:1.5px solid var(--border);color:var(--text);font-size:15px;cursor:pointer;transition:all .2s;touch-action:manipulation}
.topic-pill:active{background:var(--accent);border-color:var(--accent);color:#fff}
.topic-pill.selected{background:#ede9fe;border-color:var(--accent);color:var(--accent);font-weight:600}

/* ── Word Score Colors ── */
.ws-great{color:var(--green)}.ws-good{color:var(--yellow)}.ws-poor{color:var(--red)}

/* ── Settings Row ── */
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border)}
.setting-row:last-child{border-bottom:none}
.setting-label{font-size:16px;font-weight:500}
.setting-value{font-size:15px;color:var(--muted)}

/* ── Navbar ── */
.navbar{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.navbar .back{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;padding:6px;touch-action:manipulation}
.navbar .title{font-size:18px;font-weight:700;flex:1;color:var(--text)}
.navbar .action{background:none;border:none;color:var(--accent);font-size:15px;font-weight:700;cursor:pointer;touch-action:manipulation}

/* ── Level Select ── */
.level-select{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
.level-chip{padding:10px 14px;text-align:center;border-radius:10px;background:var(--bg);border:1.5px solid var(--border);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;touch-action:manipulation;color:var(--text)}
.level-chip.active{background:#ede9fe;border-color:var(--accent);color:var(--accent)}

/* ── Stats Grid ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}
.stat-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.stat-card .val{font-size:28px;font-weight:700}
.stat-card .lbl{font-size:13px;color:var(--muted);margin-top:4px}


/* ── Streak Calendar ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin:8px 0}
.cal-day{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
.cal-day.empty{background:transparent}
.cal-day.no{background:var(--bg);color:var(--muted)}
.cal-day.yes{background:#d1fae5;color:var(--green)}
.cal-day.today{border:2px solid var(--accent)}
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.streak-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;background:linear-gradient(135deg,#fef3c7,#fde68a);color:#92400e;font-weight:700;font-size:14px}

/* ── Waveform ── */
.waveform{display:flex;align-items:center;justify-content:center;gap:3px;height:40px;margin:8px 0}
.waveform .bar{width:4px;background:var(--red);border-radius:2px;transition:height .05s;min-height:4px}

/* ── Shadowing ── */
.shadow-card{text-align:center;padding:28px 20px}
.shadow-text{font-size:20px;font-weight:600;line-height:1.7;margin:20px 0;color:var(--text)}
.shadow-status{font-size:14px;color:var(--muted);margin-bottom:16px}
.mode-shadow{background:#fef3c7;border:1.5px solid #fde68a;color:#78350f}
.mode-shadow h3{color:#78350f}

/* ── Vocab Notebook ── */
.vocab-entry{padding:12px 0;border-bottom:1px solid var(--border)}
.vocab-en{font-size:16px;font-weight:600;color:var(--accent)}
.vocab-ja{font-size:14px;color:var(--muted);margin-top:2px}
.vocab-ctx{font-size:12px;color:var(--muted);font-style:italic;margin-top:4px}

/* ── Challenge Expressions ── */
.challenge-card{background:linear-gradient(135deg,#ede9fe,#ddd6fe);border:2px solid #c4b5fd;border-radius:16px;padding:20px;margin-bottom:12px;align-self:stretch}
.challenge-title{font-size:16px;font-weight:700;color:#3b2e8a;margin-bottom:12px}
.challenge-expr{padding:10px 14px;margin:6px 0;background:rgba(255,255,255,.6);border-radius:10px;border:1px solid #c4b5fd}
.challenge-expr .expr-en{font-size:17px;font-weight:700;color:#3b2e8a}
.challenge-expr .expr-ja{font-size:14px;color:#5b4e9a;margin-top:2px}
.challenge-expr .expr-ex{font-size:12px;color:#7c6fbf;margin-top:4px;font-style:italic}
.challenge-expr.used{background:rgba(5,150,105,.1);border-color:var(--green)}
.challenge-expr.used .expr-en{color:var(--green);text-decoration:line-through}

/* ── Review Quiz ── */
.review-prompt{background:#fef3c7;border:1.5px solid #fde68a;border-radius:14px;padding:16px;margin-bottom:14px;cursor:pointer;touch-action:manipulation}
.review-prompt:active{transform:scale(.98)}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ═══════════════════════════════════════════════
   English Talk Trainer
   フリートーク + 瞬間英作文
   Gemini 2.5 Flash + Azure Speech + PWA
   ═══════════════════════════════════════════════ */

const VERSION = "v2026.05.08a";

const $ = id => document.getElementById(id);
const app = document.getElementById("app");
const GEMINI_MODELS = [
  { id: "gemini-3.1-flash-lite", label: "3.1 Flash-Lite（最速・無料枠あり）", inPrice: 0.25, outPrice: 1.50 },
  { id: "gemini-2.5-flash", label: "2.5 Flash（安定版）", inPrice: 0.30, outPrice: 2.50 },
  { id: "gemini-3-flash-preview", label: "3 Flash（高推論）", inPrice: 0.50, outPrice: 3.00 },
  { id: "gemini-2.5-pro", label: "2.5 Pro（最高精度）", inPrice: 1.25, outPrice: 10.00 },
];
let GEMINI_MODEL = localStorage.getItem("gemini_model") || "gemini-3.1-flash-lite";

// ── Azure TTS Neural Voices ──
const TTS_VOICES = [
  { id: "en-US-JennyNeural",   label: "👩 Jenny",   desc: "🇺🇸 アメリカ女性・フレンドリー", lang: "en-US" },
  { id: "en-US-GuyNeural",     label: "👨 Guy",     desc: "🇺🇸 アメリカ男性・落ち着き", lang: "en-US" },
  { id: "en-US-AriaNeural",    label: "👩 Aria",    desc: "🇺🇸 アメリカ女性・明るい", lang: "en-US" },
  { id: "en-US-DavisNeural",   label: "👨 Davis",   desc: "🇺🇸 アメリカ男性・カジュアル", lang: "en-US" },
  { id: "en-GB-SoniaNeural",   label: "👩 Sonia",   desc: "🇬🇧 イギリス女性", lang: "en-GB" },
  { id: "en-GB-RyanNeural",    label: "👨 Ryan",    desc: "🇬🇧 イギリス男性", lang: "en-GB" },
  { id: "en-AU-NatashaNeural", label: "👩 Natasha", desc: "🇦🇺 オーストラリア女性", lang: "en-AU" },
  { id: "en-AU-WilliamNeural", label: "👨 William", desc: "🇦🇺 オーストラリア男性", lang: "en-AU" },
  { id: "en-IN-NeerjaNeural",  label: "👩 Neerja",  desc: "🇮🇳 インド女性", lang: "en-IN" },
  { id: "en-IN-PrabhatNeural", label: "👨 Prabhat", desc: "🇮🇳 インド男性", lang: "en-IN" },
];

// 話速マッピング（CEFR レベル別）
// TTS rate is fixed at natural speed for all levels

// ── CEFR レベル定義（語彙・文法・文の長さ・AI振る舞い・フィードバック基準） ──
const CEFR_LEVELS = {
  A1: {
    id: "A1", label: "A1 入門", tag: "Beginner",
    desc: "ごく基本的な表現で自己紹介や簡単な質問ができる",
    sysRules: `LEVEL A1 (Beginner) — STRICT RULES:
VOCABULARY: Use ONLY the most basic 500 words. Examples of allowed words: be, have, go, like, want, can, good, bad, big, small, hot, cold, happy, sad, eat, drink, work, live, come, see, know, think, make, take.
BANNED at A1: phrasal verbs, idioms, slang, abstract nouns (opportunity, situation), academic words.
GRAMMAR: ONLY present simple ("I like"), "be" in present/past ("It was"), "can/can't", "there is/are", imperatives ("Look!"). 
BANNED at A1: present continuous, present perfect, past simple (except "was/were/had"), future tenses, passive voice, conditionals, relative clauses.
SENTENCE LENGTH: 3-8 words. ONE clause only. Never use "because/although/which/that" as connectors.
YOUR RESPONSES: 1 short sentence only. Ask yes/no or simple "What/Where/When" questions. NEVER ask "Why" or "How" questions.
BEHAVIOR: Speak to a complete beginner. If they struggle, simplify. Use encouraging words ("Good!", "Yes!", "Nice!"). Repeat key words.
TOPICS: Name, age, family, colors, numbers 1-100, food, weather (sunny/rainy/cold/hot), daily objects, simple likes/dislikes.
ERRORS: Ignore ALL errors. Never correct. Model correct usage naturally.`,
    flashRules: `Generate A1 level sentences:
- ONLY present simple and "be" (am/is/are/was/were)
- ONLY top 500 most common words
- 3-7 words per sentence, ONE clause
- NO "because", NO "which", NO compound sentences
- Topics: self, family, food, weather, daily routine, objects
- Good examples: "I like coffee.", "She is my sister.", "Can you help me?", "It was cold yesterday.", "I have two cats.", "Where is the station?", "He works in Tokyo.", "This is very good."
- BAD examples (too hard): "I usually wake up early." (usually=A2), "Could you tell me...?" (could=A2)`,
    shadowRules: `Generate A1 shadowing sentences:
- Very short (3-7 words), clear pronunciation
- Common daily phrases people actually say
- Examples: "Nice to meet you.", "I like this one.", "Where is the bathroom?", "Can I have some water?", "It's a sunny day.", "Thank you very much.", "I don't understand.", "See you tomorrow."`,
    feedbackCriteria: `A1 evaluation: Can they form basic SVO sentences? Can they use present simple? Can they respond to simple questions? Do NOT penalize articles, prepositions, or pronunciation. Score very generously — any communication attempt is positive.`,
  },
  A2: {
    id: "A2", label: "A2 初級", tag: "Elementary",
    desc: "日常の基本的なやりとりができる。買い物・道案内など",
    sysRules: `LEVEL A2 (Elementary) — RULES:
VOCABULARY: Common everyday vocabulary (~1500 words). Simple adjectives, basic adverbs (always, sometimes, never, usually, very, really). Simple phrasal verbs (wake up, get up, turn on/off, look for).
BANNED at A2: advanced phrasal verbs (come across, bring up), idioms, abstract vocabulary, academic words.
GRAMMAR: Present simple/continuous, past simple (regular and common irregulars), "going to" future, comparatives/superlatives, basic modals (can/could/must/should/might), connectors (and/but/because/so/or).
BANNED at A2: present perfect, past continuous, passive voice, relative clauses, reported speech, conditionals (except zero).
SENTENCE LENGTH: 5-12 words. Maximum 2 clauses joined by "and/but/because/so".
YOUR RESPONSES: 1-2 sentences. Ask choice questions ("Do you prefer A or B?") or simple "What/How often/How many" questions.
BEHAVIOR: Be encouraging. Model correct usage naturally without pointing out errors. Use clear, simple language.
TOPICS: Shopping, directions, travel basics, family, hobbies, food, daily routines, simple descriptions, weekend plans, past events.
ERRORS: Ignore minor errors. Only note if meaning is completely unclear.`,
    flashRules: `Generate A2 level sentences:
- Present simple, present continuous, past simple, "going to" future
- Comparatives ("bigger than"), superlatives ("the best"), basic modals
- 5-10 words, max 2 clauses
- NO present perfect, NO passive, NO relative clauses
- Topics: shopping, travel, daily life, preferences, descriptions, past events
- Good examples: "I usually wake up at seven.", "This restaurant is cheaper than that one.", "We're going to visit Osaka next week.", "Could you speak more slowly?", "I bought a new phone yesterday.", "She is taller than her brother."
- BAD examples (too hard): "I've been to Osaka." (present perfect=B1), "The book which I read..." (relative clause=B1)`,
    shadowRules: `Generate A2 shadowing sentences:

function pickVoice(topicId) {
  // シチュエーション別プールがあればそこからランダム
  const pool = SITUATION_VOICES[topicId];
  if (pool) return pool[Math.floor(Math.random() * pool.length)];

  // それ以外は重み付きランダム
  const entries = Object.entries(VOICE_WEIGHTS);
  const totalW = entries.reduce((s, [, w]) => s + w, 0);
  let r = Math.random() * totalW;
  for (const [id, w] of entries) {
    r -= w;
    if (r <= 0) return id;
  }
  return entries[0][0];
}

function getVoiceLabel(voiceId) {
  const v = TTS_VOICES.find(v => v.id === voiceId);
  return v ? `${v.label} ${v.desc}` : voiceId;
}

// ── Safe localStorage ──
function safeLSSet(key, value) {
  try { localStorage.setItem(key, typeof value === 'string' ? value : JSON.stringify(value)); }
  catch(e) {
    console.warn("Storage full for " + key);
    // Show notification only once per session
    if (!S._storageWarned) {
      S._storageWarned = true;
      setTimeout(function() { alert("ブラウザの保存容量が上限に達しました。設定画面から「データクリア」を行ってください。"); }, 100);
    }
  }
}

// ── Streak System ──
function localDateKey(d) {
  d = d || new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function getStreak() {
  try { return JSON.parse(localStorage.getItem("ett_streak") || "{}"); } catch { return {}; }
}
function updateStreak() {
  const s = getStreak();
  const today = localDateKey();
  s[today] = (s[today] || 0) + 1;
  safeLSSet("ett_streak", s);
}
function getStreakDays() {
  const s = getStreak();
  let count = 0;
  const d = new Date();
  while (true) {
    const key = localDateKey(d);
    if (!s[key]) break;
    count++;
    d.setDate(d.getDate() - 1);
  }
  return count;
}
function renderCalendarHTML() {
  const s = getStreak();
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth();
  const first = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0).getDate();
  const startDow = first.getDay();
  const today = now.getDate();
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let html = `<div class="cal-header"><span class="text-sm" style="font-weight:600">${months[month]} ${year}</span>`;
  const streak = getStreakDays();
  if (streak > 0) html += `<span class="streak-badge">🔥 ${streak}日連続</span>`;
  html += '</div><div class="cal-grid">';
  ['日','月','火','水','木','金','土'].forEach(d => { html += `<div class="cal-day empty" style="font-size:10px;color:var(--muted)">${d}</div>`; });
  for (let i = 0; i < startDow; i++) html += '<div class="cal-day empty"></div>';
  for (let d = 1; d <= lastDay; d++) {
    const key = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const done = !!s[key];
    const isToday = d === today;
    html += `<div class="cal-day ${done?'yes':'no'} ${isToday?'today':''}">${d}</div>`;
  }
  html += '</div>';
  return html;
}

// ── Review System (Mistakes) ──
function getMistakes() {
  try { return JSON.parse(localStorage.getItem("ett_mistakes") || "[]"); } catch { return []; }
}
function addMistake(entry) {
  const m = getMistakes();
  m.push({ ...entry, date: new Date().toISOString(), reviewed: 0 });
  // Keep max 200
  while (m.length > 200) m.shift();
  safeLSSet("ett_mistakes", m);
}
function getReviewQueue() {
  const m = getMistakes();
  const now = Date.now();
  return m.filter(e => {
    const age = (now - new Date(e.date).getTime()) / 86400000; // days
    // Spaced repetition: review at 1, 3, 7, 14, 30 days
    const intervals = [1, 3, 7, 14, 30];
    const nextReview = intervals[Math.min(e.reviewed, intervals.length - 1)] || 30;
    return age >= nextReview;
  }).slice(0, 5);
}
function markReviewed(idx) {
  const m = getMistakes();
  if (m[idx]) { m[idx].reviewed++; m[idx].date = new Date().toISOString(); }
  safeLSSet("ett_mistakes", m);
}

// ── Auto CEFR Assessment ──
function assessCEFRLevel() {
  const hist = getHistory();
  const recent = hist.slice(-10);
  if (recent.length < 3) return null;
  const avg = Math.round(recent.reduce((a, h) => a + (h.score || 0), 0) / recent.length);
  if (avg >= 85) return { suggest: "C1", msg: "スコアが高いです。C1に挑戦してみましょう！" };
  if (avg >= 75) return { suggest: "B2", msg: "安定しています。B2が適切です。" };
  if (avg >= 65) return { suggest: "B1", msg: "B1レベルで着実に伸びています。" };
  if (avg >= 50) return { suggest: "A2", msg: "基礎を固めましょう。A2がおすすめです。" };
  return { suggest: "A1", msg: "まずはA1でしっかり基礎を作りましょう。" };
}

// ── Fetch with Timeout ──
async function fetchT(url, options, ms) {
  ms = ms || 30000;
  var ctrl = new AbortController();
  var timer = setTimeout(function() { ctrl.abort(); }, ms);
  try {
    return await fetch(url, Object.assign({}, options, { signal: ctrl.signal }));
  } catch(e) {
    if (e.name === 'AbortError') throw new Error('リクエストがタイムアウトしました（' + (ms/1000) + '秒）');
    throw e;
  } finally { clearTimeout(timer); }
}

// ── Gemini API ──
async function geminiChat(messages, systemPrompt = "", json = false, useSearch = false) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${S.geminiKey}`;
  const contents = messages.map(m => ({
    role: m.role === "assistant" ? "model" : "user",
    parts: [{ text: m.content }]
  }));
  const body = {
    contents,
    generationConfig: {
      temperature: json ? 0.3 : 0.8,
      maxOutputTokens: 8192,
      ...(json ? { responseMimeType: "application/json" } : {})
    }
  };
  if (systemPrompt) {
    body.systemInstruction = { parts: [{ text: systemPrompt }] };
  }
  // Google Search Grounding for real-time information
  if (useSearch) {
    body.tools = [{ google_search: {} }];
  }
  const res = await fetchT(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) }, 60000);
  if (!res.ok) {
    // Retry once for 503 (overloaded) and 429 (rate limit)
    if (res.status === 503 || res.status === 429) {
      await new Promise(r => setTimeout(r, 2000));
      const res2 = await fetchT(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) }, 60000);
      if (!res2.ok) { var eb2 = ''; try { eb2 = (await res2.text()).slice(0,200); } catch(x){} throw new Error('Gemini API ' + res2.status + ' (retry): ' + eb2); }
      const data2 = await res2.json();
      const output2 = data2.candidates?.[0]?.content?.parts?.[0]?.text || "";
      const inChars2 = messages.reduce((a, m) => a + m.content.length, 0) + (systemPrompt?.length || 0);
      S.cost.geminiInTokens += Math.ceil(inChars2 / 4);
      S.cost.geminiOutTokens += Math.ceil(output2.length / 4);
      if (useSearch) S.cost.searchCalls = (S.cost.searchCalls || 0) + 1;
      return output2;
    }
    var eb = ''; try { eb = (await res.text()).slice(0,200); } catch(x){} throw new Error('Gemini API ' + res.status + ': ' + eb);
  }
  const data = await res.json();
  const output = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
  // Track token usage
  const inChars = messages.reduce((a, m) => a + m.content.length, 0) + (systemPrompt?.length || 0);
  S.cost.geminiInTokens += Math.ceil(inChars / 4);
  S.cost.geminiOutTokens += Math.ceil(output.length / 4);
  if (useSearch) S.cost.searchCalls = (S.cost.searchCalls || 0) + 1;
  return output;
}

// ── Azure TTS ──
let _curAudio = null;
function stopAudio() {
  if (_curAudio) { _curAudio.pause(); _curAudio = null; }
  if (window.speechSynthesis) speechSynthesis.cancel();
}

function speakBrowser(text) {
  return new Promise(function(resolve) {
    if (!window.speechSynthesis) { resolve(); return; }
    var u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US';
    
    u.rate = 1.0;
    u.onend = resolve;
    u.onerror = function() { resolve(); };
    speechSynthesis.speak(u);
  });
}

async function speakText(text, voiceId = "en-US-JennyNeural") {
  stopAudio();

  if (!S.azureKey) return speakBrowser(text);

  S.cost.ttsChars += text.length;

  const voiceInfo = TTS_VOICES.find(v => v.id === voiceId) || TTS_VOICES[0];
  const rate = "medium";

  // Escape XML special characters
  const xmlText = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&apos;");

  const ssml = `<speak version='1.0' xmlns='http://www.w3.org/2001/10/synthesis' xml:lang='${voiceInfo.lang}'>
    <voice name='${voiceId}'>
      <prosody rate='${rate}'>${xmlText}</prosody>
    </voice>
  </speak>`;

  try {
    const url = `https://${S.azureRegion}.tts.speech.microsoft.com/cognitiveservices/v1`;
    const res = await fetchT(url, {
      method: "POST",
      headers: {
        "Ocp-Apim-Subscription-Key": S.azureKey,
        "Content-Type": "application/ssml+xml",
        "X-Microsoft-OutputFormat": "audio-16khz-128kbitrate-mono-mp3"
      },
      body: ssml
    });
    if (!res.ok) throw new Error(`Azure TTS ${res.status}`);
    const audioBlob = await res.blob();
    const blobUrl = URL.createObjectURL(audioBlob);
    return new Promise((resolve, reject) => {
      _curAudio = new Audio(blobUrl);
      _curAudio.onended = () => { _curAudio = null; resolve(); };
      _curAudio.onerror = reject;
      _curAudio.play().catch(reject);
    });
  } catch(e) {
    console.warn("Azure TTS failed, fallback to browser:", e.message);
    return speakBrowser(text);
  }
}

// ── WAV Recording (Azure STT fallback & Shadowing) ──
async function recordWav(maxMs, onAutoStop, costKey) {
  if (maxMs === undefined || maxMs === null) maxMs = 60000;
  costKey = costKey || 'sttSeconds';
  const stream = await getMicStream();
  const ctx = getAudioContext();
  if (ctx.state === "suspended") await ctx.resume();
  const src = ctx.createMediaStreamSource(stream);
  const proc = ctx.createScriptProcessor(4096, 1, 1);
  const chunks = [];
  let stopped = false;
  const recStartTime = Date.now();
  proc.onaudioprocess = e => {
    if (!stopped) chunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
  };
  src.connect(proc);
  var zeroGain = ctx.createGain();
  zeroGain.gain.value = 0;
  proc.connect(zeroGain);
  zeroGain.connect(ctx.destination);
  const recorder = {
    stop: async () => {
      if (stopped) return new Blob([new ArrayBuffer(44)], {type:"audio/wav"});
      stopped = true;
      S.cost[costKey] += Math.round((Date.now() - recStartTime) / 1000);
      clearTimeout(_autoStopTimer);
      try { proc.disconnect(); } catch(e){}
      try { src.disconnect(); } catch(e){}
      // AudioContext is reused globally — do not close
      if (chunks.length === 0) return new Blob([new ArrayBuffer(44)], {type:"audio/wav"});
      const samples = new Float32Array(chunks.reduce((a, c) => a + c.length, 0));
      let off = 0; for (const c of chunks) { samples.set(c, off); off += c.length; }
      const pcm = new Int16Array(samples.length);
      for (let i = 0; i < samples.length; i++) pcm[i] = Math.max(-1, Math.min(1, samples[i])) * 32767;
      const wavBuf = new ArrayBuffer(44 + pcm.byteLength);
      const dv = new DataView(wavBuf);
      const sr = 16000, ch = 1, bps = 16;
      dv.setUint32(0,0x52494646,false); dv.setUint32(4,36+pcm.byteLength,true);
      dv.setUint32(8,0x57415645,false); dv.setUint32(12,0x666D7420,false);
      dv.setUint32(16,16,true); dv.setUint16(20,1,true); dv.setUint16(22,ch,true);
      dv.setUint32(24,sr,true); dv.setUint32(28,sr*ch*bps/8,true);
      dv.setUint16(32,ch*bps/8,true); dv.setUint16(34,bps,true);
      dv.setUint32(36,0x64617461,false); dv.setUint32(40,pcm.byteLength,true);
      new Uint8Array(wavBuf).set(new Uint8Array(pcm.buffer),44);
      return new Blob([wavBuf],{type:"audio/wav"});
    }
  };
  // Auto-stop with callback so result is not lost (skip if maxMs=0)
  var _autoStopTimer = null;
  if (maxMs > 0) {
    _autoStopTimer = setTimeout(async () => {
      if (!stopped) {
        var blob = await recorder.stop();
        if (onAutoStop) onAutoStop(blob);
      }
    }, maxMs);
  }
  return recorder;
}

// ── Azure STT (Speech-to-Text) ──
async function azureSTT(wavBlob) {
  if (!S.azureKey) throw new Error("Azure Speech キーが未設定です");
  if (!wavBlob || wavBlob.size <= 44) return ""; // empty audio
  const url = `https://${S.azureRegion}.stt.speech.microsoft.com/speech/recognition/dictation/cognitiveservices/v1?language=en-US&format=detailed&profanity=raw`;
  const res = await fetchT(url, {
    method: "POST",
    headers: {
      "Ocp-Apim-Subscription-Key": S.azureKey,
      "Content-Type": "audio/wav; codecs=audio/pcm; samplerate=16000"
    },
    body: wavBlob
  });
  if (!res.ok) throw new Error(`Azure STT ${res.status}`);
  const data = await res.json();
  if (data.RecognitionStatus === "InitialSilenceTimeout" || data.RecognitionStatus === "NoMatch") return "";
  if (data.RecognitionStatus !== "Success") throw new Error(`Recognition: ${data.RecognitionStatus}`);
  // Detailed format: use NBest[0].Display for best accuracy, fall back to DisplayText
  return data.NBest?.[0]?.Display || data.DisplayText || "";
}

// ── Azure Pronunciation Assessment ──
async function azurePronAssess(wavBlob, refText) {
  if (!S.azureKey) throw new Error("Azure Speech キーが未設定です");
  const pronConfig = btoa(JSON.stringify({
    ReferenceText: refText,
    GradingSystem: "HundredMark",
    Granularity: "Phoneme",
    Dimension: "Comprehensive",
    EnableMiscue: true
  }));
  const url = `https://${S.azureRegion}.stt.speech.microsoft.com/speech/recognition/conversation/cognitiveservices/v1?language=en-US`;
  const res = await fetchT(url, {
    method: "POST",
    headers: {
      "Ocp-Apim-Subscription-Key": S.azureKey,
      "Content-Type": "audio/wav; codecs=audio/pcm; samplerate=16000",
      "Pronunciation-Assessment": pronConfig
    },
    body: wavBlob
  });
  if (!res.ok) throw new Error(`Azure PronAssess ${res.status}`);
  var data = await res.json();
  console.log("PronAssess:", JSON.stringify(data).slice(0, 800));
  return data;
}

// ── Utility ──
function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

// ── Safe JSON Parse (repair truncated/malformed JSON) ──
function safeJSON(raw) {
  // Strip markdown fences
  let s = raw.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
  try { return JSON.parse(s); } catch(e1) {
    // Try fixing unterminated strings: add closing quote
    let fixed = s;
    // Count quotes - if odd, add one
    const quotes = (fixed.match(/"/g) || []).length;
    if (quotes % 2 !== 0) fixed += '"';
    // Try closing brackets/braces
    const opens = (fixed.match(/\{/g) || []).length;
    const closes = (fixed.match(/\}/g) || []).length;
    for (let i = 0; i < opens - closes; i++) fixed += '}';
    const openB = (fixed.match(/\[/g) || []).length;
    const closeB = (fixed.match(/\]/g) || []).length;
    for (let i = 0; i < openB - closeB; i++) fixed += ']';
    // Remove trailing commas before } or ]
    fixed = fixed.replace(/,\s*([}\]])/g, '$1');
    try { return JSON.parse(fixed); } catch(e2) {
      console.warn("JSON repair failed:", e2.message, "\nRaw:", s.slice(0, 200));
      throw e1; // throw original error
    }
  }
}

// ── Auto Routine Mode ──
const ROUTINE_THEMES = {
  daily: { ftCat: 'daily', ftTopic: 'd_random', flashCat: 'daily', label: '🏠 日常会話' },
  business: { ftCat: 'business', ftTopic: 'b_meeting', flashCat: 'business', label: '💼 ビジネス' },
  travel: { ftCat: 'travel', ftTopic: 't_destination', flashCat: 'travel', label: '✈️ 旅行' },
  opinion: { ftCat: 'daily', ftTopic: 'd_random', flashCat: 'opinion', label: '💭 意見・感想' },
};

function startRoutine(theme) {
  var rt = ROUTINE_THEMES[theme] || ROUTINE_THEMES.daily;
  S.routine = { active: true, theme: theme, step: 0, scores: [], label: rt.label };
  S.ftQuickMode = true;
  S.ftUserStarts = false;
  var catTopics = FT_ALL_TOPICS.filter(function(t) { return t.catId === rt.ftCat && !t.id.startsWith('si_') && t.prompt !== '__CUSTOM__'; });
  var pick = catTopics[Math.floor(Math.random() * catTopics.length)] || FT_ALL_TOPICS[0];
  S.ftTopic = pick.id;
  S.ftCustomTopic = '';
  S.screen = "freetalk";
  startFreeTalkSession();
}

function advanceRoutine() {
  if (!S.routine.active) { S.screen = "home"; render(); return; }
  S.routine.step++;
  var rt = ROUTINE_THEMES[S.routine.theme] || ROUTINE_THEMES.daily;
  if (S.routine.step === 1) {
    S.flashCategory = rt.flashCat;
    S.screen = "flash";
    S.flashQuestions = []; S.flashCurrent = 0; S.flashResults = [];
    generateFlashQuestions();
  } else if (S.routine.step === 2) {
    initShadow();
  } else {
    renderRoutineSummary();
  }
}

function renderRoutineSummary() {
  var scores = S.routine.scores;
  var avgScore = scores.length > 0 ? Math.round(scores.reduce(function(a,b){return a+b;},0)/scores.length) : 0;
  var scoreColor = avgScore >= 80 ? 'var(--green)' : avgScore >= 60 ? 'var(--yellow)' : 'var(--red)';
  S.routine.active = false;
  app.innerHTML = `
    <div class="summary-header" style="padding-top:40px">
      <div style="font-size:48px;margin-bottom:8px">🎉</div>
      <div class="score" style="color:${scoreColor}">${avgScore}</div>
      <div class="label">ルーティン完了！(${esc(S.routine.label||'')})</div>
    </div>
    <div class="card">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center">
        <div><div class="text-sm" style="font-weight:700;color:var(--accent)">${scores[0]!==undefined?scores[0]:'-'}</div><div class="text-xs text-muted">Free Talk</div></div>
        <div><div class="text-sm" style="font-weight:700;color:var(--accent)">${scores[1]!==undefined?scores[1]:'-'}</div><div class="text-xs text-muted">Flash</div></div>
        <div><div class="text-sm" style="font-weight:700;color:var(--accent)">${scores[2]!==undefined?scores[2]:'-'}</div><div class="text-xs text-muted">Shadowing</div></div>
      </div>
    </div>
    ${calcCostHTML()}
    <button class="btn btn-primary w-full mt-16 mb-16" id="rtHome">ホームに戻る</button>
  `;
  $("rtHome").onclick = function() { S.screen = "home"; render(); };
}

function initFreeTalk() {
  S.ftTopic = "";
  S.ftCategory = "";
  S.ftCustomTopic = "";
  S.screen = "freetalk";
  S.chatHistory = [];
  S.chatMessages = [];
  S.ftTurnCount = 0;
  S.ftSessionActive = false;
  S.ftQuickMode = false;
  S.ftChallengeExprs = [];

  S.ftPronScores = [];
  renderFreeTalkSetup();
}

      </div>
    </div>

    <button class="btn btn-primary w-full mt-16" id="startChatBtn" ${!selTopic || ((FT_ALL_TOPICS.find(t=>t.id===selTopic)?.prompt==='__CUSTOM__' || FT_ALL_TOPICS.find(t=>t.id===selTopic)?.prompt==='__NEWS_CUSTOM__') && !S.ftCustomTopic)?'disabled':''}>会話をスタート</button>
    ${!S.azureKey ? '<p class="text-xs text-red mt-8" style="text-align:center">⚠️ Azure Speech未設定：AI音声読み上げが使えません</p>' : ''}
  `;
  $("ftBack").onclick = () => { S.screen = "home"; render(); };

  // Category select
  document.querySelectorAll("#catGrid .topic-pill").forEach(el => {
    el.onclick = () => {
      S.ftCategory = el.dataset.id;
      S.ftTopic = ""; // reset topic when category changes
      renderFreeTalkSetup();
    };
  });

  // Topic select
  if ($("topicGrid")) {
    document.querySelectorAll("#topicGrid .topic-pill").forEach(el => {
      el.onclick = () => {
        S.ftTopic = el.dataset.id;
        // Handle random
        if (el.dataset.id === "free_random") {
          const allTopics = FT_ALL_TOPICS.filter(t => t.id !== "free_any" && t.id !== "free_random");
          const rand = allTopics[Math.floor(Math.random() * allTopics.length)];
          S.ftTopic = rand.id;
          S.ftCategory = rand.catId;
        }
        renderFreeTalkSetup();
      };
    });
  }

  // Level select
  document.querySelectorAll(".level-chip").forEach(el => {
    el.onclick = () => { S.ftLevel = el.dataset.id; renderFreeTalkSetup(); };
  });

  // Quick mode toggle
  if ($("quickToggle")) $("quickToggle").onchange = (e) => { S.ftQuickMode = e.target.checked; renderFreeTalkSetup(); };
  if ($("userStartToggle")) $("userStartToggle").onchange = (e) => { S.ftUserStarts = e.target.checked; renderFreeTalkSetup(); };

  // Custom topic input
  if ($("customTopicInput")) {
    $("customTopicInput").oninput = (e) => { S.ftCustomTopic = e.target.value.trim(); };
    $("customTopicInput").onkeyup = () => {
      const btn = $("startChatBtn");
      if (btn) btn.disabled = !S.ftCustomTopic;
    };
    setTimeout(() => $("customTopicInput")?.focus(), 100);
  }

  $("startChatBtn").onclick = () => startFreeTalkSession();
}

async function startFreeTalkSession() {
  const topic = FT_ALL_TOPICS.find(t => t.id === S.ftTopic);
  const level = FT_LEVELS.find(l => l.id === S.ftLevel);
  if (!topic) return;

  // Handle custom topic and news topics
  const isNews = topic.prompt.startsWith('__NEWS__') || topic.prompt === '__NEWS_CUSTOM__';
  let topicPrompt, topicDisplay;

  if (topic.prompt === '__CUSTOM__') {
    topicPrompt = `Talk about "${S.ftCustomTopic}" in the context of ${topic.catLabel || 'general'}. Discuss it naturally and ask questions.`;
    topicDisplay = S.ftCustomTopic;
  } else if (topic.prompt === '__NEWS_CUSTOM__') {
    topicPrompt = `__NEWS__:Generate a short English news article (80-120 words) about "${S.ftCustomTopic}". Then discuss it with the learner.`;
    topicDisplay = `📰 ${S.ftCustomTopic}`;
  } else if (isNews) {
    topicPrompt = topic.prompt;
    topicDisplay = topic.label;
  } else {
    topicPrompt = topic.prompt;
    topicDisplay = topic.label;
  }

  S.ftSessionActive = true;
  S.ftWhoseTurn = 'ai';
  S.ftSessionId = (S.ftSessionId || 0) + 1;
  S.ftStartTime = Date.now();
  S.ftResponseTimes = [];
  S.cost = { sttSeconds: 0, pronSeconds: 0, ttsChars: 0, geminiInTokens: 0, geminiOutTokens: 0, searchCalls: 0 };

  // 音声自動選択
  S.ftVoice = pickVoice(topic.id);
  const voiceLabel = getVoiceLabel(S.ftVoice);

  // For situation/role-play topics, add role-play instructions
  const isRolePlay = topic.id.startsWith("si_");

  // Build system prompt
  let sysPrompt;
  if (isNews) {
    const newsInstruction = topicPrompt.replace('__NEWS__:', '');
    sysPrompt = `You are an English conversation partner who discusses REAL current news.

${level.sysRules}

IMPORTANT: Use Google Search to find a REAL, RECENT news story. DO NOT invent or fabricate any news.
${newsInstruction}

Format your FIRST response like this:
📰 [Real headline from a real source]
Source: [actual news source name]

[Summarize the real article in 80-120 words, adapted to ${level.id} level English]

---
Then ask 1-2 discussion questions about this real news story.

After the first message, continue the discussion naturally. Ask follow-up questions, challenge opinions, and introduce relevant vocabulary.`;
  } else {
  const _openingStyles = [
  "Start with a friendly greeting and ask an open-ended question about the topic.",
  "Share a brief personal opinion or experience about the topic, then ask the learner about theirs.",
  "Mention an interesting fact or statistic about the topic, then ask what the learner thinks.",
  "Ask a 'would you rather' or hypothetical question related to the topic.",
  "Describe a recent trend or change related to the topic, then ask the learner's opinion.",
  "Share something surprising about the topic and ask if the learner has had a similar experience.",
  "Start with a quote or saying related to the topic, then ask the learner to react.",
  "Ask the learner to compare two things related to the topic (e.g., 'Which do you prefer, X or Y?').",
  "Describe a common problem or challenge related to the topic and ask how the learner handles it.",
  "Start by asking what the learner's earliest memory or first experience with the topic is.",
  "Ask the learner to imagine a scenario related to the topic (e.g., 'Imagine you could...').",
  "Mention how the topic is different in other countries, then ask about the learner's perspective.",
  "Start with a 'did you know' fact, then transition into a discussion question.",
  "Ask the learner to give advice to someone about the topic.",
  "Share a dilemma related to the topic and ask what the learner would do.",
  "Ask the learner to rank or prioritize things related to the topic.",
  "Start by asking what the learner has been doing recently related to the topic.",
  "Pose a 'what if' question about the future of the topic.",
  "Ask the learner about the best and worst aspects of something related to the topic.",
  "Start by disagreeing with a common opinion about the topic and ask the learner to respond.",
  "Ask about a turning point or important moment related to the topic in the learner's life.",
  "Describe two opposing viewpoints on the topic and ask which side the learner supports.",
  "Ask the learner to explain the topic as if they were teaching someone about it.",
  "Start with humor — a light joke or funny observation about the topic — then ask a question.",
];

  sysPrompt = `You are a friendly English conversation partner.

${level.sysRules}

TOPIC: ${topicPrompt}
${isRolePlay ? "This is a ROLE-PLAY scenario. Stay in character throughout." : ""}

CRITICAL: Follow the level rules STRICTLY. Do NOT speak above the specified level.
- Your vocabulary, grammar, and sentence length MUST match the level constraints above.
- A1: only basic 500 words, 1 short sentence. A2: everyday words, 1-2 sentences. B1: standard vocab, 2-3 sentences. B2: wide vocab with idioms, 2-3 complex sentences. C1: sophisticated language, 2-4 sentences.

${S.ftUserStarts ? 'The learner will start the conversation. Respond naturally and keep the conversation going on this topic.' : _openingStyles[Math.floor(Math.random() * _openingStyles.length)]}`;
  }

  S.chatHistory = [{ role: "user", content: isNews ? "Give me a news article to discuss." : "Start the conversation." }];
  S.chatMessages = [{ type: "system", text: `${topic.catIcon || '🗣️'} ${topicDisplay} — ${level.label}${S.ftQuickMode?' ⚡Quick':''}${S.ftUserStarts?' 🙋自分スタート':''}\n🔊 ${voiceLabel}` }];

  // Generate challenge expressions (async, don't block start)
  const challengeTopic = { ...topic, prompt: topicPrompt, label: topicDisplay };
  var _sid = S.ftSessionId;
  generateChallengeExpressions(level.id, challengeTopic, S.ftQuickMode, _sid).catch(()=>{});

  // User starts mode: skip AI opening, go straight to user input
  if (S.ftUserStarts && !isNews) {
    S.chatHistory = [];  // No initial prompt — user speaks first
    S.ftWhoseTurn = 'you'; S.ftTurnStartTime = Date.now();
    renderFreeTalkChat();
    return;
  }

  renderFreeTalkChat();
  showTyping();

  try {
    // Use Google Search grounding for news topics to get real current news
    const reply = await geminiChat(S.chatHistory, sysPrompt, false, isNews);
    // Guard: if session changed while waiting, discard
    if (_sid !== S.ftSessionId || !S.ftSessionActive) return;
    S.chatHistory.push({ role: "assistant", content: reply });
    S.chatMessages.push({ type: "ai", text: reply });
    hideTyping();
    renderFreeTalkChat();
    // Auto-speak AI response
    try { await speakText(reply, S.ftVoice); } catch(e) { S.chatMessages.push({type:"system",text:"🔇 音声再生に失敗しました。再生ボタンを押してください。"}); }
    S.ftWhoseTurn = 'you'; S.ftTurnStartTime = Date.now();
    renderFreeTalkChat();
  } catch(e) {
    if (_sid !== S.ftSessionId || !S.ftSessionActive) return;
    hideTyping();
    S.chatMessages.push({ type: "system", text: `❌ Error: ${e.message}` });
    S.ftWhoseTurn = 'you'; S.ftTurnStartTime = Date.now();
    renderFreeTalkChat();
  }
}

function renderFreeTalkChat() {
  const msgs = S.chatMessages.map(m => {
    if (m.type === "system") return `<div class="msg msg-system">${esc(m.text)}</div>`;
    if (m.type === "challenge") {
      const exprs = m.expressions || [];
      const cat = m.category || '';
      return `<div class="challenge-card">
        <div class="challenge-title">🎯 チャレンジ: ${esc(cat)}</div>
        <div class="text-xs" style="color:#5b4e9a;margin-bottom:10px">会話で使ってみよう！</div>
        ${exprs.map((e, i) => `<div class="challenge-expr ${S.ftChallengeUsed[i]?'used':''}">

          <div class="expr-ja">${esc(e.ja)}</div>
          ${e.example ? `<div class="expr-ex">例: ${esc(e.example)}</div>` : ''}

  app.innerHTML = `
    <div class="navbar">
      <button class="back" id="ftChatBack">←</button>

      <button class="action" id="ftEndBtn">終了</button>
    </div>
    <div class="chat-area" id="chatArea">${msgs}<div id="typingIndicator" class="typing hidden"><span></span><span></span><span></span></div></div>
    <div class="chat-input-bar">
      ${S.ftWhoseTurn === 'ending' ? '<div class="turn-indicator turn-ai">⏳ フィードバック生成中...</div>' :

        `<div class="turn-indicator turn-you">🎤 あなたのターンです${!S.ftQuickMode && S.ftTurnCount >= 1 ? ' <button class="btn-ghost" id="ftEndInline" style="font-size:12px;padding:2px 10px;border:1.5px solid var(--accent);border-radius:12px;color:var(--accent);margin-left:8px">🏁 終了してフィードバック</button>' : ''}</div>`}
      <div id="liveTranscript" style="display:${_srActive?'block':'none'};max-width:520px;margin:0 auto 6px;padding:8px 14px;background:rgba(220,38,38,.08);border-radius:12px;font-size:13px;color:var(--red);min-height:24px;word-break:break-word"><span style="animation:pulse 1.5s infinite;display:inline-block">🔴</span> <span id="liveText">${esc(_srBuf)}</span></div>
      <div class="inner" ${S.ftWhoseTurn==='ending'?'style="display:none"':''}>
        <input class="input" id="chatInput" placeholder="${S.ftWhoseTurn==='ai'?'AIが話しています...':'Type in English...'}" autocomplete="off" ${S.ftWhoseTurn!=='you'?'disabled':''}>
        ${srSupported() ? `<button class="mic-btn ${_srActive?'recording':'idle'}" id="micBtn" ${S.ftWhoseTurn!=='you'?'disabled':''}>${_srActive?'⏹':'🎤'}</button>` : ''}
        <button class="btn btn-primary" id="sendBtn" style="padding:12px 16px;border-radius:50%" ${S.ftWhoseTurn!=='you'?'disabled':''}>↑</button>
      </div>
    </div>
  `;

  $("ftChatBack").onclick = async () => {
    if (S.ftSessionActive && S.chatHistory.length > 2) {

        return;

        return;

    S.screen = "home"; render();

  $("ftEndBtn").onclick = async () => { await endFreeTalkSession(); };
  if ($("ftEndInline")) $("ftEndInline").onclick = async () => { await endFreeTalkSession(); };

  const sendMsg = () => {
    const text = $("chatInput")?.value?.trim();

  if ($("micBtn")) $("micBtn").onclick = () => toggleRecording();

  document.querySelectorAll(".replay-btn").forEach(btn => {

      btn.textContent = "⏳";

function showTyping() {

  if (area) area.scrollTop = area.scrollHeight;
}
function hideTyping() {

let _recorder = null;   // for Shadowing (recordWav) & Azure STT fallback

// ═══════════════════════════════════
// SPEECH RECOGNITION
// Web Speech API → Azure STT fallback
// ═══════════════════════════════════
var _sr = null;
var _srBuf = '';
var _srActive = false;
var _srCallback = null;
var _srRestartTimer = null;
var _srUseAzure = false;
var _srRecorder = null;
var _srRetryCount = 0;


function srSupported() {
  if (S.srMode === 'azure') return !!S.azureKey;
  if (S.srMode === 'webspeech') return !!(window.SpeechRecognition || window.webkitSpeechRecognition);
  return !!(window.SpeechRecognition || window.webkitSpeechRecognition) || !!S.azureKey;
}
function srIsActive() { return _srActive; }

function srStart(onComplete) {
  if (_srActive) return false;
  _srBuf = '';
  
  _srActive = true;
  _srCallback = onComplete;
  _srUseAzure = false;
  _srRetryCount = 0;

  // Respect user's choice of SR mode
  if (S.srMode === 'azure') {
    // Force Azure STT
    if (!S.azureKey) { alert("Azure Speech キーを設定してください"); _srActive = false; return false; }
    _srStartAzure();
  } else if (S.srMode === 'webspeech') {
    // Force Web Speech API
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert("このブラウザはWeb Speech APIに対応していません"); _srActive = false; return false; }
    _srDoStart();
  } else {
    // Auto: try Web Speech first, fall back to Azure
    var SR2 = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SR2) {
      _srDoStart();
    } else if (S.azureKey) {
      _srStartAzure();
    } else {
      alert("音声認識が利用できません。");
      _srActive = false;
      return false;
    }
  }
  return true;
}

function srStop() {
  _srActive = false;
  clearTimeout(_srRestartTimer);
  if (_srUseAzure && _srRecorder) {
    _srRecorder.stop().then(function(wavBlob) {
      _srRecorder = null;
      if (wavBlob && wavBlob.size > 44 && S.azureKey) {
        azureSTT(wavBlob).then(function(text) {
          _srBuf = text || '';
          _deliverResult();
        }).catch(function() { _deliverResult(); });
      } else { _deliverResult(); }
    }).catch(function() { _deliverResult(); });
  } else {
    // Web Speech API: use stop() and wait for onend to fire with final results
    if (_sr) {
      var deliverTimer = setTimeout(function() {
        // Safety: if onend never fires within 2s, deliver anyway
        _sr = null;
        _deliverResult();
      }, 2000);
      _sr.onend = function() {
        clearTimeout(deliverTimer);
        _sr = null;
        // Small delay to ensure last onresult has fired
        setTimeout(_deliverResult, 100);
      };
      _sr.onerror = function() {}; // suppress errors during stop
      try { _sr.stop(); } catch(e) {
        clearTimeout(deliverTimer);
        _sr = null;
        _deliverResult();
      }
    } else {
      _deliverResult();
    }
  }
}

function _deliverResult() {
  var text = _srBuf.trim();
  _srBuf = '';
  if (_srCallback) { var cb = _srCallback; _srCallback = null; cb(text); }
}

// Cancel recording without delivering results (for navigation/ending)
function srCancel() {
  _srActive = false;
  clearTimeout(_srRestartTimer);
  _srBuf = '';
  _srCallback = null;
  _srUseAzure = false;
  if (_sr) {
    _sr.onend = null; _sr.onresult = null; _sr.onerror = null;
    try { _sr.abort(); } catch(e) {}
    _sr = null;
  }
  if (_srRecorder) {
    try { _srRecorder.stop(); } catch(e) {}
    _srRecorder = null;
  }
}

function _srDoStart() {
  if (!_srActive) return;
  // Clean up previous instance completely
  if (_sr) {
    _sr.onresult = null;
    _sr.onerror = null;
    _sr.onend = null;
    try { _sr.abort(); } catch(e) {}
    _sr = null;
  }
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  _sr = new SR();
  _sr.lang = 'en-US';
  _sr.continuous = true;
  _sr.interimResults = false;  // true causes duplication on Android Chrome
  _sr.maxAlternatives = 1;
  _sr.onresult = function(e) {
    for (var i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        _srBuf += e.results[i][0].transcript + ' ';
      }
    }
    // Update live transcript display
    var lt = document.getElementById('liveText');
    if (lt) lt.textContent = _srBuf;
  };
  _sr.onerror = function(e) {
    if (e.error === 'no-speech' || e.error === 'aborted') return;
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      _sr = null;
      _srRetryCount++;
      if (_srRetryCount <= 2) {
        // Retry after delay — might be temporary
        console.log("Speech not-allowed, retry " + _srRetryCount);
        _srRestartTimer = setTimeout(function() { if (_srActive) _srDoStart(); }, 500);
        return;
      }
      // Retries exhausted — try Azure fallback
      if (S.azureKey && _srActive) {
        console.log("Speech API failed, falling back to Azure STT");
        _srStartAzure();
        return;
      }
      _srActive = false;
      alert("マイクへのアクセスが拒否されました。ブラウザの設定を確認してください。");
      if (_srCallback) { var cb = _srCallback; _srCallback = null; cb(''); }
      return;
    }
    console.warn("Speech error:", e.error);
  };
  _sr.onend = function() {
    if (_srActive && !_srUseAzure) {
      _srRestartTimer = setTimeout(function() { if (_srActive) _srDoStart(); }, 200);
    }
  };
  try {
    _sr.start();
    _srRetryCount = 0; // Reset retry count on successful start
  } catch(e) {
    console.warn("SR start exception:", e.message);
    _srRetryCount++;
    if (_srRetryCount <= 2) {
      _srRestartTimer = setTimeout(function() { if (_srActive) _srDoStart(); }, 500);
    } else if (S.azureKey && _srActive) {
      _srStartAzure();
    } else {
      _srActive = false;
      if (_srCallback) { var cb = _srCallback; _srCallback = null; cb(''); }
    }
  }
}

async function _srStartAzure() {
  _srUseAzure = true;
  try {
    _srRecorder = await recordWav(60000, function(blob) {
      // Auto-stop after 60s: process the result
      _srRecorder = null;
      if (blob && blob.size > 44 && S.azureKey) {
        azureSTT(blob).then(function(text) {
          _srBuf = text || '';
          _srActive = false;
          _deliverResult();
        }).catch(function() { _srActive = false; _deliverResult(); });
      } else {
        _srActive = false;
        _deliverResult();
      }
    });
  } catch(e) {
    _srActive = false; _srUseAzure = false;
    alert("マイクアクセスエラー: " + e.message);
    if (_srCallback) { var cb = _srCallback; _srCallback = null; cb(''); }
  }
}

// ── Free Talk Recording ──
function toggleRecording() {
  if (srIsActive()) {
    // STOP: immediate visual feedback before async processing
    S.isRecording = false;
    var btn = $("micBtn");
    if (btn) { btn.disabled = true; btn.textContent = "⏳"; btn.className = "mic-btn processing"; }
    srStop();
  } else {
    var started = srStart(function(text) {
      S.isRecording = false;
      if (text) handleUserMessage(text);
      else renderFreeTalkChat();
    });
    if (started) {
      S.isRecording = true;
      renderFreeTalkChat();
    }
  }
}

function getUsedChallengeCategories() {
  try { return JSON.parse(localStorage.getItem("ett_challenge_used") || "[]"); } catch { return []; }
}
function markChallengeCategory(catId) {
  const used = getUsedChallengeCategories();
  used.push(catId);
  // Keep last 20 to allow rotation
  while (used.length > 20) used.shift();
  safeLSSet("ett_challenge_used", used);
}

async function generateChallengeExpressions(levelId, topic, isQuick, sessionId) {
  try {
    const cats = CHALLENGE_CATEGORIES[levelId] || CHALLENGE_CATEGORIES.B1;
    const usedCats = getUsedChallengeCategories();

    // Pick category not recently used, or least recently used
    let pick = cats.find(c => !usedCats.includes(c.id));
    if (!pick) pick = cats[Math.floor(Math.random() * cats.length)];
    markChallengeCategory(pick.id);

    const exprCount = isQuick ? 1 : 2;
    const topicDesc = topic?.prompt || "general conversation";
    const topicLabel = topic?.label || "フリートーク";
    const raw = await geminiChat([{ role: "user", content: `You are helping a ${levelId} level English learner practice.

SKILL CATEGORY: "${pick.name}" — ${pick.focus}
CONVERSATION TOPIC: "${topicDesc}"

Generate exactly ${exprCount} expression(s) from this skill category that the learner can naturally use in a conversation about "${topicLabel}".

Rules:
- All expressions MUST belong to the category "${pick.name}" (${pick.focus})
- Each expression MUST be usable in a conversation about "${topicLabel}"
- Appropriate complexity for ${levelId} level
- Include a realistic example sentence in the context of this topic

Return JSON: {"category": "${pick.name}", "expressions": [{"en": "expression or phrase", "ja": "Japanese meaning", "example": "example sentence in context of ${topicLabel}"}]}` }], "JSON only.", true);
    // Guard: if user already left this session, don't touch UI
    if (sessionId && S.ftSessionId !== sessionId) return;
    const data = safeJSON(raw);
    S.ftChallengeExprs = data.expressions || [];
    S.ftChallengeUsed = new Array(S.ftChallengeExprs.length).fill(false);
    S._challengeCategory = data.category || pick.name;
    // Show challenge card in chat
    if (S.ftChallengeExprs.length > 0) {
      S.chatMessages.splice(1, 0, { type: "challenge", expressions: S.ftChallengeExprs, category: S._challengeCategory });
      if (S.screen === "freetalk" || S.ftSessionActive) renderFreeTalkChat();
    }
  } catch(e) { console.warn("Challenge expr:", e); }
}

async function handleUserMessage(text) {
  // Track response time
  if (S.ftTurnStartTime > 0) {
    S.ftResponseTimes.push(Date.now() - S.ftTurnStartTime);
    S.ftTurnStartTime = 0;
  }
  S.chatMessages.push({ type: "user", text });
  S.chatHistory.push({ role: "user", content: text });
  S.ftTurnCount++;
  var sid = S.ftSessionId;

  // Check if user used challenge expressions
  S.ftChallengeExprs.forEach((expr, i) => {
    if (text.toLowerCase().includes(expr.en.toLowerCase().split(' ').slice(0,3).join(' '))) {
      S.ftChallengeUsed[i] = true;
    }
  });

  // Quick mode: auto-end after 3 turns
  if (S.ftQuickMode && S.ftTurnCount >= 3) {
    S.ftWhoseTurn = 'ending';  // Disable all input
    S.chatMessages.push({ type: "system", text: "✅ 3ターン完了！フィードバックを生成中..." });
    renderFreeTalkChat();
    endFreeTalkSession();
    return;
  }

  S.ftWhoseTurn = 'ai';
  renderFreeTalkChat();
  showTyping();

  const topic = FT_ALL_TOPICS.find(t => t.id === S.ftTopic);
  const level = FT_LEVELS.find(l => l.id === S.ftLevel);
  const isRolePlay = topic?.id?.startsWith("si_");
  const resolvedPrompt = topic?.prompt === '__CUSTOM__' ? `Talk about "${S.ftCustomTopic}"` : topic?.prompt?.startsWith('__NEWS__') ? 'Discuss the news article you presented' : (topic?.prompt || "Free conversation");
  const sysPrompt = `You are a friendly English conversation partner.

${level?.sysRules || "Speak naturally."}

Topic: ${resolvedPrompt}.
${isRolePlay ? "Stay in character for this role-play scenario." : ""}

CRITICAL: You MUST follow the level rules above STRICTLY.
- Do NOT use vocabulary or grammar above the specified level.
- Do NOT make your sentences longer than the specified range.
- Match your response length to the level (A1=1 sentence, B1=2-3 sentences, C1=2-4 sentences).
- If the user speaks above or below the level, YOU still stay at the specified level.`;

  try {
    const reply = await geminiChat(S.chatHistory, sysPrompt);
    if (sid !== S.ftSessionId || !S.ftSessionActive) return;
    S.chatHistory.push({ role: "assistant", content: reply });
    S.chatMessages.push({ type: "ai", text: reply });
    hideTyping();
    renderFreeTalkChat();
    try { await speakText(reply, S.ftVoice); } catch(e) { S.chatMessages.push({type:"system",text:"🔇 音声再生に失敗しました。再生ボタンを押してください。"}); }
    S.ftWhoseTurn = 'you'; S.ftTurnStartTime = Date.now();
    renderFreeTalkChat();
  } catch(e) {
    if (sid !== S.ftSessionId || !S.ftSessionActive) return;
    hideTyping();
    S.chatMessages.push({ type: "system", text: `❌ ${e.message}` });
    S.ftWhoseTurn = 'you'; S.ftTurnStartTime = Date.now();
    renderFreeTalkChat();
  }
}

async function endFreeTalkSession() {
  if (S.ftEnding) return;
  S.ftEnding = true;
  S.ftSessionActive = false;
  S.isRecording = false;
  srCancel(); stopAudio(); releaseMicStream();
  const elapsed = Math.max(1, Math.round((Date.now() - (S.ftStartTime || Date.now())) / 60000));
  const topic = FT_ALL_TOPICS.find(t => t.id === S.ftTopic);

  showTyping();
  // Get feedback from Gemini
  const userMsgs = S.chatHistory.filter(m => m.role === "user" && m.content !== "Start the conversation.").map(m => m.content);
  const level = CEFR_LEVELS[S.ftLevel] || CEFR_LEVELS.B1;
  const feedbackPrompt = `Evaluate this ${level.id} (${level.tag}) student's English.
${level.feedbackCriteria}

Student said:
${userMsgs.map((m,i) => `${i+1}. "${m}"`).join("\n")}
${S.ftChallengeExprs.length > 0 ? `\nChallenge expressions to use: ${S.ftChallengeExprs.map(e => e.en).join(", ")}` : ''}

COMPACT JSON. Keep strings SHORT. Max 3 corrections.
{"overallScore":75,"grammar":{"score":80,"issues":["issue"]},"vocabulary":{"score":70,"suggestions":["tip"]},"naturalness":{"score":75,"notes":["note"]},"corrections":[{"original":"x","corrected":"y","explanation":"z"}]${S.ftChallengeExprs.length > 0 ? ',"challengeResults":[{"expression":"e","used":true,"natural":true,"comment":"短評"}]' : ''},"cefrAssessment":"one sentence","encouragement":"日本語一言"}`;

  try {
    const raw = await geminiChat(
      [{ role: "user", content: feedbackPrompt }],
      "You are an English language evaluator. Respond ONLY in valid JSON.",
      true
    );
    hideTyping();
    const fb = safeJSON(raw);
    S._lastFeedback = fb;

    // Save session
    saveSession({
      mode: "freetalk", topic: topic?.label || S.ftTopic,
      level: S.ftLevel, score: fb.overallScore || 0,
      minutes: elapsed, turns: S.ftTurnCount, voice: S.ftVoice,
    });
    addToCumulativeCost(calcSessionTotal());

    // Update streak
    updateStreak();

    // Save conversation log
    saveConversationLog({
      mode: "freetalk", topic: topic?.label || S.ftTopic,
      level: S.ftLevel, voice: S.ftVoice,
      messages: S.chatMessages
        .filter(m => m.type === 'ai' || m.type === 'user')
        .slice(-20)
        .map(m => ({type: m.type, text: (m.text || '').slice(0, 500)})),
    });

    // Save mistakes for review
    (fb.corrections || []).forEach(c => {
      addMistake({ original: c.original, corrected: c.corrected, explanation: c.explanation, mode: "freetalk" });
    });

    // #3: Add unused challenge expressions to review queue
    if (S.ftChallengeExprs.length > 0) {
      var challengeResults = fb.challengeResults || [];
      S.ftChallengeExprs.forEach(function(expr, i) {
        var cr = challengeResults[i];
        var wasUsed = cr ? cr.used : (S.ftChallengeUsed && S.ftChallengeUsed[i]);
        if (!wasUsed) {
          addMistake({
            original: "（未使用チャレンジ表現）",
            corrected: expr.en + " — " + expr.ja,
            explanation: "次回のトークで使ってみましょう！",
            mode: "challenge"
          });
        }
      });
    }

    // Extract vocabulary from AI responses (async, don't block)
    extractVocabulary(S.chatHistory).catch(()=>{});

    S.screen = "review";
    S.ftEnding = false;
    render();
  } catch(e) {
    hideTyping();
    S.ftEnding = false;
    S.chatMessages.push({ type: "system", text: `フィードバック取得失敗: ${e.message}` });
    renderFreeTalkChat();
  }
}

  const cat = FLASH_CATEGORIES.find(c => c.id === S.flashCategory);
  const lvlRules = (CEFR_LEVELS[S.flashLevel] || CEFR_LEVELS.A2).flashRules;

  // Variety system: random sub-topics to prevent repetitive outputs
  const VARIETY_SEEDS = {
    daily: ["朝の準備・通勤", "ペットの世話", "友人との約束", "引っ越し・新生活", "天気と服装", "スーパーでの買い物", "料理・自炊", "掃除・洗濯", "近所づきあい", "休日の過ごし方", "健康管理・運動", "美容院・散髪", "DIY・修理", "誕生日・お祝い", "子供の学校行事"],

    opinion: ["教育制度", "テクノロジーの影響", "環境問題", "働き方改革", "SNSの功罪", "AI時代の仕事", "伝統と革新", "都市と地方", "食文化の変化", "スポーツの意義", "読書vs動画", "キャッシュレス", "多様性", "宇宙開発", "健康と食事"],
    situation: ["職場での依頼", "友人との再会", "病院の受付", "クレーム", "お礼を言う", "道を聞かれた", "遅刻の連絡", "提案する", "断る", "褒める", "相談する", "励ます", "紹介する", "電話を取る", "注文を間違えられた"],
    pattern: ["I'm looking forward to", "I used to", "It depends on", "I'm supposed to", "I can't help but", "There's no point in", "I might as well", "I'd rather", "It's worth", "I'm about to", "I ended up", "I'm getting used to", "It turns out that", "I wish I could", "I should have"],
  };
  var seeds = VARIETY_SEEDS[S.flashCategory] || VARIETY_SEEDS.daily;
  // Pick 3 random seeds for this session
  var picked = [];
  var shuffled = seeds.slice().sort(function() { return Math.random() - 0.5; });
  picked = shuffled.slice(0, 3);
  var varietyHint = `\n\nIMPORTANT - VARIETY: Focus on these specific scenarios/topics this time: "${picked.join('", "')}". Do NOT use generic textbook examples. Make sentences about real, specific situations. Every sentence must be DIFFERENT in topic and structure. Surprise the learner.`;

  var prompt;

  if (S.flashCategory === 'situation') {
    prompt = `Generate 10 situation-response exercises for English conversation practice.

${lvlRules}

For each exercise:
- Describe a SITUATION in Japanese (e.g. "友人が風邪を引いた。声をかけてください。")

- Provide a good example response as "en"

  } else if (S.flashCategory === 'pattern') {

    prompt = `Generate pattern drill exercises for English fluency training.

${lvlRules}

Use THESE specific patterns (create 2-3 situations for each):
${patternPicks.map(function(p,i){return (i+1)+'. "'+p+'..."';}).join('\n')}

Each exercise:

- "en" = パターンを使った英語の回答
- "hint" = the pattern (e.g., "${patternPicks[0]}...")

Total: 10 exercises.
${varietyHint}

Respond ONLY in JSON:
{"questions": [{"ja": "状況説明", "en": "Answer using the pattern", "alt": ["alternative"], "hint": "Pattern: ..."}]}`;
  } else {
    prompt = `Generate 10 Japanese-to-English translation exercises.

Category: ${cat.label}

${lvlRules}

- Make sentences practical and useful in real life
- Provide 1-2 alternative correct answers when possible
${varietyHint}

Respond ONLY in JSON:
{"questions": [{"ja": "日本語文", "en": "English sentence", "alt": ["alternative answer 1"], "hint": "key grammar/vocab hint"}]}`;
  }

  try {
    const raw = await geminiChat([{ role: "user", content: prompt }], "Generate translation exercises. JSON only.", true);
    const data = safeJSON(raw);
    S.flashQuestions = data.questions || [];
    if (S.flashQuestions.length === 0) throw new Error("問題が生成されませんでした");
    S.flashCurrent = 0;
    S.flashResults = [];
    renderFlashQuestion();
  } catch(e) {
    app.innerHTML = `
      <div class="card" style="text-align:center;padding:32px">
        <div style="font-size:24px;margin-bottom:12px">❌</div>
        <div class="text-sm">${esc(e.message)}</div>
