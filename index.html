<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f0f4f8">
<title>English Talk Trainer</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon-180.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon-180.png">
<link rel="apple-touch-icon" sizes="167x167" href="apple-touch-icon-167.png">
<link rel="apple-touch-icon" sizes="152x152" href="apple-touch-icon-152.png">
<link rel="apple-touch-icon" sizes="120x120" href="apple-touch-icon-120.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f0f4f8;--surface:#ffffff;--card:#ffffff;--border:#d1d9e6;
  --text:#1a2a3a;--muted:#5a6a7a;--accent:#4f46e5;--accent2:#6d5cdb;
  --green:#059669;--yellow:#b45309;--red:#dc2626;--blue:#2563eb;
  --orange:#c2410c;
  --font:'Outfit',system-ui,-apple-system,sans-serif;
  --mono:'JetBrains Mono','SF Mono',monospace;
}
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow-x:hidden;-webkit-tap-highlight-color:transparent;font-size:16px}
#app{max-width:520px;margin:0 auto;padding:16px;min-height:100vh;position:relative}

/* ── Buttons ── */
.btn{padding:14px 24px;border:none;border-radius:12px;font-family:var(--font);font-weight:600;font-size:16px;cursor:pointer;touch-action:manipulation;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(79,70,229,.25)}
.btn-primary:active{transform:scale(.97);filter:brightness(1.1)}
.btn-secondary{background:var(--surface);color:var(--text);border:1.5px solid var(--border)}
.btn-secondary:active{background:var(--bg)}
.btn-ghost{background:transparent;color:var(--muted);padding:10px 14px;font-size:15px}
.btn-ghost:active{color:var(--text)}
.btn-danger{background:#fef2f2;color:var(--red);border:1.5px solid #fecaca}
.btn:disabled{opacity:.4;pointer-events:none}

/* ── Cards ── */
.card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.card-glow{box-shadow:0 2px 16px rgba(79,70,229,.1)}

/* ── Inputs ── */
.input{width:100%;padding:14px 16px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font);font-size:16px;outline:none;transition:border .2s}
.input:focus{border-color:var(--accent)}
.input::placeholder{color:#8a9ab0}

/* ── Tags / Badges ── */
.tag{display:inline-block;padding:4px 10px;border-radius:20px;font-size:13px;font-weight:600;letter-spacing:.3px}
.tag-accent{background:#ede9fe;color:var(--accent)}
.tag-green{background:#d1fae5;color:var(--green)}
.tag-orange{background:#ffedd5;color:var(--orange)}

/* ── Home Screen ── */
.home-header{text-align:center;padding:36px 0 28px}
.home-header .pre{font-size:13px;font-weight:600;letter-spacing:3px;color:var(--accent);margin-bottom:8px;text-transform:uppercase}
.home-header h1{font-size:30px;font-weight:800;color:var(--text);margin-bottom:6px}
.home-header .sub{font-size:15px;color:var(--muted);font-weight:400}

.mode-card{position:relative;padding:24px;border-radius:20px;cursor:pointer;transition:all .25s;overflow:hidden;touch-action:manipulation}
.mode-card:active{transform:scale(.98)}
.mode-card .icon{font-size:36px;margin-bottom:12px}
.mode-card h3{font-size:20px;font-weight:700;margin-bottom:6px}
.mode-card p{font-size:15px;color:var(--muted);line-height:1.6}
.mode-card .arrow{position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:22px;color:var(--muted);transition:transform .2s}
.mode-card:active .arrow{transform:translateY(-50%) translateX(4px)}

.mode-freetalk{background:#ede9fe;border:1.5px solid #c4b5fd;color:#3b2e8a}
.mode-freetalk h3{color:#3b2e8a}
.mode-flash{background:#d1fae5;border:1.5px solid #86efac;color:#065f46}
.mode-flash h3{color:#065f46}

/* ── Chat UI ── */
.chat-area{display:flex;flex-direction:column;gap:12px;padding-bottom:110px;min-height:60vh}
.msg{max-width:85%;padding:16px 20px;border-radius:18px;font-size:16px;line-height:1.7;animation:msgIn .3s ease}
.msg-ai{background:var(--surface);border:1.5px solid var(--border);border-bottom-left-radius:4px;align-self:flex-start;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.msg-user{background:var(--accent);color:#fff;border-bottom-right-radius:4px;align-self:flex-end;box-shadow:0 1px 3px rgba(79,70,229,.2)}
.msg-system{align-self:center;background:#ede9fe;border:1.5px solid #c4b5fd;color:#4f46e5;font-size:14px;padding:10px 18px;border-radius:20px;text-align:center;font-weight:600}
.msg-feedback{background:#f0fdf4;border:1.5px solid #86efac;border-radius:14px;padding:18px;align-self:stretch;font-size:15px;line-height:1.7}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.chat-input-bar{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(transparent,var(--bg) 20%);padding:12px 16px 20px;z-index:100}
.chat-input-bar .inner{max-width:520px;margin:0 auto;display:flex;gap:8px;align-items:center}
.chat-input-bar .inner .input{flex:1;border-radius:24px;padding:14px 20px;background:var(--surface);font-size:16px}

/* ── Mic Button ── */
.mic-btn{width:58px;height:58px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:26px;transition:all .2s;touch-action:manipulation;flex-shrink:0}
.mic-btn.idle{background:var(--surface);border:2px solid var(--border);color:var(--muted)}
.mic-btn.recording{background:var(--red);color:#fff;animation:pulse 1.5s infinite}
.mic-btn.processing{background:var(--surface);border:2px solid var(--accent);color:var(--accent);animation:spin 1s linear infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.3)}50%{box-shadow:0 0 0 14px rgba(220,38,38,0)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* ── Flash Translation ── */
.flash-card{text-align:center;padding:32px 24px}
.flash-ja{font-size:24px;font-weight:700;margin-bottom:10px;line-height:1.5;color:var(--text)}
.flash-hint{font-size:14px;color:var(--muted);margin-bottom:24px}
.flash-answer{font-size:17px;padding:18px;background:var(--bg);border-radius:12px;margin-top:16px;border:1.5px solid var(--border);line-height:1.7;text-align:left}
.flash-answer .correct{color:var(--green);font-weight:600}
.flash-answer .wrong{color:var(--red);text-decoration:line-through}
.flash-result{display:flex;gap:12px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.flash-score{text-align:center;padding:12px 16px}
.flash-score .num{font-size:30px;font-weight:800}
.flash-score .label{font-size:13px;color:var(--muted);margin-top:2px}

/* ── Progress Bar ── */
.progress-bar{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin:12px 0}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .3s}

/* ── Session Summary ── */
.summary-header{text-align:center;padding:24px 0}
.summary-header .score{font-size:52px;font-weight:800;color:var(--accent)}
.summary-header .label{font-size:16px;color:var(--muted);margin-top:4px}

/* ── Loading / Typing ── */
.typing{display:flex;gap:5px;padding:16px;align-self:flex-start}
.typing span{width:10px;height:10px;background:#94a3b8;border-radius:50%;animation:typing .8s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes typing{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#c1cad6;border-radius:3px}

/* ── Misc ── */
.divider{height:1px;background:var(--border);margin:16px 0}
.text-sm{font-size:15px}.text-xs{font-size:13px}
.text-muted{color:var(--muted)}
.text-green{color:var(--green)}
.text-red{color:var(--red)}
.text-accent{color:var(--accent)}
.mt-8{margin-top:8px}.mt-16{margin-top:16px}.mt-24{margin-top:24px}
.mb-8{margin-bottom:8px}.mb-16{margin-bottom:16px}
.flex{display:flex}.gap-8{gap:8px}.gap-12{gap:12px}
.items-center{align-items:center}.justify-between{justify-content:space-between}
.w-full{width:100%}
.hidden{display:none!important}

/* ── Topic Pills ── */
.topic-grid{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
.topic-pill{padding:10px 18px;border-radius:20px;background:var(--bg);border:1.5px solid var(--border);color:var(--text);font-size:15px;cursor:pointer;transition:all .2s;touch-action:manipulation}
.topic-pill:active{background:var(--accent);border-color:var(--accent);color:#fff}
.topic-pill.selected{background:#ede9fe;border-color:var(--accent);color:var(--accent);font-weight:600}

/* ── Word Score Colors ── */
.ws-great{color:var(--green)}.ws-good{color:var(--yellow)}.ws-poor{color:var(--red)}

/* ── Settings Row ── */
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border)}
.setting-row:last-child{border-bottom:none}
.setting-label{font-size:16px;font-weight:500}
.setting-value{font-size:15px;color:var(--muted)}

/* ── Navbar ── */
.navbar{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.navbar .back{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;padding:6px;touch-action:manipulation}
.navbar .title{font-size:18px;font-weight:700;flex:1;color:var(--text)}
.navbar .action{background:none;border:none;color:var(--accent);font-size:15px;font-weight:700;cursor:pointer;touch-action:manipulation}

/* ── Level Select ── */
.level-select{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
.level-chip{padding:10px 14px;text-align:center;border-radius:10px;background:var(--bg);border:1.5px solid var(--border);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;touch-action:manipulation;color:var(--text)}
.level-chip.active{background:#ede9fe;border-color:var(--accent);color:var(--accent)}

/* ── Stats Grid ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}
.stat-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.stat-card .val{font-size:28px;font-weight:700}
.stat-card .lbl{font-size:13px;color:var(--muted);margin-top:4px}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ═══════════════════════════════════════════════
   English Talk Trainer
   フリートーク + 瞬間英作文
   Gemini 2.5 Flash + Azure Speech + PWA
   ═══════════════════════════════════════════════ */

const VERSION = "v2026.05.04j";

const $ = id => document.getElementById(id);
const app = document.getElementById("app");
const GEMINI_MODEL = "gemini-2.5-flash";

// ── Azure TTS Neural Voices ──
const TTS_VOICES = [
  { id: "en-US-JennyNeural",   label: "👩 Jenny",   desc: "🇺🇸 アメリカ女性・フレンドリー", lang: "en-US" },
  { id: "en-US-GuyNeural",     label: "👨 Guy",     desc: "🇺🇸 アメリカ男性・落ち着き", lang: "en-US" },
  { id: "en-US-AriaNeural",    label: "👩 Aria",    desc: "🇺🇸 アメリカ女性・明るい", lang: "en-US" },
  { id: "en-US-DavisNeural",   label: "👨 Davis",   desc: "🇺🇸 アメリカ男性・カジュアル", lang: "en-US" },
  { id: "en-GB-SoniaNeural",   label: "👩 Sonia",   desc: "🇬🇧 イギリス女性", lang: "en-GB" },
  { id: "en-GB-RyanNeural",    label: "👨 Ryan",    desc: "🇬🇧 イギリス男性", lang: "en-GB" },
  { id: "en-AU-NatashaNeural", label: "👩 Natasha", desc: "🇦🇺 オーストラリア女性", lang: "en-AU" },
  { id: "en-AU-WilliamNeural", label: "👨 William", desc: "🇦🇺 オーストラリア男性", lang: "en-AU" },
  { id: "en-IN-NeerjaNeural",  label: "👩 Neerja",  desc: "🇮🇳 インド女性", lang: "en-IN" },
  { id: "en-IN-PrabhatNeural", label: "👨 Prabhat", desc: "🇮🇳 インド男性", lang: "en-IN" },
];

// 話速マッピング（CEFR レベル別）
const TTS_RATE = { A1: "slow", A2: "slow", B1: "medium", B2: "medium", C1: "fast" };

// ── CEFR レベル定義（語彙・文法・文の長さ・AI振る舞い・フィードバック基準） ──
const CEFR_LEVELS = {
  A1: {
    id: "A1", label: "A1 入門", tag: "Beginner",
    desc: "ごく基本的な表現で自己紹介や簡単な質問ができる",
    ttsRate: "slow",
    // AI会話パートナーへの指示
    sysRules: `LEVEL A1 (Beginner) — STRICT RULES:
VOCABULARY: Use only the most basic 500 words (be, have, go, like, want, can, good, big, small, etc). NO phrasal verbs. NO idioms. NO slang.
GRAMMAR: Present simple, past simple of "be/have", "can", "there is/are", imperatives. NO perfect tenses. NO passive voice. NO conditionals beyond zero conditional.
SENTENCE LENGTH: Keep ALL sentences to 3-8 words. Maximum 1 clause per sentence. Never use subordinate clauses.
YOUR RESPONSES: 1 sentence only. Ask simple yes/no questions or "What/Where/When" questions.
BEHAVIOR: Speak as if to a complete beginner. If the user struggles, simplify further. Repeat key words. Use gestures-like expressions ("Look!", "Yes!", "Good!").
PACE: Very slow and clear. Pause between sentences.
TOPICS: Stick to immediate personal info — name, age, family, colors, numbers, food, weather (sunny/rainy), daily objects.
ERRORS: Ignore ALL errors during conversation. Never correct. Just model correct usage naturally.`,
    // 瞬間英作文の指示
    flashRules: `Generate A1 level sentences:
- Use ONLY present simple, past simple of "be", and "can"
- Vocabulary: top 500 most common English words only
- Sentence length: 3-7 words
- Topics: self-introduction, family, daily routines, simple preferences
- Examples: "I like coffee.", "She is my sister.", "Can you help me?", "It was cold yesterday."`,
    // フィードバック評価基準
    feedbackCriteria: `A1 evaluation criteria:
- Can they form basic SVO sentences?
- Can they use present simple correctly?
- Can they respond to simple questions?
- Do NOT penalize for missing articles, wrong prepositions, or pronunciation
- Score generously — any communication attempt is positive at this level`,
  },
  A2: {
    id: "A2", label: "A2 初級", tag: "Elementary",
    desc: "日常の基本的なやりとりができる。買い物・道案内など",
    ttsRate: "slow",
    sysRules: `LEVEL A2 (Elementary) — RULES:
VOCABULARY: Use common everyday vocabulary (~1500 words). Simple adjectives, basic adverbs (always, sometimes, never, very). NO advanced phrasal verbs. Avoid idioms.
GRAMMAR: Present simple/continuous, past simple, "going to" future, comparatives/superlatives, basic modals (can/could/must/should), "because/and/but/so" connectors. NO present perfect. NO passive. NO relative clauses.
SENTENCE LENGTH: 5-12 words per sentence. Maximum 2 clauses joined by "and/but/because".
YOUR RESPONSES: 1-2 sentences. Ask choice questions ("Do you prefer A or B?") or simple open questions.
BEHAVIOR: Be encouraging. If the user uses a word incorrectly, model the correct usage in your response without pointing out the error.
PACE: Slightly slower than normal.
TOPICS: Shopping, travel basics, family, hobbies, food, daily routines, simple descriptions.
ERRORS: Ignore minor errors. Only note if meaning is completely unclear.`,
    flashRules: `Generate A2 level sentences:
- Use present simple, present continuous, past simple, "going to" future
- Comparatives ("bigger than"), superlatives ("the best"), basic modals
- Vocabulary: common everyday words, ~1500 word range
- Sentence length: 5-10 words
- Topics: shopping, travel, daily life, preferences, simple descriptions
- Examples: "I usually wake up at 7.", "This restaurant is better than that one.", "Could you speak more slowly?"`,
    feedbackCriteria: `A2 evaluation criteria:
- Can they describe daily routines and habits?
- Can they use past tense correctly?
- Can they ask and answer about preferences?
- Can they use basic connectors (and, but, because)?
- Be lenient on article/preposition errors but note them as tips`,
  },
  B1: {
    id: "B1", label: "B1 中級", tag: "Intermediate",
    desc: "身近な話題について意見を述べ、理由を説明できる",
    ttsRate: "medium",
    sysRules: `LEVEL B1 (Intermediate) — RULES:
VOCABULARY: Use standard vocabulary (~3000 words). Common phrasal verbs (look forward to, get along with, turn out). Simple collocations. Avoid rare idioms.
GRAMMAR: All basic tenses + present perfect, past continuous, first conditional (if + present → will), basic passive voice, relative clauses (who/which/that), reported speech basics. NO subjunctive. NO mixed conditionals.
SENTENCE LENGTH: 8-18 words. Use 2-3 clause sentences with appropriate connectors (however, although, in addition).
YOUR RESPONSES: 2-3 sentences. Ask open-ended "Why/How" questions. Encourage opinions.
BEHAVIOR: Speak naturally but clearly. Push the user to express opinions and give reasons. If they use only simple structures, prompt them: "Can you tell me why?" or "What happened next?"
PACE: Normal conversational speed.
TOPICS: Opinions on familiar subjects, experiences, travel stories, work situations, plans, explanations.
ERRORS: Note significant grammar errors mentally for end-of-session feedback, but don't interrupt the conversation.`,
    flashRules: `Generate B1 level sentences:
- Use present perfect, past continuous, first conditional, passive voice, relative clauses
- Include opinion expressions ("I think...", "In my opinion...")
- Common phrasal verbs and collocations
- Sentence length: 8-15 words
- Topics: opinions, experiences, explanations, comparing options, giving reasons
- Examples: "I've never been to Europe, but I'd love to go.", "The meeting was canceled because the manager was sick.", "If it rains tomorrow, we should stay home."`,
    feedbackCriteria: `B1 evaluation criteria:
- Can they express opinions and give reasons?
- Can they use present perfect vs past simple appropriately?
- Can they form conditional sentences?
- Can they use connectors beyond "and/but"?
- Can they narrate a sequence of events?
- Note tense consistency errors and connector misuse`,
  },
  B2: {
    id: "B2", label: "B2 中上級", tag: "Upper Intermediate",
    desc: "幅広い話題で流暢に議論でき、詳細な説明ができる",
    ttsRate: "medium",
    sysRules: `LEVEL B2 (Upper Intermediate) — RULES:
VOCABULARY: Use wide-ranging vocabulary (~5000 words). Phrasal verbs, collocations, some idioms ("it's a no-brainer", "on the same page"). Register awareness (formal vs informal).
GRAMMAR: All tenses including past perfect, second/third conditionals, passive in various tenses, complex relative clauses, wish/if only, modals of deduction (must have/might have). Discourse markers (nevertheless, whereas, as a result).
SENTENCE LENGTH: 10-25 words. Complex sentences with multiple clauses. Varied sentence structure.
YOUR RESPONSES: 2-3 sentences. Challenge the user's ideas. Play devil's advocate occasionally. Ask follow-up questions that require detailed responses.
BEHAVIOR: Speak as you would to a competent non-native speaker. Use natural contractions (I'd, they've, wouldn't). Introduce new vocabulary in context. If the user gives a simple answer, push for elaboration.
PACE: Natural speed with some fast phrases.
TOPICS: Abstract topics, current affairs, professional discussions, hypothetical situations, analysis.
ERRORS: Expect mostly correct grammar. Note subtle errors (article usage, preposition collocations, tense nuances) for feedback.`,
    flashRules: `Generate B2 level sentences:
- Use second/third conditionals, past perfect, passive constructions, wish clauses
- Include idioms, phrasal verbs, and collocations
- Use discourse markers (however, nevertheless, furthermore)
- Sentence length: 12-20 words
- Topics: hypothetical situations, analysis, professional contexts, abstract ideas
- Examples: "If I had known about the delay, I would have taken a different route.", "The project is believed to have been completed ahead of schedule.", "She wishes she had studied abroad when she had the chance."`,
    feedbackCriteria: `B2 evaluation criteria:
- Can they discuss abstract topics with some detail?
- Can they use conditionals accurately (2nd/3rd)?
- Can they use passive voice naturally?
- Do they vary sentence structure (not always SVO)?
- Can they use discourse markers to organize ideas?
- Note: at B2, expect good accuracy. Flag subtle errors like collocation mistakes.`,
  },
  C1: {
    id: "C1", label: "C1 上級", tag: "Advanced",
    desc: "複雑な話題でも流暢かつ自然に議論できる。ニュアンスを表現",
    ttsRate: "fast",
    sysRules: `LEVEL C1 (Advanced) — RULES:
VOCABULARY: Use sophisticated vocabulary (~8000+ words). Idioms, metaphors, academic vocabulary, nuanced word choices (distinguish vs differentiate, implication vs consequence). Register shifting (casual ↔ formal within conversation).
GRAMMAR: All structures including mixed conditionals, inversion (Not only...but also, Rarely do we...), cleft sentences (What I mean is..., It was John who...), advanced modals, subjunctive (I suggest he go...). Complex noun phrases.
SENTENCE LENGTH: 12-30+ words. Sophisticated sentence structures with embedding, parenthetical remarks, and rhetorical devices.
YOUR RESPONSES: 2-4 sentences. Use natural, sophisticated English. Include cultural references, humor, sarcasm when appropriate. Challenge with complex questions requiring nuanced answers.
BEHAVIOR: Treat the user as a near-fluent speaker. Use fast natural speech patterns, contractions, ellipsis ("Sounds good" instead of "That sounds good"). Use nuanced vocabulary. If the user uses basic language, gently model more sophisticated alternatives.
PACE: Fast, natural speed. Include some rapid phrases and natural speech patterns.
TOPICS: Complex social issues, philosophical questions, professional strategy, cultural analysis, nuanced debates.
ERRORS: Expect high accuracy. Note lack of sophistication (using simple words when precise ones exist), unnatural collocations, and register inconsistencies.`,
    flashRules: `Generate C1 level sentences:
- Use mixed conditionals, inversion, cleft sentences, subjunctive mood
- Include idiomatic expressions, academic vocabulary, and nuanced word choices
- Use complex noun phrases and embedded clauses
- Sentence length: 15-25 words
- Topics: complex analysis, professional contexts, nuanced opinions, cultural commentary
- Examples: "Had it not been for her intervention, the negotiations would have collapsed entirely.", "What concerns me most is the lack of transparency in the decision-making process.", "The report suggests that the government reconsider its approach to renewable energy subsidies."`,
    feedbackCriteria: `C1 evaluation criteria:
- Can they express nuanced opinions with appropriate hedging?
- Can they use sophisticated vocabulary (not just "good/bad/big/small")?
- Can they vary register appropriately?
- Do they use complex grammar structures naturally (not just correctly)?
- Can they use idiomatic language and collocations accurately?

function pickVoice(topicId) {
  // シチュエーション別プールがあればそこからランダム
  const pool = SITUATION_VOICES[topicId];
  if (pool) return pool[Math.floor(Math.random() * pool.length)];

  // それ以外は重み付きランダム
  const entries = Object.entries(VOICE_WEIGHTS);
  const totalW = entries.reduce((s, [, w]) => s + w, 0);
  let r = Math.random() * totalW;
  for (const [id, w] of entries) {
    r -= w;
    if (r <= 0) return id;
  }
  return entries[0][0];
}

// ── Gemini API ──
async function geminiChat(messages, systemPrompt = "", json = false) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${S.geminiKey}`;
  const contents = messages.map(m => ({
    role: m.role === "assistant" ? "model" : "user",
    parts: [{ text: m.content }]
  }));
  const body = {
    contents,
    generationConfig: {
      temperature: json ? 0.3 : 0.8,
      maxOutputTokens: 2048,
      ...(json ? { responseMimeType: "application/json" } : {})
    }
  };
  if (systemPrompt) {
    body.systemInstruction = { parts: [{ text: systemPrompt }] };
  }
  const res = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
  if (!res.ok) throw new Error(`Gemini API ${res.status}`);
  const data = await res.json();
  const output = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
  // Track token usage (estimate: ~4 chars per token for English)
  const inChars = messages.reduce((a, m) => a + m.content.length, 0) + (systemPrompt?.length || 0);
  S.cost.geminiInTokens += Math.ceil(inChars / 4);
  S.cost.geminiOutTokens += Math.ceil(output.length / 4);
  return output;
}

// ── Azure TTS ──
let _curAudio = null;
function stopAudio() { if(_curAudio){_curAudio.pause();_curAudio=null;} }

async function speakText(text, voiceId = "en-US-JennyNeural") {
  if (!S.azureKey) throw new Error("Azure Speech キーが未設定です");
  stopAudio();
  S.cost.ttsChars += text.length;

  const voiceInfo = TTS_VOICES.find(v => v.id === voiceId) || TTS_VOICES[0];
  const rate = TTS_RATE[S.ftLevel] || "medium";

  // Escape XML special characters
  const xmlText = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

  const ssml = `<speak version='1.0' xmlns='http://www.w3.org/2001/10/synthesis' xml:lang='${voiceInfo.lang}'>
    <voice name='${voiceId}'>
      <prosody rate='${rate}'>${xmlText}</prosody>
    </voice>
  </speak>`;

  const url = `https://${S.azureRegion}.tts.speech.microsoft.com/cognitiveservices/v1`;
  const res = await fetch(url, {
    method: "POST",
    headers: {
      "Ocp-Apim-Subscription-Key": S.azureKey,
      "Content-Type": "application/ssml+xml",
      "X-Microsoft-OutputFormat": "audio-16khz-128kbitrate-mono-mp3"
    },
    body: ssml
  });
  if (!res.ok) throw new Error(`Azure TTS ${res.status}`);

  const audioBlob = await res.blob();
  const blobUrl = URL.createObjectURL(audioBlob);
  return new Promise((resolve, reject) => {
    _curAudio = new Audio(blobUrl);
    _curAudio.onended = () => { _curAudio = null; resolve(); };
    _curAudio.onerror = reject;
    _curAudio.play().catch(reject);
  });
}

// ── WAV Recording ──
async function recordWav(maxMs = 60000) {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: { channelCount: 1, sampleRate: 16000 } });
  const ctx = new AudioContext({ sampleRate: 16000 });
  const src = ctx.createMediaStreamSource(stream);
  const proc = ctx.createScriptProcessor(4096, 1, 1);
  const chunks = [];
  let stopped = false;
  const recStartTime = Date.now();
  proc.onaudioprocess = e => { if (!stopped) chunks.push(new Float32Array(e.inputBuffer.getChannelData(0))); };
  src.connect(proc); proc.connect(ctx.destination);
  const recorder = {
    stop: async () => {
      if (stopped) return new Blob([new ArrayBuffer(44)], {type:"audio/wav"}); // already stopped
      stopped = true;
      S.cost.sttSeconds += Math.round((Date.now() - recStartTime) / 1000);
      clearTimeout(_timeout);
      try { proc.disconnect(); } catch(e){}
      try { src.disconnect(); } catch(e){}
      stream.getTracks().forEach(t => t.stop());
      if (ctx.state !== "closed") { try { await ctx.close(); } catch(e){} }
      if (chunks.length === 0) return new Blob([new ArrayBuffer(44)], {type:"audio/wav"});
      const samples = new Float32Array(chunks.reduce((a, c) => a + c.length, 0));
      let off = 0; for (const c of chunks) { samples.set(c, off); off += c.length; }
      const pcm = new Int16Array(samples.length);
      for (let i = 0; i < samples.length; i++) pcm[i] = Math.max(-1, Math.min(1, samples[i])) * 32767;
      const wavBuf = new ArrayBuffer(44 + pcm.byteLength);
      const dv = new DataView(wavBuf);
      const sr = 16000, ch = 1, bps = 16;
      dv.setUint32(0,0x52494646,false); dv.setUint32(4,36+pcm.byteLength,true);
      dv.setUint32(8,0x57415645,false); dv.setUint32(12,0x666D7420,false);
      dv.setUint32(16,16,true); dv.setUint16(20,1,true); dv.setUint16(22,ch,true);
      dv.setUint32(24,sr,true); dv.setUint32(28,sr*ch*bps/8,true);
      dv.setUint16(32,ch*bps/8,true); dv.setUint16(34,bps,true);
      dv.setUint32(36,0x64617461,false); dv.setUint32(40,pcm.byteLength,true);
      new Uint8Array(wavBuf).set(new Uint8Array(pcm.buffer),44);
      return new Blob([wavBuf],{type:"audio/wav"});
    }
  };
  let _timeout = setTimeout(() => recorder.stop(), maxMs);
  return recorder;
}

// ── Azure STT (Speech-to-Text) ──
async function azureSTT(wavBlob) {
  if (!S.azureKey) throw new Error("Azure Speech キーが未設定です");
  if (!wavBlob || wavBlob.size <= 44) return ""; // empty audio
  const url = `https://${S.azureRegion}.stt.speech.microsoft.com/speech/recognition/conversation/cognitiveservices/v1?language=en-US`;
  const res = await fetch(url, {
    method: "POST",
    headers: {
      "Ocp-Apim-Subscription-Key": S.azureKey,
      "Content-Type": "audio/wav; codecs=audio/pcm; samplerate=16000"
    },
    body: wavBlob
  });
  if (!res.ok) throw new Error(`Azure STT ${res.status}`);
  const data = await res.json();
  if (data.RecognitionStatus === "InitialSilenceTimeout" || data.RecognitionStatus === "NoMatch") return "";
  if (data.RecognitionStatus !== "Success") throw new Error(`Recognition: ${data.RecognitionStatus}`);
  return data.DisplayText || "";
}

// ── Azure Pronunciation Assessment ──
async function azurePronAssess(wavBlob, refText) {
  if (!S.azureKey) throw new Error("Azure Speech キーが未設定です");
  const pronConfig = btoa(JSON.stringify({
    ReferenceText: refText,
    GradingSystem: "HundredMark",
    Granularity: "Word",
    Dimension: "Comprehensive",
    EnableMiscue: true
  }));
  const url = `https://${S.azureRegion}.stt.speech.microsoft.com/speech/recognition/conversation/cognitiveservices/v1?language=en-US`;
  const res = await fetch(url, {
    method: "POST",
    headers: {
      "Ocp-Apim-Subscription-Key": S.azureKey,
      "Content-Type": "audio/wav; codecs=audio/pcm; samplerate=16000",
      "Pronunciation-Assessment": pronConfig
    },
    body: wavBlob
  });
  if (!res.ok) throw new Error(`Azure PronAssess ${res.status}`);
  return await res.json();
}

// ── Cost Estimation ──
function calcCostHTML() {
  const c = S.cost;
  // Azure STT: $1.32/hour = $0.022/min
  const sttCost = (c.sttSeconds / 3600) * 1.32;
  // Azure TTS: $16/1M characters
  const ttsCost = (c.ttsChars / 1000000) * 16;
  // Gemini 2.5 Flash: Input $0.30/1M tokens, Output $2.50/1M tokens
  const gemInCost = (c.geminiInTokens / 1000000) * 0.30;
  const gemOutCost = (c.geminiOutTokens / 1000000) * 2.50;
  const total = sttCost + ttsCost + gemInCost + gemOutCost;
  const totalJPY = Math.round(total * 150 * 10) / 10; // 概算レート

  return `<div class="card">
    <div style="font-size:15px;font-weight:600;margin-bottom:12px">💰 API コスト概算</div>
    <div style="display:grid;grid-template-columns:auto 1fr auto;gap:4px 12px;font-size:13px;line-height:2">
      <span class="text-muted">Azure STT</span><span class="text-muted">${c.sttSeconds}秒</span><span>$${sttCost.toFixed(4)}</span>
      <span class="text-muted">Azure TTS</span><span class="text-muted">${c.ttsChars.toLocaleString()}文字</span><span>$${ttsCost.toFixed(4)}</span>
      <span class="text-muted">Gemini (入力)</span><span class="text-muted">~${c.geminiInTokens.toLocaleString()}トークン</span><span>$${gemInCost.toFixed(4)}</span>
      <span class="text-muted">Gemini (出力)</span><span class="text-muted">~${c.geminiOutTokens.toLocaleString()}トークン</span><span>$${gemOutCost.toFixed(4)}</span>
    </div>
    <div class="divider"></div>
    <div class="flex justify-between" style="font-size:15px;font-weight:700">
      <span>合計</span><span>$${total.toFixed(4)}（約${totalJPY}円）</span>
    </div>
  </div>`;
}

    </div>

    <div class="card">
      <div class="flex justify-between items-center mb-8">
        <div style="font-size:15px;font-weight:600">📋 最近のセッション</div>
        ${hist.length > 5 ? `<button class="btn-ghost text-xs" id="showAllHistory">すべて見る (${hist.length})</button>` : ''}
      </div>
      ${recent.map(h => {
        const d = new Date(h.date);
        const dateStr = (d.getMonth()+1) + '/' + d.getDate() + ' ' + d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');
        const icon = h.mode === 'freetalk' ? '🗣️' : '⚡';

        return '<div style="padding:10px 0;border-bottom:1px solid var(--border)">' +
          '<div class="flex justify-between items-center">' +
          '<div class="text-sm">' + icon + ' ' + esc(h.topic || h.mode) + '</div>' +

          '</div>';
      }).join('')}
    </div>` : ''}

    <div class="card" style="text-align:center">
      <button class="btn btn-ghost" id="settingsBtn">⚙️ APIキー設定</button>
      ${S.totalSessions > 0 ? '<button class="btn btn-ghost" id="clearDataBtn" style="color:var(--red)">🗑️ 履歴をクリア</button>' : ''}
    </div>
    <div class="text-xs text-muted" style="text-align:center;margin-top:8px;padding-bottom:16px">${VERSION}</div>
  `;
  $("startFreeTalk").onclick = () => { initFreeTalk(); };
  $("startFlash").onclick = () => { initFlash(); };
  $("settingsBtn").onclick = () => { S.screen = "apikey"; render(); };
  if ($("clearDataBtn")) $("clearDataBtn").onclick = clearAllData;
  if ($("showAllHistory")) $("showAllHistory").onclick = () => { S.screen = "history"; renderHistory(); };
}

async function startFreeTalkSession() {
  const topic = FT_ALL_TOPICS.find(t => t.id === S.ftTopic);
  const level = FT_LEVELS.find(l => l.id === S.ftLevel);
  if (!topic) return;
  S.ftSessionActive = true;
  S.ftStartTime = Date.now();
  S.cost = { sttSeconds: 0, ttsChars: 0, geminiInTokens: 0, geminiOutTokens: 0 };

  // 音声自動選択
  S.ftVoice = pickVoice(topic.id);
  const voiceLabel = getVoiceLabel(S.ftVoice);

  // For situation/role-play topics, add role-play instructions
  const isRolePlay = topic.catId === "situation";

  const sysPrompt = `You are a friendly English conversation partner.

${level.sysRules}

TOPIC: ${topic.prompt}
${isRolePlay ? "This is a ROLE-PLAY scenario. Stay in character throughout." : ""}

CRITICAL: Follow the level rules STRICTLY. Do NOT speak above the specified level.

Start the conversation with a friendly greeting related to the topic.`;

  S.chatHistory = [{ role: "user", content: "Start the conversation." }];
  S.chatMessages = [{ type: "system", text: `${topic.catIcon || '🗣️'} ${topic.label} — ${level.label}\n🔊 ${voiceLabel}` }];
  renderFreeTalkChat();
  showTyping();

  try {
    const reply = await geminiChat(S.chatHistory, sysPrompt);
    S.chatHistory.push({ role: "assistant", content: reply });
    S.chatMessages.push({ type: "ai", text: reply });
    hideTyping();
    renderFreeTalkChat();
    // Auto-speak AI response
    try { await speakText(reply, S.ftVoice); } catch(e) { console.warn("TTS:", e); }
  } catch(e) {
    hideTyping();
    S.chatMessages.push({ type: "system", text: `❌ Error: ${e.message}` });
    renderFreeTalkChat();
  }
}

function renderFreeTalkChat() {
  const msgs = S.chatMessages.map(m => {
    if (m.type === "system") return `<div class="msg msg-system">${esc(m.text)}</div>`;
    if (m.type === "ai") return `<div class="msg msg-ai">
      ${esc(m.text)}
      <div style="margin-top:8px"><button class="btn-ghost text-xs replay-btn" data-text="${esc(m.text).replace(/"/g,'&quot;')}">🔊 再生</button></div>
    </div>`;
    if (m.type === "user") return `<div class="msg msg-user">${esc(m.text)}</div>`;
    if (m.type === "feedback") return `<div class="msg msg-feedback">${m.html}</div>`;
    return "";
  }).join("");

  app.innerHTML = `
    <div class="navbar">
      <button class="back" id="ftChatBack">←</button>
      <div class="title">Free Talk</div>
      <button class="action" id="ftEndBtn">終了</button>
    </div>
    <div class="chat-area" id="chatArea">${msgs}<div id="typingIndicator" class="typing hidden"><span></span><span></span><span></span></div></div>
    <div class="chat-input-bar">
      <div class="inner">
        <input class="input" id="chatInput" placeholder="Type in English..." autocomplete="off">
        ${S.azureKey ? `<button class="mic-btn ${S.isRecording?'recording':S.isProcessing?'processing':'idle'}" id="micBtn">${S.isRecording?'⏹':S.isProcessing?'⏳':'🎤'}</button>` : ''}
        <button class="btn btn-primary" id="sendBtn" style="padding:12px 16px;border-radius:50%">↑</button>
      </div>
    </div>
  `;

  $("ftChatBack").onclick = () => {
    if (S.ftSessionActive && S.chatHistory.length > 2) {
      if (confirm("会話を終了しますか？フィードバックを取得できます。")) endFreeTalkSession();
      else return;
    }
    S.screen = "home"; stopAudio(); render();
  };
  $("ftEndBtn").onclick = () => endFreeTalkSession();

  // Send text
  const sendMsg = () => {
    const text = $("chatInput")?.value?.trim();
    if (!text) return;
    $("chatInput").value = "";
    handleUserMessage(text);
  };
  $("sendBtn").onclick = sendMsg;
  $("chatInput").onkeydown = e => { if (e.key === "Enter") sendMsg(); };

  // Mic
  if ($("micBtn")) $("micBtn").onclick = () => toggleRecording();

  // Replay buttons
  document.querySelectorAll(".replay-btn").forEach(btn => {
    btn.onclick = async () => {
      btn.textContent = "⏳";
      try { await speakText(btn.dataset.text, S.ftVoice); } catch(e) { console.warn(e); }
      btn.textContent = "🔊 再生";
    };
  });

  // Scroll to bottom
  const area = $("chatArea");
  if (area) area.scrollTop = area.scrollHeight;
}

function showTyping() {
  const el = $("typingIndicator");
  if (el) el.classList.remove("hidden");
  const area = $("chatArea");
  if (area) area.scrollTop = area.scrollHeight;
}
function hideTyping() {
  const el = $("typingIndicator");
  if (el) el.classList.add("hidden");
}

let _recorder = null;
async function toggleRecording() {
  if (S.isRecording) {
    // Stop
    S.isRecording = false;
    S.isProcessing = true;
    renderFreeTalkChat();
    try {
      const wavBlob = await _recorder.stop();
      _recorder = null;
      const text = await azureSTT(wavBlob);
      S.isProcessing = false;
      if (text) handleUserMessage(text);
      else { S.isProcessing = false; renderFreeTalkChat(); }
    } catch(e) {
      S.isProcessing = false;
      alert("音声認識エラー: " + e.message);
      renderFreeTalkChat();
    }
  } else {
    // Start
    try {
      _recorder = await recordWav(60000);
      S.isRecording = true;
      renderFreeTalkChat();
    } catch(e) {
      alert("マイクアクセスエラー: " + e.message);
    }
  }
}

async function handleUserMessage(text) {
  S.chatMessages.push({ type: "user", text });
  S.chatHistory.push({ role: "user", content: text });
  S.ftTurnCount++;
  renderFreeTalkChat();
  showTyping();

  const topic = FT_ALL_TOPICS.find(t => t.id === S.ftTopic);
  const level = FT_LEVELS.find(l => l.id === S.ftLevel);
  const isRolePlay = topic?.catId === "situation";
  const sysPrompt = `You are a friendly English conversation partner.
${level?.sysRules || "Speak naturally."}
Topic: ${topic?.prompt || "Free conversation"}.
${isRolePlay ? "Stay in character for this role-play scenario." : ""}`;

  try {
    const reply = await geminiChat(S.chatHistory, sysPrompt);
    S.chatHistory.push({ role: "assistant", content: reply });
    S.chatMessages.push({ type: "ai", text: reply });
    hideTyping();
    renderFreeTalkChat();
    try { await speakText(reply, S.ftVoice); } catch(e) { console.warn("TTS:", e); }
  } catch(e) {
    hideTyping();
    S.chatMessages.push({ type: "system", text: `❌ ${e.message}` });
    renderFreeTalkChat();
  }
}

async function endFreeTalkSession() {
  S.ftSessionActive = false;
  const elapsed = Math.max(1, Math.round((Date.now() - (S.ftStartTime || Date.now())) / 60000));
  const topic = FT_ALL_TOPICS.find(t => t.id === S.ftTopic);

  showTyping();
  // Get feedback from Gemini
  const userMsgs = S.chatHistory.filter(m => m.role === "user" && m.content !== "Start the conversation.").map(m => m.content);
  const level = CEFR_LEVELS[S.ftLevel] || CEFR_LEVELS.B1;
  const feedbackPrompt = `You are an English teacher reviewing a student's conversation practice.
The student's CEFR level: ${level.id} (${level.tag})

${level.feedbackCriteria}

The student said these sentences during a conversation:
${userMsgs.map((m,i) => `${i+1}. "${m}"`).join("\n")}

Provide feedback in this JSON format:
{
  "overallScore": 75,
  "grammar": {"score": 80, "issues": ["specific issue 1"]},
  "vocabulary": {"score": 70, "level": "${level.id}", "suggestions": ["better word choices or expressions the student could have used"]},
  "naturalness": {"score": 75, "notes": ["what sounded natural", "what sounded unnatural"]},
  "corrections": [{"original": "what user said", "corrected": "better version", "explanation": "why"}],
  "cefrAssessment": "Brief assessment: does the student seem to be at ${level.id} level, or should they move up/down?",
  "encouragement": "A brief encouraging message in Japanese"
}`;

  try {
    const raw = await geminiChat(
      [{ role: "user", content: feedbackPrompt }],
      "You are an English language evaluator. Respond ONLY in valid JSON.",
      true
    );
    hideTyping();
    const fb = JSON.parse(raw);
    S._lastFeedback = fb;
    saveSession({
      mode: "freetalk",
      topic: topic?.label || S.ftTopic,
      level: S.ftLevel,
      score: fb.overallScore || 0,
      minutes: elapsed,
      turns: S.ftTurnCount,
      voice: S.ftVoice,
    });
    S.screen = "review";
    render();
  } catch(e) {
    hideTyping();
    S.chatMessages.push({ type: "system", text: `フィードバック取得失敗: ${e.message}` });
    renderFreeTalkChat();
  }
}

// ═══════════════════════════════════
// REVIEW / FEEDBACK
// ═══════════════════════════════════
function renderReview() {
  const fb = S._lastFeedback;
  if (!fb) { S.screen = "home"; render(); return; }

  const scoreColor = fb.overallScore >= 80 ? "var(--green)" : fb.overallScore >= 60 ? "var(--yellow)" : "var(--red)";
  const corrections = (fb.corrections || []).map(c => `
    <div style="padding:12px 0;border-bottom:1px solid var(--border)">
      <div class="text-sm"><span class="text-red">✗</span> ${esc(c.original)}</div>
      <div class="text-sm mt-8"><span class="text-green">✓</span> ${esc(c.corrected)}</div>
      <div class="text-xs text-muted mt-8">${esc(c.explanation)}</div>
    </div>
  `).join("") || '<div class="text-sm text-muted">特に修正点はありません！</div>';

  app.innerHTML = `
    <div class="navbar">
      <button class="back" id="revBack">←</button>
      <div class="title">Session Review</div>
    </div>

    <div class="summary-header">
      <div class="score" style="color:${scoreColor}">${fb.overallScore}</div>
      <div class="label">Overall Score</div>
    </div>

    <div class="stats-grid mb-16">
      <div class="stat-card"><div class="val" style="color:${fb.grammar?.score>=80?'var(--green)':fb.grammar?.score>=60?'var(--yellow)':'var(--red)'}">${fb.grammar?.score || '-'}</div><div class="lbl">Grammar</div></div>
      <div class="stat-card"><div class="val" style="color:${fb.vocabulary?.score>=80?'var(--green)':fb.vocabulary?.score>=60?'var(--yellow)':'var(--red)'}">${fb.vocabulary?.score || '-'}</div><div class="lbl">Vocabulary</div></div>
      <div class="stat-card"><div class="val" style="color:${fb.naturalness?.score>=80?'var(--green)':fb.naturalness?.score>=60?'var(--yellow)':'var(--red)'}">${fb.naturalness?.score || '-'}</div><div class="lbl">Naturalness</div></div>
      <div class="stat-card"><div class="val text-accent">${S.ftTurnCount}</div><div class="lbl">Turns</div></div>
    </div>

    ${fb.grammar?.issues?.length ? `
    <div class="card">
      <div style="font-size:14px;font-weight:600;margin-bottom:12px">📝 Grammar Issues</div>
      ${fb.grammar.issues.map(i => `<div class="text-sm" style="padding:6px 0;color:var(--yellow)">• ${esc(i)}</div>`).join("")}
    </div>` : ''}

    <div class="card">
      <div style="font-size:14px;font-weight:600;margin-bottom:12px">🔄 Corrections</div>
      ${corrections}
    </div>

    ${fb.vocabulary?.suggestions?.length ? `
    <div class="card">
      <div style="font-size:14px;font-weight:600;margin-bottom:12px">📚 Vocabulary Tips</div>
      ${fb.vocabulary.suggestions.map(s => `<div class="text-sm" style="padding:6px 0">💡 ${esc(s)}</div>`).join("")}
    </div>` : ''}

    ${fb.cefrAssessment ? `
    <div class="card">
      <div style="font-size:15px;font-weight:600;margin-bottom:12px">🎯 CEFR レベル判定</div>
      <div class="text-sm">${esc(fb.cefrAssessment)}</div>
    </div>` : ''}

    ${fb.encouragement ? `
    <div class="card card-glow" style="text-align:center;padding:24px">
      <div style="font-size:24px;margin-bottom:8px">🎉</div>
      <div class="text-sm">${esc(fb.encouragement)}</div>
    </div>` : ''}

    <button class="btn btn-primary w-full mt-16" id="revHome">ホームに戻る</button>
    <button class="btn btn-secondary w-full mt-8 mb-16" id="revAgain">もう一度練習する</button>
  `;
  // Insert cost card before buttons
  const costPos = app.querySelector('#revHome');
  if (costPos) costPos.insertAdjacentHTML('beforebegin', calcCostHTML());
  $("revBack").onclick = $("revHome").onclick = () => { S.screen = "home"; render(); };
  $("revAgain").onclick = () => initFreeTalk();
}

// ═══════════════════════════════════
// FLASH TRANSLATION (瞬間英作文)
// ═══════════════════════════════════
const FLASH_CATEGORIES = [
  { id: "daily", label: "🏠 日常会話" },
  { id: "business", label: "💼 ビジネス" },
  { id: "travel", label: "✈️ 旅行" },
  { id: "opinion", label: "💭 意見・感想" },
];

function initFlash() {
  S.screen = "flash";
  S.flashQuestions = [];
  S.flashCurrent = 0;
  S.flashResults = [];
  renderFlashSetup();
}

function renderFlashSetup() {
  app.innerHTML = `
    <div class="navbar">
      <button class="back" id="flBack">←</button>
      <div class="title">Flash Translation</div>
    </div>
    <div class="card">
      <div style="font-size:14px;font-weight:600;margin-bottom:12px">📊 レベル</div>
      <div class="level-select">
        ${Object.values(CEFR_LEVELS).map(l => `<div class="level-chip ${S.flashLevel===l.id?'active':''}" data-id="${l.id}">${l.label}</div>`).join("")}
      </div>
    </div>
    <div class="card">
      <div style="font-size:14px;font-weight:600;margin-bottom:12px">📋 カテゴリ</div>
      <div class="topic-grid">
        ${FLASH_CATEGORIES.map(c => `<div class="topic-pill ${S.flashCategory===c.id?'selected':''}" data-id="${c.id}">${c.label}</div>`).join("")}
      </div>
    </div>
    <button class="btn btn-primary w-full mt-16" id="flashStartBtn">10問スタート</button>
    ${!S.azureKey ? '<p class="text-xs text-red mt-8" style="text-align:center">⚠️ Azure Speech未設定：音声入力・読み上げ不可</p>' : ''}
  `;
  $("flBack").onclick = () => { S.screen = "home"; render(); };
  document.querySelectorAll(".level-chip").forEach(el => {
    el.onclick = () => { S.flashLevel = el.dataset.id; renderFlashSetup(); };
  });
  document.querySelectorAll(".topic-pill").forEach(el => {
    el.onclick = () => { S.flashCategory = el.dataset.id; renderFlashSetup(); };
  });
  $("flashStartBtn").onclick = () => generateFlashQuestions();
}

async function generateFlashQuestions() {
  // Flash用に音声自動選択 & コストリセット
  S.ftVoice = pickVoice("flash");
  S.cost = { sttSeconds: 0, ttsChars: 0, geminiInTokens: 0, geminiOutTokens: 0 };
  app.innerHTML = `
    <div style="text-align:center;padding:80px 0">
      <div class="typing" style="justify-content:center;margin-bottom:16px"><span></span><span></span><span></span></div>
      <div class="text-sm text-muted">問題を生成中...</div>
    </div>
  `;
  const cat = FLASH_CATEGORIES.find(c => c.id === S.flashCategory);
  const prompt = `Generate 10 Japanese-to-English translation exercises.

Category: ${cat.label}

${(CEFR_LEVELS[S.flashLevel] || CEFR_LEVELS.A2).flashRules}

- Make sentences practical and useful in real life
- Provide 1-2 alternative correct answers when possible

Respond ONLY in JSON:
{"questions": [{"ja": "日本語文", "en": "English sentence", "alt": ["alternative answer 1"], "hint": "key grammar/vocab hint"}]}`;

  try {
    const raw = await geminiChat([{ role: "user", content: prompt }], "Generate translation exercises. JSON only.", true);
    const data = JSON.parse(raw);
    S.flashQuestions = data.questions || [];
    if (S.flashQuestions.length === 0) throw new Error("問題が生成されませんでした");
    S.flashCurrent = 0;
    S.flashResults = [];
    renderFlashQuestion();
  } catch(e) {
    app.innerHTML = `
      <div class="card" style="text-align:center;padding:32px">
        <div style="font-size:24px;margin-bottom:12px">❌</div>
        <div class="text-sm">${esc(e.message)}</div>
        <button class="btn btn-secondary mt-16" id="flashRetry">リトライ</button>
        <button class="btn btn-ghost mt-8" id="flashBack">戻る</button>
      </div>
    `;
    $("flashRetry").onclick = () => generateFlashQuestions();
    $("flashBack").onclick = () => { S.screen = "home"; render(); };
  }
}

function renderFlashQuestion() {
  const q = S.flashQuestions[S.flashCurrent];
  if (!q) { renderFlashSummary(); return; }
  const progress = ((S.flashCurrent) / S.flashQuestions.length * 100).toFixed(0);

  app.innerHTML = `
    <div class="navbar">
      <button class="back" id="flqBack">←</button>
      <div class="title">Flash Translation</div>
      <div class="text-xs text-muted">${S.flashCurrent + 1}/${S.flashQuestions.length}</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>

    <div class="card flash-card">
      <div class="flash-ja">${esc(q.ja)}</div>
      <div class="flash-hint">💡 ${esc(q.hint || '')}</div>

      <div id="flashInputArea">
        ${S.azureKey ? `
        <button class="mic-btn idle" id="flashMic" style="margin:0 auto 16px;display:flex">🎤</button>
        <div class="text-xs text-muted mb-16">タップして英語で答える</div>
        ` : ''}
        <div class="flex gap-8">
          <input class="input" id="flashTextInput" placeholder="Type your answer..." autocomplete="off" style="border-radius:24px">
          <button class="btn btn-primary" id="flashSendBtn" style="padding:12px 16px;border-radius:50%;flex-shrink:0">↑</button>
        </div>
      </div>

      <div id="flashResult" class="hidden"></div>
    </div>

    <button class="btn btn-ghost w-full" id="flashSkipBtn">スキップ →</button>
  `;

  $("flqBack").onclick = () => {
    if (confirm("練習を中断しますか？")) { S.screen = "home"; render(); }
  };
  $("flashSkipBtn").onclick = () => {
    S.flashResults.push({ ja: q.ja, en: q.en, userAnswer: "(skipped)", score: 0 });
    S.flashCurrent++;
    renderFlashQuestion();
  };

  const submitAnswer = (text) => evaluateFlashAnswer(text, q);
  $("flashSendBtn").onclick = () => {
    const t = $("flashTextInput")?.value?.trim();
    if (t) submitAnswer(t);
  };
  $("flashTextInput").onkeydown = e => { if (e.key === "Enter") { const t = e.target.value.trim(); if (t) submitAnswer(t); } };

  if ($("flashMic")) {
    let rec = null;
    $("flashMic").onclick = async () => {
      if (rec) {
        // Stop
        $("flashMic").className = "mic-btn processing";
        $("flashMic").textContent = "⏳";
        try {
          const wav = await rec.stop();
          rec = null;
          const text = await azureSTT(wav);
          if (text) submitAnswer(text);
          else { $("flashMic").className = "mic-btn idle"; $("flashMic").textContent = "🎤"; }
        } catch(e) {
          alert("認識エラー: " + e.message);
          $("flashMic").className = "mic-btn idle"; $("flashMic").textContent = "🎤";
        }
      } else {
        // Start
        try {
          rec = await recordWav(20000);
          $("flashMic").className = "mic-btn recording";
          $("flashMic").textContent = "⏹";
        } catch(e) { alert("マイクエラー: " + e.message); }
      }
    };
  }

  // Focus input
  setTimeout(() => $("flashTextInput")?.focus(), 100);
}

async function evaluateFlashAnswer(userAnswer, q) {
  // Disable inputs
  if ($("flashMic")) $("flashMic").disabled = true;
  if ($("flashSendBtn")) $("flashSendBtn").disabled = true;
  if ($("flashTextInput")) $("flashTextInput").disabled = true;

  const resultEl = $("flashResult");
  resultEl.classList.remove("hidden");
  resultEl.innerHTML = '<div class="typing" style="justify-content:center"><span></span><span></span><span></span></div>';

  try {
    const evalPrompt = `Compare the user's English translation with the correct answer.

Japanese: ${q.ja}
Correct answer: ${q.en}
${q.alt?.length ? `Alternative answers: ${q.alt.join(", ")}` : ""}
User's answer: ${userAnswer}

Evaluate and respond in JSON:
{
  "score": 85,
  "isCorrect": true,
  "feedback": "Brief feedback in Japanese about what was good/wrong",
  "correctedVersion": "The ideal version if user was wrong, or their version if correct"
}

Scoring guide:
- 90-100: Perfect or near-perfect
- 70-89: Minor issues (article, preposition, etc.)
- 50-69: Understandable but significant errors
- 0-49: Major errors or wrong meaning`;

    const raw = await geminiChat([{ role: "user", content: evalPrompt }], "English teacher evaluator. JSON only.", true);
    const ev = JSON.parse(raw);

    const scoreColor = ev.score >= 80 ? "var(--green)" : ev.score >= 60 ? "var(--yellow)" : "var(--red)";

    resultEl.innerHTML = `
      <div class="flash-answer">
        <div style="font-size:32px;font-weight:800;color:${scoreColor};margin-bottom:8px">${ev.score}</div>
        <div class="text-sm mb-8"><strong>あなた:</strong> ${esc(userAnswer)}</div>
        <div class="text-sm mb-8"><strong>模範:</strong> <span class="correct">${esc(q.en)}</span></div>
        ${!ev.isCorrect ? `<div class="text-sm mb-8"><strong>修正:</strong> ${esc(ev.correctedVersion)}</div>` : ''}
        <div class="text-xs text-muted">${esc(ev.feedback)}</div>
      </div>
      <button class="btn btn-primary w-full mt-16" id="flashNextBtn">次の問題 →</button>
    `;

    S.flashResults.push({
      ja: q.ja, en: q.en, userAnswer, score: ev.score,
      isCorrect: ev.isCorrect, feedback: ev.feedback
    });

    $("flashNextBtn").onclick = () => { S.flashCurrent++; renderFlashQuestion(); };

    // Speak correct answer
    try { await speakText(q.en, S.ftVoice); } catch(e) { console.warn(e); }

  } catch(e) {
    resultEl.innerHTML = `<div class="text-sm text-red">評価エラー: ${esc(e.message)}</div>
      <button class="btn btn-secondary mt-8" id="flashNextBtn">次へ →</button>`;
    S.flashResults.push({ ja: q.ja, en: q.en, userAnswer, score: 0 });
    $("flashNextBtn").onclick = () => { S.flashCurrent++; renderFlashQuestion(); };
  }
}

function renderFlashSummary() {
  const results = S.flashResults;
  const avg = results.length > 0 ? Math.round(results.reduce((a, r) => a + r.score, 0) / results.length) : 0;
  const perfect = results.filter(r => r.score >= 90).length;
  const good = results.filter(r => r.score >= 60 && r.score < 90).length;
  const poor = results.filter(r => r.score < 60).length;

  S.totalSessions++;
  S.totalMinutes += 5;
  saveSession({
    mode: "flash",
    topic: FLASH_CATEGORIES.find(c => c.id === S.flashCategory)?.label || S.flashCategory,
    level: S.flashLevel,
    score: avg,
    minutes: 5,
    voice: S.ftVoice,
  });

  const scoreColor = avg >= 80 ? "var(--green)" : avg >= 60 ? "var(--yellow)" : "var(--red)";

  const reviewItems = results.map((r, i) => `
    <div style="padding:12px 0;border-bottom:1px solid var(--border)">
      <div class="flex justify-between items-center">
        <div class="text-sm" style="flex:1">${esc(r.ja)}</div>
        <div class="tag ${r.score>=80?'tag-green':r.score>=60?'tag-orange':'tag-accent'}">${r.score}</div>
      </div>
      <div class="text-xs text-muted mt-8">${esc(r.en)}</div>
      ${r.userAnswer !== "(skipped)" ? `<div class="text-xs mt-8" style="color:${r.isCorrect?'var(--green)':'var(--red)'}">→ ${esc(r.userAnswer)}</div>` : '<div class="text-xs mt-8 text-muted">→ スキップ</div>'}
    </div>
  `).join("");

  app.innerHTML = `
    <div class="navbar">
      <button class="back" id="fsBck">←</button>
      <div class="title">結果</div>
    </div>

    <div class="summary-header">
      <div class="score" style="color:${scoreColor}">${avg}</div>
      <div class="label">Average Score</div>
    </div>

    <div class="stats-grid mb-16">
      <div class="stat-card"><div class="val text-green">${perfect}</div><div class="lbl">Perfect</div></div>
      <div class="stat-card"><div class="val" style="color:var(--yellow)">${good}</div><div class="lbl">Good</div></div>
    </div>

    <div class="card">
      <div style="font-size:14px;font-weight:600;margin-bottom:12px">📋 全問レビュー</div>
      ${reviewItems}
    </div>

    <button class="btn btn-primary w-full mt-16" id="fsHome">ホームに戻る</button>
    <button class="btn btn-secondary w-full mt-8 mb-16" id="fsAgain">もう10問</button>
  `;
  // Insert cost card
  const fsCostPos = app.querySelector('#fsHome');
  if (fsCostPos) fsCostPos.insertAdjacentHTML('beforebegin', calcCostHTML());
  $("fsBck").onclick = $("fsHome").onclick = () => { S.screen = "home"; render(); };
  $("fsAgain").onclick = () => initFlash();
}

// ── Service Worker ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ── Init ──
render();
</script>
</body>
</html>
