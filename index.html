<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f0f4f8">
<title>English Talk Trainer</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon-180.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon-180.png">
<link rel="apple-touch-icon" sizes="167x167" href="apple-touch-icon-167.png">
<link rel="apple-touch-icon" sizes="152x152" href="apple-touch-icon-152.png">
<link rel="apple-touch-icon" sizes="120x120" href="apple-touch-icon-120.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f0f4f8;--surface:#ffffff;--card:#ffffff;--border:#d1d9e6;
  --text:#1a2a3a;--muted:#5a6a7a;--accent:#4f46e5;--accent2:#6d5cdb;
  --green:#059669;--yellow:#b45309;--red:#dc2626;--blue:#2563eb;
  --orange:#c2410c;
  --font:'Outfit',system-ui,-apple-system,sans-serif;
  --mono:'JetBrains Mono','SF Mono',monospace;
}
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow-x:hidden;-webkit-tap-highlight-color:transparent;font-size:16px}
#app{max-width:520px;margin:0 auto;padding:16px;min-height:100vh;position:relative}

/* ── Buttons ── */
.btn{padding:14px 24px;border:none;border-radius:12px;font-family:var(--font);font-weight:600;font-size:16px;cursor:pointer;touch-action:manipulation;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(79,70,229,.25)}
.btn-primary:active{transform:scale(.97);filter:brightness(1.1)}
.btn-secondary{background:var(--surface);color:var(--text);border:1.5px solid var(--border)}
.btn-secondary:active{background:var(--bg)}
.btn-ghost{background:transparent;color:var(--muted);padding:10px 14px;font-size:15px}
.btn-ghost:active{color:var(--text)}
.btn-danger{background:#fef2f2;color:var(--red);border:1.5px solid #fecaca}
.btn:disabled{opacity:.4;pointer-events:none}

/* ── Cards ── */
.card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.card-glow{box-shadow:0 2px 16px rgba(79,70,229,.1)}

/* ── Inputs ── */
.input{width:100%;padding:14px 16px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font);font-size:16px;outline:none;transition:border .2s}
.input:focus{border-color:var(--accent)}
.input::placeholder{color:#8a9ab0}

/* ── Tags / Badges ── */
.tag{display:inline-block;padding:4px 10px;border-radius:20px;font-size:13px;font-weight:600;letter-spacing:.3px}
.tag-accent{background:#ede9fe;color:var(--accent)}
.tag-green{background:#d1fae5;color:var(--green)}
.tag-orange{background:#ffedd5;color:var(--orange)}

/* ── Home Screen ── */
.home-header{text-align:center;padding:36px 0 28px}
.home-header .pre{font-size:13px;font-weight:600;letter-spacing:3px;color:var(--accent);margin-bottom:8px;text-transform:uppercase}
.home-header h1{font-size:30px;font-weight:800;color:var(--text);margin-bottom:6px}
.home-header .sub{font-size:15px;color:var(--muted);font-weight:400}

.mode-card{position:relative;padding:24px;border-radius:20px;cursor:pointer;transition:all .25s;overflow:hidden;touch-action:manipulation}
.mode-card:active{transform:scale(.98)}
.mode-card .icon{font-size:36px;margin-bottom:12px}
.mode-card h3{font-size:20px;font-weight:700;margin-bottom:6px}
.mode-card p{font-size:15px;color:var(--muted);line-height:1.6}
.mode-card .arrow{position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:22px;color:var(--muted);transition:transform .2s}
.mode-card:active .arrow{transform:translateY(-50%) translateX(4px)}

.mode-freetalk{background:#ede9fe;border:1.5px solid #c4b5fd;color:#3b2e8a}
.mode-freetalk h3{color:#3b2e8a}
.mode-flash{background:#d1fae5;border:1.5px solid #86efac;color:#065f46}
.mode-flash h3{color:#065f46}

/* ── Chat UI ── */
.chat-area{display:flex;flex-direction:column;gap:12px;padding-bottom:110px;min-height:60vh}
.msg{max-width:85%;padding:16px 20px;border-radius:18px;font-size:16px;line-height:1.7;animation:msgIn .3s ease}
.msg-ai{background:var(--surface);border:1.5px solid var(--border);border-bottom-left-radius:4px;align-self:flex-start;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.msg-user{background:var(--accent);color:#fff;border-bottom-right-radius:4px;align-self:flex-end;box-shadow:0 1px 3px rgba(79,70,229,.2)}
.msg-system{align-self:center;background:#ede9fe;border:1.5px solid #c4b5fd;color:#4f46e5;font-size:14px;padding:10px 18px;border-radius:20px;text-align:center;font-weight:600}
.msg-feedback{background:#f0fdf4;border:1.5px solid #86efac;border-radius:14px;padding:18px;align-self:stretch;font-size:15px;line-height:1.7}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.chat-input-bar{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(transparent,var(--bg) 20%);padding:12px 16px 20px;z-index:100}
.chat-input-bar .inner{max-width:520px;margin:0 auto;display:flex;gap:8px;align-items:center}
.chat-input-bar .inner .input{flex:1;border-radius:24px;padding:14px 20px;background:var(--surface);font-size:16px}

/* ── Mic Button ── */
.mic-btn{width:64px;height:64px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:28px;transition:all .15s;touch-action:manipulation;flex-shrink:0;-webkit-user-select:none;user-select:none}
.mic-btn.idle{background:var(--surface);border:2.5px solid var(--border);color:var(--muted)}
.mic-btn.idle:active{background:var(--border);transform:scale(.92)}
.mic-btn.recording{background:var(--red);color:#fff;animation:pulse 1.5s infinite;border:2.5px solid var(--red)}
.mic-btn.processing{background:var(--surface);border:2px solid var(--accent);color:var(--accent);animation:spin 1s linear infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.3)}50%{box-shadow:0 0 0 14px rgba(220,38,38,0)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* ── Flash Translation ── */
.flash-card{text-align:center;padding:32px 24px}
.flash-ja{font-size:24px;font-weight:700;margin-bottom:10px;line-height:1.5;color:var(--text)}
.flash-hint{font-size:14px;color:var(--muted);margin-bottom:24px}
.flash-answer{font-size:17px;padding:18px;background:var(--bg);border-radius:12px;margin-top:16px;border:1.5px solid var(--border);line-height:1.7;text-align:left}
.flash-answer .correct{color:var(--green);font-weight:600}
.flash-answer .wrong{color:var(--red);text-decoration:line-through}
.flash-result{display:flex;gap:12px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.flash-score{text-align:center;padding:12px 16px}
.flash-score .num{font-size:30px;font-weight:800}
.flash-score .label{font-size:13px;color:var(--muted);margin-top:2px}

/* ── Progress Bar ── */
.progress-bar{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin:12px 0}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .3s}

/* ── Session Summary ── */
.summary-header{text-align:center;padding:24px 0}
.summary-header .score{font-size:52px;font-weight:800;color:var(--accent)}
.summary-header .label{font-size:16px;color:var(--muted);margin-top:4px}

/* ── Loading / Typing ── */
.typing{display:flex;gap:5px;padding:16px;align-self:flex-start}
.typing span{width:10px;height:10px;background:#94a3b8;border-radius:50%;animation:typing .8s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes typing{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#c1cad6;border-radius:3px}

/* ── Misc ── */
.divider{height:1px;background:var(--border);margin:16px 0}
.text-sm{font-size:15px}.text-xs{font-size:13px}
.text-muted{color:var(--muted)}
.text-green{color:var(--green)}
.text-red{color:var(--red)}
.text-accent{color:var(--accent)}
.mt-8{margin-top:8px}.mt-16{margin-top:16px}.mt-24{margin-top:24px}
.mb-8{margin-bottom:8px}.mb-16{margin-bottom:16px}
.flex{display:flex}.gap-8{gap:8px}.gap-12{gap:12px}
.items-center{align-items:center}.justify-between{justify-content:space-between}
.w-full{width:100%}
.hidden{display:none!important}

/* ── Topic Pills ── */
.topic-grid{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
.topic-pill{padding:10px 18px;border-radius:20px;background:var(--bg);border:1.5px solid var(--border);color:var(--text);font-size:15px;cursor:pointer;transition:all .2s;touch-action:manipulation}
.topic-pill:active{background:var(--accent);border-color:var(--accent);color:#fff}
.topic-pill.selected{background:#ede9fe;border-color:var(--accent);color:var(--accent);font-weight:600}

/* ── Word Score Colors ── */
.ws-great{color:var(--green)}.ws-good{color:var(--yellow)}.ws-poor{color:var(--red)}

/* ── Settings Row ── */
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border)}
.setting-row:last-child{border-bottom:none}
.setting-label{font-size:16px;font-weight:500}
.setting-value{font-size:15px;color:var(--muted)}

/* ── Navbar ── */
.navbar{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.navbar .back{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;padding:6px;touch-action:manipulation}
.navbar .title{font-size:18px;font-weight:700;flex:1;color:var(--text)}
.navbar .action{background:none;border:none;color:var(--accent);font-size:15px;font-weight:700;cursor:pointer;touch-action:manipulation}

/* ── Level Select ── */
.level-select{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
.level-chip{padding:10px 14px;text-align:center;border-radius:10px;background:var(--bg);border:1.5px solid var(--border);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;touch-action:manipulation;color:var(--text)}
.level-chip.active{background:#ede9fe;border-color:var(--accent);color:var(--accent)}

/* ── Stats Grid ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}
.stat-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.stat-card .val{font-size:28px;font-weight:700}
.stat-card .lbl{font-size:13px;color:var(--muted);margin-top:4px}


/* ── Streak Calendar ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin:8px 0}
.cal-day{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
.cal-day.empty{background:transparent}
.cal-day.no{background:var(--bg);color:var(--muted)}
.cal-day.yes{background:#d1fae5;color:var(--green)}
.cal-day.today{border:2px solid var(--accent)}
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.streak-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;background:linear-gradient(135deg,#fef3c7,#fde68a);color:#92400e;font-weight:700;font-size:14px}

/* ── Waveform ── */
.waveform{display:flex;align-items:center;justify-content:center;gap:3px;height:40px;margin:8px 0}
.waveform .bar{width:4px;background:var(--red);border-radius:2px;transition:height .05s;min-height:4px}

/* ── Shadowing ── */
.shadow-card{text-align:center;padding:28px 20px}
.shadow-text{font-size:20px;font-weight:600;line-height:1.7;margin:20px 0;color:var(--text)}
.shadow-status{font-size:14px;color:var(--muted);margin-bottom:16px}
.mode-shadow{background:#fef3c7;border:1.5px solid #fde68a;color:#78350f}
.mode-shadow h3{color:#78350f}

/* ── Vocab Notebook ── */
.vocab-entry{padding:12px 0;border-bottom:1px solid var(--border)}
.vocab-en{font-size:16px;font-weight:600;color:var(--accent)}
.vocab-ja{font-size:14px;color:var(--muted);margin-top:2px}
.vocab-ctx{font-size:12px;color:var(--muted);font-style:italic;margin-top:4px}

/* ── Challenge Expressions ── */
.challenge-card{background:linear-gradient(135deg,#ede9fe,#ddd6fe);border:2px solid #c4b5fd;border-radius:16px;padding:20px;margin-bottom:12px;align-self:stretch}
.challenge-title{font-size:16px;font-weight:700;color:#3b2e8a;margin-bottom:12px}
.challenge-expr{padding:10px 14px;margin:6px 0;background:rgba(255,255,255,.6);border-radius:10px;border:1px solid #c4b5fd}
.challenge-expr .expr-en{font-size:17px;font-weight:700;color:#3b2e8a}
.challenge-expr .expr-ja{font-size:14px;color:#5b4e9a;margin-top:2px}
.challenge-expr .expr-ex{font-size:12px;color:#7c6fbf;margin-top:4px;font-style:italic}
.challenge-expr.used{background:rgba(5,150,105,.1);border-color:var(--green)}
.challenge-expr.used .expr-en{color:var(--green);text-decoration:line-through}

/* ── Review Quiz ── */
.review-prompt{background:#fef3c7;border:1.5px solid #fde68a;border-radius:14px;padding:16px;margin-bottom:14px;cursor:pointer;touch-action:manipulation}
.review-prompt:active{transform:scale(.98)}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ═══════════════════════════════════════════════
   English Talk Trainer
   フリートーク + 瞬間英作文
   Gemini 2.5 Flash + Azure Speech + PWA
   ═══════════════════════════════════════════════ */

const VERSION = "v2026.05.06i";

const $ = id => document.getElementById(id);
const app = document.getElementById("app");
const GEMINI_MODELS = [
  { id: "gemini-2.5-flash", label: "2.5 Flash（速い・安い）" },
  { id: "gemini-2.5-pro", label: "2.5 Pro（高精度・安定）" },
];
let GEMINI_MODEL = localStorage.getItem("gemini_model") || "gemini-2.5-flash";

// ── Azure TTS Neural Voices ──
const TTS_VOICES = [
  { id: "en-US-JennyNeural",   label: "👩 Jenny",   desc: "🇺🇸 アメリカ女性・フレンドリー", lang: "en-US" },
  { id: "en-US-GuyNeural",     label: "👨 Guy",     desc: "🇺🇸 アメリカ男性・落ち着き", lang: "en-US" },
  { id: "en-US-AriaNeural",    label: "👩 Aria",    desc: "🇺🇸 アメリカ女性・明るい", lang: "en-US" },
  { id: "en-US-DavisNeural",   label: "👨 Davis",   desc: "🇺🇸 アメリカ男性・カジュアル", lang: "en-US" },
  { id: "en-GB-SoniaNeural",   label: "👩 Sonia",   desc: "🇬🇧 イギリス女性", lang: "en-GB" },
  { id: "en-GB-RyanNeural",    label: "👨 Ryan",    desc: "🇬🇧 イギリス男性", lang: "en-GB" },
  { id: "en-AU-NatashaNeural", label: "👩 Natasha", desc: "🇦🇺 オーストラリア女性", lang: "en-AU" },
  { id: "en-AU-WilliamNeural", label: "👨 William", desc: "🇦🇺 オーストラリア男性", lang: "en-AU" },
  { id: "en-IN-NeerjaNeural",  label: "👩 Neerja",  desc: "🇮🇳 インド女性", lang: "en-IN" },
  { id: "en-IN-PrabhatNeural", label: "👨 Prabhat", desc: "🇮🇳 インド男性", lang: "en-IN" },
];

// 話速マッピング（CEFR レベル別）
const TTS_RATE = { A1: "slow", A2: "slow", B1: "medium", B2: "medium", C1: "fast" };

// ── CEFR レベル定義（語彙・文法・文の長さ・AI振る舞い・フィードバック基準） ──
const CEFR_LEVELS = {
  A1: {
    id: "A1", label: "A1 入門", tag: "Beginner",
    desc: "ごく基本的な表現で自己紹介や簡単な質問ができる",
    ttsRate: "slow",
    // AI会話パートナーへの指示
    sysRules: `LEVEL A1 (Beginner) — STRICT RULES:
VOCABULARY: Use only the most basic 500 words (be, have, go, like, want, can, good, big, small, etc). NO phrasal verbs. NO idioms. NO slang.
GRAMMAR: Present simple, past simple of "be/have", "can", "there is/are", imperatives. NO perfect tenses. NO passive voice. NO conditionals beyond zero conditional.
SENTENCE LENGTH: Keep ALL sentences to 3-8 words. Maximum 1 clause per sentence. Never use subordinate clauses.
YOUR RESPONSES: 1 sentence only. Ask simple yes/no questions or "What/Where/When" questions.
BEHAVIOR: Speak as if to a complete beginner. If the user struggles, simplify further. Repeat key words. Use gestures-like expressions ("Look!", "Yes!", "Good!").
PACE: Very slow and clear. Pause between sentences.
TOPICS: Stick to immediate personal info — name, age, family, colors, numbers, food, weather (sunny/rainy), daily objects.
ERRORS: Ignore ALL errors during conversation. Never correct. Just model correct usage naturally.`,
    // 瞬間英作文の指示
    flashRules: `Generate A1 level sentences:
- Use ONLY present simple, past simple of "be", and "can"
- Vocabulary: top 500 most common English words only
- Sentence length: 3-7 words
- Topics: self-introduction, family, daily routines, simple preferences
- Examples: "I like coffee.", "She is my sister.", "Can you help me?", "It was cold yesterday."`,
    // フィードバック評価基準
    feedbackCriteria: `A1 evaluation criteria:
- Can they form basic SVO sentences?
- Can they use present simple correctly?
- Can they respond to simple questions?
- Do NOT penalize for missing articles, wrong prepositions, or pronunciation
- Score generously — any communication attempt is positive at this level`,
  },
  A2: {
    id: "A2", label: "A2 初級", tag: "Elementary",
    desc: "日常の基本的なやりとりができる。買い物・道案内など",
    ttsRate: "slow",
    sysRules: `LEVEL A2 (Elementary) — RULES:
VOCABULARY: Use common everyday vocabulary (~1500 words). Simple adjectives, basic adverbs (always, sometimes, never, very). NO advanced phrasal verbs. Avoid idioms.
GRAMMAR: Present simple/continuous, past simple, "going to" future, comparatives/superlatives, basic modals (can/could/must/should), "because/and/but/so" connectors. NO present perfect. NO passive. NO relative clauses.
SENTENCE LENGTH: 5-12 words per sentence. Maximum 2 clauses joined by "and/but/because".
YOUR RESPONSES: 1-2 sentences. Ask choice questions ("Do you prefer A or B?") or simple open questions.
BEHAVIOR: Be encouraging. If the user uses a word incorrectly, model the correct usage in your response without pointing out the error.
PACE: Slightly slower than normal.
TOPICS: Shopping, travel basics, family, hobbies, food, daily routines, simple descriptions.
ERRORS: Ignore minor errors. Only note if meaning is completely unclear.`,
    flashRules: `Generate A2 level sentences:
- Use present simple, present continuous, past simple, "going to" future
- Comparatives ("bigger than"), superlatives ("the best"), basic modals
- Vocabulary: common everyday words, ~1500 word range
- Sentence length: 5-10 words
- Topics: shopping, travel, daily life, preferences, simple descriptions
- Examples: "I usually wake up at 7.", "This restaurant is better than that one.", "Could you speak more slowly?"`,
    feedbackCriteria: `A2 evaluation criteria:
- Can they describe daily routines and habits?
- Can they use past tense correctly?
- Can they ask and answer about preferences?
- Can they use basic connectors (and, but, because)?
- Be lenient on article/preposition errors but note them as tips`,
  },
  B1: {
    id: "B1", label: "B1 中級", tag: "Intermediate",
    desc: "身近な話題について意見を述べ、理由を説明できる",
    ttsRate: "medium",
    sysRules: `LEVEL B1 (Intermediate) — RULES:
VOCABULARY: Use standard vocabulary (~3000 words). Common phrasal verbs (look forward to, get along with, turn out). Simple collocations. Avoid rare idioms.
GRAMMAR: All basic tenses + present perfect, past continuous, first conditional (if + present → will), basic passive voice, relative clauses (who/which/that), reported speech basics. NO subjunctive. NO mixed conditionals.
SENTENCE LENGTH: 8-18 words. Use 2-3 clause sentences with appropriate connectors (however, although, in addition).
YOUR RESPONSES: 2-3 sentences. Ask open-ended "Why/How" questions. Encourage opinions.
BEHAVIOR: Speak naturally but clearly. Push the user to express opinions and give reasons. If they use only simple structures, prompt them: "Can you tell me why?" or "What happened next?"
PACE: Normal conversational speed.
TOPICS: Opinions on familiar subjects, experiences, travel stories, work situations, plans, explanations.
ERRORS: Note significant grammar errors mentally for end-of-session feedback, but don't interrupt the conversation.`,
    flashRules: `Generate B1 level sentences:
- Use present perfect, past continuous, first conditional, passive voice, relative clauses
- Include opinion expressions ("I think...", "In my opinion...")
- Common phrasal verbs and collocations
- Sentence length: 8-15 words
- Topics: opinions, experiences, explanations, comparing options, giving reasons
- Examples: "I've never been to Europe, but I'd love to go.", "The meeting was canceled because the manager was sick.", "If it rains tomorrow, we should stay home."`,
    feedbackCriteria: `B1 evaluation criteria:
- Can they express opinions and give reasons?
- Can they use present perfect vs past simple appropriately?
- Can they form conditional sentences?
- Can they use connectors beyond "and/but"?
- Can they narrate a sequence of events?
- Note tense consistency errors and connector misuse`,

function pickVoice(topicId) {
  // シチュエーション別プールがあればそこからランダム
  const pool = SITUATION_VOICES[topicId];
  if (pool) return pool[Math.floor(Math.random() * pool.length)];

  // それ以外は重み付きランダム
  const entries = Object.entries(VOICE_WEIGHTS);
  const totalW = entries.reduce((s, [, w]) => s + w, 0);
  let r = Math.random() * totalW;
  for (const [id, w] of entries) {
    r -= w;
    if (r <= 0) return id;
  }
  return entries[0][0];
}

// ── Streak System ──
function getStreak() {
  try { return JSON.parse(localStorage.getItem("ett_streak") || "{}"); } catch { return {}; }
}
function updateStreak() {
  const s = getStreak();
  const today = new Date().toISOString().slice(0, 10);
  s[today] = (s[today] || 0) + 1;
  localStorage.setItem("ett_streak", JSON.stringify(s));
}
function getStreakDays() {
  const s = getStreak();
  let count = 0;
  const d = new Date();
  while (true) {
    const key = d.toISOString().slice(0, 10);
    if (!s[key]) break;
    count++;
    d.setDate(d.getDate() - 1);
  }
  return count;
}
function renderCalendarHTML() {
  const s = getStreak();
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth();
  const first = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0).getDate();
  const startDow = first.getDay();
  const today = now.getDate();
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let html = `<div class="cal-header"><span class="text-sm" style="font-weight:600">${months[month]} ${year}</span>`;
  const streak = getStreakDays();
  if (streak > 0) html += `<span class="streak-badge">🔥 ${streak}日連続</span>`;
  html += '</div><div class="cal-grid">';
  ['日','月','火','水','木','金','土'].forEach(d => { html += `<div class="cal-day empty" style="font-size:10px;color:var(--muted)">${d}</div>`; });
  for (let i = 0; i < startDow; i++) html += '<div class="cal-day empty"></div>';
  for (let d = 1; d <= lastDay; d++) {
    const key = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const done = !!s[key];
    const isToday = d === today;
    html += `<div class="cal-day ${done?'yes':'no'} ${isToday?'today':''}">${d}</div>`;
  }
  html += '</div>';
  return html;
}

function getMistakes() {

}
function addMistake(entry) {
  const m = getMistakes();
  m.push({ ...entry, date: new Date().toISOString(), reviewed: 0 });
  // Keep max 200
  while (m.length > 200) m.shift();
  localStorage.setItem("ett_mistakes", JSON.stringify(m));
}
function getReviewQueue() {
  const m = getMistakes();
  const now = Date.now();
  return m.filter(e => {
    const age = (now - new Date(e.date).getTime()) / 86400000; // days
    // Spaced repetition: review at 1, 3, 7, 14, 30 days
    const intervals = [1, 3, 7, 14, 30];
    const nextReview = intervals[Math.min(e.reviewed, intervals.length - 1)] || 30;
    return age >= nextReview;
  }).slice(0, 5);
}
function markReviewed(idx) {
  const m = getMistakes();
  if (m[idx]) { m[idx].reviewed++; m[idx].date = new Date().toISOString(); }
  localStorage.setItem("ett_mistakes", JSON.stringify(m));
}

// ── Gemini API ──
async function geminiChat(messages, systemPrompt = "", json = false, useSearch = false) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${S.geminiKey}`;
  const contents = messages.map(m => ({
    role: m.role === "assistant" ? "model" : "user",
    parts: [{ text: m.content }]
  }));
  const body = {
    contents,
    generationConfig: {
      temperature: json ? 0.3 : 0.8,
      maxOutputTokens: 4096,
      ...(json ? { responseMimeType: "application/json" } : {})
    }
  };
  if (systemPrompt) {
    body.systemInstruction = { parts: [{ text: systemPrompt }] };
  }
  // Google Search Grounding for real-time information
  if (useSearch) {
    body.tools = [{ google_search: {} }];
  }
  const res = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
  if (!res.ok) {
    // Retry once for 503 (overloaded) and 429 (rate limit)
    if (res.status === 503 || res.status === 429) {
      await new Promise(r => setTimeout(r, 2000));
      const res2 = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
      if (!res2.ok) throw new Error(`Gemini API ${res2.status}（リトライ失敗）`);
      const data2 = await res2.json();
      const output2 = data2.candidates?.[0]?.content?.parts?.[0]?.text || "";
      const inChars2 = messages.reduce((a, m) => a + m.content.length, 0) + (systemPrompt?.length || 0);
      S.cost.geminiInTokens += Math.ceil(inChars2 / 4);
      S.cost.geminiOutTokens += Math.ceil(output2.length / 4);
      if (useSearch) S.cost.searchCalls = (S.cost.searchCalls || 0) + 1;
      return output2;
    }
    throw new Error(`Gemini API ${res.status}`);
  }
  const data = await res.json();
  const output = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
  // Track token usage
  const inChars = messages.reduce((a, m) => a + m.content.length, 0) + (systemPrompt?.length || 0);
  S.cost.geminiInTokens += Math.ceil(inChars / 4);
  S.cost.geminiOutTokens += Math.ceil(output.length / 4);
  if (useSearch) S.cost.searchCalls = (S.cost.searchCalls || 0) + 1;
  return output;
}

// ── Azure TTS ──
let _curAudio = null;
function stopAudio() { if(_curAudio){_curAudio.pause();_curAudio=null;} }

async function speakText(text, voiceId = "en-US-JennyNeural") {
  if (!S.azureKey) throw new Error("Azure Speech キーが未設定です");
  stopAudio();
  S.cost.ttsChars += text.length;

  const voiceInfo = TTS_VOICES.find(v => v.id === voiceId) || TTS_VOICES[0];
  const rate = TTS_RATE[S.screen === 'shadow' ? S.shadowLevel : S.ftLevel] || "medium";

  // Escape XML special characters
  const xmlText = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

  const ssml = `<speak version='1.0' xmlns='http://www.w3.org/2001/10/synthesis' xml:lang='${voiceInfo.lang}'>
    <voice name='${voiceId}'>
      <prosody rate='${rate}'>${xmlText}</prosody>
    </voice>
  </speak>`;

  const url = `https://${S.azureRegion}.tts.speech.microsoft.com/cognitiveservices/v1`;
  const res = await fetch(url, {
    method: "POST",
    headers: {
      "Ocp-Apim-Subscription-Key": S.azureKey,
      "Content-Type": "application/ssml+xml",
      "X-Microsoft-OutputFormat": "audio-16khz-128kbitrate-mono-mp3"
    },
    body: ssml
  });
  if (!res.ok) throw new Error(`Azure TTS ${res.status}`);

  const audioBlob = await res.blob();
  const blobUrl = URL.createObjectURL(audioBlob);
  return new Promise((resolve, reject) => {
    _curAudio = new Audio(blobUrl);
    _curAudio.onended = () => { _curAudio = null; resolve(); };
    _curAudio.onerror = reject;
    _curAudio.play().catch(reject);
  });
}

// ── WAV Recording (Shadowing only) ──
async function recordWav(maxMs = 15000) {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: { channelCount: 1, sampleRate: 16000 } });
  const ctx = new AudioContext({ sampleRate: 16000 });
  const src = ctx.createMediaStreamSource(stream);
  const proc = ctx.createScriptProcessor(4096, 1, 1);
  const chunks = [];
  let stopped = false;
  const recStartTime = Date.now();
  proc.onaudioprocess = e => {
    if (!stopped) chunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
  };
  src.connect(proc); proc.connect(ctx.destination);
  const recorder = {
    stop: async () => {
      if (stopped) return new Blob([new ArrayBuffer(44)], {type:"audio/wav"});
      stopped = true;
      S.cost.sttSeconds += Math.round((Date.now() - recStartTime) / 1000);
      clearTimeout(_timeout);
      try { proc.disconnect(); } catch(e){}
      try { src.disconnect(); } catch(e){}
      stream.getTracks().forEach(t => t.stop());
      if (ctx.state !== "closed") { try { await ctx.close(); } catch(e){} }
      if (chunks.length === 0) return new Blob([new ArrayBuffer(44)], {type:"audio/wav"});
      const samples = new Float32Array(chunks.reduce((a, c) => a + c.length, 0));
      let off = 0; for (const c of chunks) { samples.set(c, off); off += c.length; }
      const pcm = new Int16Array(samples.length);
      for (let i = 0; i < samples.length; i++) pcm[i] = Math.max(-1, Math.min(1, samples[i])) * 32767;
      const wavBuf = new ArrayBuffer(44 + pcm.byteLength);
      const dv = new DataView(wavBuf);
      const sr = 16000, ch = 1, bps = 16;
      dv.setUint32(0,0x52494646,false); dv.setUint32(4,36+pcm.byteLength,true);
      dv.setUint32(8,0x57415645,false); dv.setUint32(12,0x666D7420,false);
      dv.setUint32(16,16,true); dv.setUint16(20,1,true); dv.setUint16(22,ch,true);
      dv.setUint32(24,sr,true); dv.setUint32(28,sr*ch*bps/8,true);
      dv.setUint16(32,ch*bps/8,true); dv.setUint16(34,bps,true);
      dv.setUint32(36,0x64617461,false); dv.setUint32(40,pcm.byteLength,true);
      new Uint8Array(wavBuf).set(new Uint8Array(pcm.buffer),44);
      return new Blob([wavBuf],{type:"audio/wav"});
    }
  };
  let _timeout = setTimeout(() => recorder.stop(), maxMs);
  return recorder;
}

// ── Azure STT (Speech-to-Text) ──
async function azureSTT(wavBlob) {
  if (!S.azureKey) throw new Error("Azure Speech キーが未設定です");
  if (!wavBlob || wavBlob.size <= 44) return ""; // empty audio
  const url = `https://${S.azureRegion}.stt.speech.microsoft.com/speech/recognition/dictation/cognitiveservices/v1?language=en-US&format=detailed&profanity=raw`;
  const res = await fetch(url, {
    method: "POST",
    headers: {
      "Ocp-Apim-Subscription-Key": S.azureKey,
      "Content-Type": "audio/wav; codecs=audio/pcm; samplerate=16000"
    },
    body: wavBlob
  });
  if (!res.ok) throw new Error(`Azure STT ${res.status}`);
  const data = await res.json();
  if (data.RecognitionStatus === "InitialSilenceTimeout" || data.RecognitionStatus === "NoMatch") return "";
  if (data.RecognitionStatus !== "Success") throw new Error(`Recognition: ${data.RecognitionStatus}`);
  // Detailed format: use NBest[0].Display for best accuracy, fall back to DisplayText
  return data.NBest?.[0]?.Display || data.DisplayText || "";
}

function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

// ── Safe JSON Parse (repair truncated/malformed JSON) ──
function safeJSON(raw) {
  // Strip markdown fences
  let s = raw.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
  try { return JSON.parse(s); } catch(e1) {
    // Try fixing unterminated strings: add closing quote
    let fixed = s;
    // Count quotes - if odd, add one
    const quotes = (fixed.match(/"/g) || []).length;
    if (quotes % 2 !== 0) fixed += '"';
    // Try closing brackets/braces
    const opens = (fixed.match(/\{/g) || []).length;
    const closes = (fixed.match(/\}/g) || []).length;
    for (let i = 0; i < opens - closes; i++) fixed += '}';
    const openB = (fixed.match(/\[/g) || []).length;
    const closeB = (fixed.match(/\]/g) || []).length;
    for (let i = 0; i < openB - closeB; i++) fixed += ']';
    // Remove trailing commas before } or ]
    fixed = fixed.replace(/,\s*([}\]])/g, '$1');
    try { return JSON.parse(fixed); } catch(e2) {
      console.warn("JSON repair failed:", e2.message, "\nRaw:", s.slice(0, 200));
      throw e1; // throw original error
    }
  }
}

// ── Session History ──
function getHistory() {
  try { return JSON.parse(localStorage.getItem("ett_history") || "[]"); } catch { return []; }
}
function saveSession(entry) {
  const hist = getHistory();
  hist.push({ ...entry, date: new Date().toISOString() });
  localStorage.setItem("ett_history", JSON.stringify(hist));
  // Update totals
  S.totalSessions = hist.length;
  S.totalMinutes = hist.reduce((a, h) => a + (h.minutes || 0), 0);
  localStorage.setItem("ett_total_sessions", S.totalSessions);
  localStorage.setItem("ett_total_minutes", S.totalMinutes);
}
function clearAllData() {
  if (!confirm("学習履歴・ストリーク・単語帳・会話ログをすべて削除しますか？\nAPIキーは保持されます。")) return;
  localStorage.removeItem("ett_history");
  localStorage.removeItem("ett_total_sessions");
  localStorage.removeItem("ett_total_minutes");
  localStorage.removeItem("ett_streak");
  localStorage.removeItem("ett_mistakes");
  localStorage.removeItem("ett_vocab");
  localStorage.removeItem("ett_convlogs");
  localStorage.removeItem("ett_challenge_used");
  S.totalSessions = 0;
  S.totalMinutes = 0;
  S.screen = "home"; render();
}

// RENDER
// ═══════════════════════════════════
function render() {
  if (S.screen === "apikey") renderApiKey();
  else if (S.screen === "home") renderHome();
  else if (S.screen === "history") renderHistory();
  else if (S.screen === "freetalk") renderFreeTalkSetup();
  else if (S.screen === "flash") renderFlashSetup();
  else if (S.screen === "shadow") renderShadowSetup();
  else if (S.screen === "review") renderReview();
  else if (S.screen === "vocab") renderVocabNotebook();
  else if (S.screen === "convlog") renderConvLog();
  else if (S.screen === "reviewquiz") renderReviewQuiz();
}

// ── History Screen ──
function renderHistory() {
  const hist = getHistory();
  const reversed = [...hist].reverse();

  // 分析データ
  const ftSessions = hist.filter(h => h.mode === "freetalk");
  const flSessions = hist.filter(h => h.mode === "flash");
  const avgFT = ftSessions.length > 0 ? Math.round(ftSessions.reduce((a,h) => a + (h.score||0), 0) / ftSessions.length) : 0;
  const avgFL = flSessions.length > 0 ? Math.round(flSessions.reduce((a,h) => a + (h.score||0), 0) / flSessions.length) : 0;

  // 直近7セッションのスコア推移
  const recentScores = hist.slice(-7).map(h => h.score || 0);

  app.innerHTML = `
    <div class="navbar">
      <button class="back" id="histBack">←</button>
      <div class="title">学習履歴</div>
    </div>

    <div class="stats-grid mb-16">
      <div class="stat-card"><div class="val text-accent">${S.totalSessions}</div><div class="lbl">総セッション</div></div>
      <div class="stat-card"><div class="val text-green">${S.totalMinutes}</div><div class="lbl">総練習時間(分)</div></div>
    </div>

    ${ftSessions.length + flSessions.length > 0 ? `
    <div class="card">
      <div style="font-size:15px;font-weight:600;margin-bottom:12px">📊 平均スコア</div>
      <div class="stats-grid">
        <div class="stat-card"><div class="val" style="color:${avgFT>=70?'var(--green)':'var(--yellow)'}">${avgFT || '-'}</div><div class="lbl">🗣️ Free Talk</div></div>
        <div class="stat-card"><div class="val" style="color:${avgFL>=70?'var(--green)':'var(--yellow)'}">${avgFL || '-'}</div><div class="lbl">⚡ Flash</div></div>
      </div>
      <div style="font-size:13px;color:var(--muted);margin-top:8px">Free Talk ${ftSessions.length}回 / Flash ${flSessions.length}回</div>
    </div>` : ''}

    <div class="card">
      <div style="font-size:15px;font-weight:600;margin-bottom:12px">📋 全セッション (${hist.length})</div>
      ${reversed.length === 0 ? '<div class="text-sm text-muted" style="text-align:center;padding:24px">まだ履歴がありません</div>' :
      reversed.map(h => {
        const d = new Date(h.date);
        const dateStr = d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate() + ' ' + d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');
        const icon = h.mode === 'freetalk' ? '🗣️' : '⚡';
        const scoreColor = (h.score||0) >= 80 ? 'var(--green)' : (h.score||0) >= 60 ? 'var(--yellow)' : 'var(--muted)';
        const voiceShort = (h.voice || '').replace('Neural','').replace('en-','').replace('-',' ');
        return '<div style="padding:10px 0;border-bottom:1px solid var(--border)">' +
          '<div class="flex justify-between items-center">' +
          '<div class="text-sm">' + icon + ' ' + esc(h.topic || h.mode) + '</div>' +
          '<div style="font-weight:700;color:' + scoreColor + '">' + (h.score || '-') + '</div>' +
          '</div>' +
          '<div class="text-xs text-muted">' + dateStr + ' · ' + (h.minutes||0) + '分' + (voiceShort ? ' · ' + esc(voiceShort) : '') + '</div>' +
          (h.level ? '<div class="text-xs text-muted">' + esc(h.level) + '</div>' : '') +
          '</div>';
      }).join('')}
    </div>

    <button class="btn btn-danger w-full mt-16 mb-16" id="histClear">🗑️ 履歴をすべてクリア</button>
  `;
  $("histBack").onclick = () => { S.screen = "home"; render(); };
  $("histClear").onclick = clearAllData;
}

const FT_LEVELS = Object.values(CEFR_LEVELS);

async function startFreeTalkSession() {
  const topic = FT_ALL_TOPICS.find(t => t.id === S.ftTopic);
  const level = FT_LEVELS.find(l => l.id === S.ftLevel);
  if (!topic) return;

  // Handle custom topic and news topics
  const isNews = topic.prompt.startsWith('__NEWS__') || topic.prompt === '__NEWS_CUSTOM__';
  let topicPrompt, topicDisplay;

  if (topic.prompt === '__CUSTOM__') {
    topicPrompt = `Talk about "${S.ftCustomTopic}" in the context of ${topic.catLabel || 'general'}. Discuss it naturally and ask questions.`;
    topicDisplay = S.ftCustomTopic;
  } else if (topic.prompt === '__NEWS_CUSTOM__') {
    topicPrompt = `__NEWS__:Generate a short English news article (80-120 words) about "${S.ftCustomTopic}". Then discuss it with the learner.`;
    topicDisplay = `📰 ${S.ftCustomTopic}`;
  } else if (isNews) {
    topicPrompt = topic.prompt;
    topicDisplay = topic.label;
  } else {
    topicPrompt = topic.prompt;
    topicDisplay = topic.label;
  }

  S.ftSessionActive = true;
  S.ftStartTime = Date.now();
  S.cost = { sttSeconds: 0, ttsChars: 0, geminiInTokens: 0, geminiOutTokens: 0, searchCalls: 0 };

  // 音声自動選択
  S.ftVoice = pickVoice(topic.id);
  const voiceLabel = getVoiceLabel(S.ftVoice);

  // For situation/role-play topics, add role-play instructions
  const isRolePlay = topic.id.startsWith("si_");

  // Build system prompt
  let sysPrompt;
  if (isNews) {
    const newsInstruction = topicPrompt.replace('__NEWS__:', '');
    sysPrompt = `You are an English conversation partner who discusses REAL current news.

${level.sysRules}

IMPORTANT: Use Google Search to find a REAL, RECENT news story. DO NOT invent or fabricate any news.
${newsInstruction}

Format your FIRST response like this:
📰 [Real headline from a real source]
Source: [actual news source name]

[Summarize the real article in 80-120 words, adapted to ${level.id} level English]

---
Then ask 1-2 discussion questions about this real news story.

After the first message, continue the discussion naturally. Ask follow-up questions, challenge opinions, and introduce relevant vocabulary.`;
  } else {
    sysPrompt = `You are a friendly English conversation partner.

${level.sysRules}

TOPIC: ${topicPrompt}
${isRolePlay ? "This is a ROLE-PLAY scenario. Stay in character throughout." : ""}

CRITICAL: Follow the level rules STRICTLY. Do NOT speak above the specified level.

Start the conversation with a friendly greeting related to the topic.`;
  }

  S.chatHistory = [{ role: "user", content: isNews ? "Give me a news article to discuss." : "Start the conversation." }];
  S.chatMessages = [{ type: "system", text: `${topic.catIcon || '🗣️'} ${topicDisplay} — ${level.label}${S.ftQuickMode?' ⚡Quick':''}\n🔊 ${voiceLabel}` }];

  // Generate challenge expressions (async, don't block start)
  const challengeTopic = { ...topic, prompt: topicPrompt, label: topicDisplay };
  generateChallengeExpressions(level.id, challengeTopic).catch(()=>{});

  renderFreeTalkChat();
  showTyping();

  try {
    // Use Google Search grounding for news topics to get real current news
    const reply = await geminiChat(S.chatHistory, sysPrompt, false, isNews);
    S.chatHistory.push({ role: "assistant", content: reply });
    S.chatMessages.push({ type: "ai", text: reply });
    hideTyping();
    renderFreeTalkChat();
    // Auto-speak AI response
    try { await speakText(reply, S.ftVoice); } catch(e) { console.warn("TTS:", e); }
  } catch(e) {
    hideTyping();
    S.chatMessages.push({ type: "system", text: `❌ Error: ${e.message}` });
    renderFreeTalkChat();
  }
}

function renderFreeTalkChat() {
  const msgs = S.chatMessages.map(m => {
    if (m.type === "system") return `<div class="msg msg-system">${esc(m.text)}</div>`;
    if (m.type === "challenge") {
      const exprs = m.expressions || [];
      const cat = m.category || '';
      return `<div class="challenge-card">
        <div class="challenge-title">🎯 チャレンジ: ${esc(cat)}</div>
        <div class="text-xs" style="color:#5b4e9a;margin-bottom:10px">会話で使ってみよう！</div>
        ${exprs.map((e, i) => `<div class="challenge-expr ${S.ftChallengeUsed[i]?'used':''}">
          <div class="expr-en">${S.ftChallengeUsed[i]?'✅ ':''}${esc(e.en)}</div>
          <div class="expr-ja">${esc(e.ja)}</div>
          ${e.example ? `<div class="expr-ex">例: ${esc(e.example)}</div>` : ''}
        </div>`).join('')}
      </div>`;
    }
    if (m.type === "ai") return `<div class="msg msg-ai">
      ${esc(m.text)}
      <div style="margin-top:8px"><button class="btn-ghost text-xs replay-btn" data-text="${esc(m.text).replace(/"/g,'&quot;')}">🔊 再生</button></div>
    </div>`;
    if (m.type === "user") return `<div class="msg msg-user">${esc(m.text)}</div>`;
    if (m.type === "feedback") return `<div class="msg msg-feedback">${m.html}</div>`;
    return "";
  }).join("");

  app.innerHTML = `
    <div class="navbar">
      <button class="back" id="ftChatBack">←</button>
      <div class="title">Free Talk</div>
      <button class="action" id="ftEndBtn">終了</button>
    </div>
    <div class="chat-area" id="chatArea">${msgs}<div id="typingIndicator" class="typing hidden"><span></span><span></span><span></span></div></div>
    <div class="chat-input-bar">
      <div id="liveTranscript" style="display:${_srActive?'block':'none'};max-width:520px;margin:0 auto 6px;padding:8px 14px;background:rgba(220,38,38,.08);border-radius:12px;font-size:13px;color:var(--red);min-height:24px;word-break:break-word"><span style="animation:pulse 1.5s infinite;display:inline-block">🔴</span> <span id="liveText">${esc(_srBuf)}</span></div>
      <div class="inner">
        <input class="input" id="chatInput" placeholder="Type in English..." autocomplete="off">
        ${srSupported() ? `<button class="mic-btn ${_srActive?'recording':'idle'}" id="micBtn">${_srActive?'⏹':'🎤'}</button>` : ''}
        <button class="btn btn-primary" id="sendBtn" style="padding:12px 16px;border-radius:50%">↑</button>
      </div>
    </div>
  `;

  $("ftChatBack").onclick = () => {
    srStop(); stopAudio();
    if (S.ftSessionActive && S.chatHistory.length > 2) {
      if (confirm("会話を終了しますか？フィードバックを取得できます。")) endFreeTalkSession();
      else return;
    }
    S.screen = "home"; render();
  };
  $("ftEndBtn").onclick = () => endFreeTalkSession();

  // Send text
  const sendMsg = () => {
    const text = $("chatInput")?.value?.trim();
    if (!text) return;
    $("chatInput").value = "";
    handleUserMessage(text);
  };
  $("sendBtn").onclick = sendMsg;
  $("chatInput").onkeydown = e => { if (e.key === "Enter") sendMsg(); };

  // Mic
  if ($("micBtn")) $("micBtn").onclick = () => toggleRecording();

  // Replay buttons
  document.querySelectorAll(".replay-btn").forEach(btn => {
    btn.onclick = async () => {
      btn.textContent = "⏳";
      try { await speakText(btn.dataset.text, S.ftVoice); } catch(e) { console.warn(e); }
      btn.textContent = "🔊 再生";
    };
  });

  // Scroll to bottom
  const area = $("chatArea");
  if (area) area.scrollTop = area.scrollHeight;
}

function showTyping() {
  const el = $("typingIndicator");
  if (el) el.classList.remove("hidden");
  const area = $("chatArea");
  if (area) area.scrollTop = area.scrollHeight;
}
function hideTyping() {
  const el = $("typingIndicator");
  if (el) el.classList.add("hidden");
}

let _recorder = null;   // for Shadowing (recordWav) & Azure STT fallback

// ═══════════════════════════════════
// SPEECH RECOGNITION
// Web Speech API → Azure STT fallback
// ═══════════════════════════════════
var _sr = null;
var _srBuf = '';
var _srActive = false;
var _srCallback = null;
var _srRestartTimer = null;
var _srUseAzure = false;
var _srRecorder = null;
var _srRetryCount = 0;


function srSupported() {
  if (S.srMode === 'azure') return !!S.azureKey;
  if (S.srMode === 'webspeech') return !!(window.SpeechRecognition || window.webkitSpeechRecognition);
  return !!(window.SpeechRecognition || window.webkitSpeechRecognition) || !!S.azureKey;
}
function srIsActive() { return _srActive; }

function srStart(onComplete) {
  if (_srActive) return false;
  _srBuf = '';
  
  _srActive = true;
  _srCallback = onComplete;
  _srUseAzure = false;
  _srRetryCount = 0;

  // Respect user's choice of SR mode
  if (S.srMode === 'azure') {
    // Force Azure STT
    if (!S.azureKey) { alert("Azure Speech キーを設定してください"); _srActive = false; return false; }
    _srStartAzure();
  } else if (S.srMode === 'webspeech') {
    // Force Web Speech API
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert("このブラウザはWeb Speech APIに対応していません"); _srActive = false; return false; }
    _srDoStart();
  } else {
    // Auto: try Web Speech first, fall back to Azure
    var SR2 = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SR2) {
      _srDoStart();
    } else if (S.azureKey) {
      _srStartAzure();
    } else {
      alert("音声認識が利用できません。");
      _srActive = false;
      return false;
    }
  }
  return true;
}

function srStop() {
  _srActive = false;
  clearTimeout(_srRestartTimer);
  if (_srUseAzure && _srRecorder) {
    _srRecorder.stop().then(function(wavBlob) {
      _srRecorder = null;
      if (wavBlob && wavBlob.size > 44 && S.azureKey) {
        azureSTT(wavBlob).then(function(text) {
          _srBuf = text || '';
          _deliverResult();
        }).catch(function() { _deliverResult(); });
      } else { _deliverResult(); }
    }).catch(function() { _deliverResult(); });
  } else {
    if (_sr) { try { _sr.abort(); } catch(e) {} _sr = null; }
    _deliverResult();
  }
}

function _deliverResult() {
  var text = _srBuf.trim();
  _srBuf = '';
  if (_srCallback) { var cb = _srCallback; _srCallback = null; cb(text); }
}

function _srDoStart() {
  if (!_srActive) return;
  // Clean up previous instance completely
  if (_sr) {
    _sr.onresult = null;
    _sr.onerror = null;
    _sr.onend = null;
    try { _sr.abort(); } catch(e) {}
    _sr = null;
  }
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  _sr = new SR();
  _sr.lang = 'en-US';
  _sr.continuous = true;
  _sr.interimResults = false;  // true causes duplication on Android Chrome
  _sr.maxAlternatives = 1;
  _sr.onresult = function(e) {
    for (var i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        _srBuf += e.results[i][0].transcript + ' ';
      }
    }
    // Update live transcript display
    var lt = document.getElementById('liveText');
    if (lt) lt.textContent = _srBuf;
  };
  _sr.onerror = function(e) {
    if (e.error === 'no-speech' || e.error === 'aborted') return;
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      _sr = null;
      _srRetryCount++;
      if (_srRetryCount <= 2) {
        // Retry after delay — might be temporary
        console.log("Speech not-allowed, retry " + _srRetryCount);
        _srRestartTimer = setTimeout(function() { if (_srActive) _srDoStart(); }, 500);
        return;
      }
      // Retries exhausted — try Azure fallback
      if (S.azureKey && _srActive) {
        console.log("Speech API failed, falling back to Azure STT");
        _srStartAzure();
        return;
      }
      _srActive = false;
      alert("マイクへのアクセスが拒否されました。ブラウザの設定を確認してください。");
      if (_srCallback) { var cb = _srCallback; _srCallback = null; cb(''); }
      return;
    }
    console.warn("Speech error:", e.error);
  };
  _sr.onend = function() {
    if (_srActive && !_srUseAzure) {
      _srRestartTimer = setTimeout(function() { if (_srActive) _srDoStart(); }, 200);
    }
  };
  try {
    _sr.start();
    _srRetryCount = 0; // Reset retry count on successful start
  } catch(e) {
    console.warn("SR start exception:", e.message);
    _srRetryCount++;
    if (_srRetryCount <= 2) {
      _srRestartTimer = setTimeout(function() { if (_srActive) _srDoStart(); }, 500);
    } else if (S.azureKey && _srActive) {
      _srStartAzure();
    } else {
      _srActive = false;
      if (_srCallback) { var cb = _srCallback; _srCallback = null; cb(''); }
    }
  }
}

async function _srStartAzure() {
  _srUseAzure = true;
  try {
    _srRecorder = await recordWav(60000);
  } catch(e) {
    _srActive = false; _srUseAzure = false;
    alert("マイクアクセスエラー: " + e.message);
    if (_srCallback) { var cb = _srCallback; _srCallback = null; cb(''); }
  }
}

// ── Free Talk Recording ──
function toggleRecording() {
  if (srIsActive()) {
    S.isRecording = false;
    srStop();
  } else {
    var started = srStart(function(text) {
      S.isRecording = false;
      if (text) handleUserMessage(text);
      else renderFreeTalkChat();
    });
    if (started) {
      S.isRecording = true;
      renderFreeTalkChat();
    }
  }
}

    { id: "rhetoric", name: "修辞表現", focus: "Rhetorical devices: What I find interesting is..., The thing is..., Not only...but also" },
    { id: "academic", name: "知的な語彙", focus: "Academic/sophisticated vocabulary: implication, perspective, significantly, fundamental" },
    { id: "collocation", name: "コロケーション", focus: "Advanced collocations: make a decision, raise a concern, draw a conclusion, take into account" },
    { id: "register", name: "格式の使い分け", focus: "Register shifting: formal vs casual phrasing for the same idea" },
    { id: "advanced_hedge", name: "高度な留保表現", focus: "Advanced hedging: One could argue that, It's debatable whether, There's a case to be made" },
  ],
};

function getUsedChallengeCategories() {
  try { return JSON.parse(localStorage.getItem("ett_challenge_used") || "[]"); } catch { return []; }
}
function markChallengeCategory(catId) {
  const used = getUsedChallengeCategories();
  used.push(catId);
  // Keep last 20 to allow rotation
  while (used.length > 20) used.shift();
  localStorage.setItem("ett_challenge_used", JSON.stringify(used));
}

async function generateChallengeExpressions(levelId, topic) {
  try {
    const cats = CHALLENGE_CATEGORIES[levelId] || CHALLENGE_CATEGORIES.B1;
    const usedCats = getUsedChallengeCategories();

    // Pick category not recently used, or least recently used
    let pick = cats.find(c => !usedCats.includes(c.id));
    if (!pick) pick = cats[Math.floor(Math.random() * cats.length)];
    markChallengeCategory(pick.id);

    const topicDesc = topic?.prompt || "general conversation";
    const topicLabel = topic?.label || "フリートーク";
    const raw = await geminiChat([{ role: "user", content: `You are helping a ${levelId} level English learner practice.

SKILL CATEGORY: "${pick.name}" — ${pick.focus}
CONVERSATION TOPIC: "${topicDesc}"

Generate exactly 3 expressions from this skill category that the learner can naturally use in a conversation about "${topicLabel}".

Rules:
- All 3 expressions MUST belong to the category "${pick.name}" (${pick.focus})
- Each expression MUST be usable in a conversation about "${topicLabel}"
- Appropriate complexity for ${levelId} level
- Include a realistic example sentence in the context of this topic

Return JSON: {"category": "${pick.name}", "expressions": [{"en": "expression or phrase", "ja": "Japanese meaning", "example": "example sentence in context of ${topicLabel}"}]}` }], "JSON only.", true);
    const data = safeJSON(raw);
    S.ftChallengeExprs = data.expressions || [];
    S.ftChallengeUsed = new Array(S.ftChallengeExprs.length).fill(false);
    S._challengeCategory = data.category || pick.name;
    // Show challenge card in chat
    if (S.ftChallengeExprs.length > 0) {
      S.chatMessages.splice(1, 0, { type: "challenge", expressions: S.ftChallengeExprs, category: S._challengeCategory });
      renderFreeTalkChat();
    }
  } catch(e) { console.warn("Challenge expr:", e); }
}

async function handleUserMessage(text) {
  S.chatMessages.push({ type: "user", text });
  S.chatHistory.push({ role: "user", content: text });
  S.ftTurnCount++;

  // Check if user used challenge expressions
  S.ftChallengeExprs.forEach((expr, i) => {
    if (text.toLowerCase().includes(expr.en.toLowerCase().split(' ').slice(0,3).join(' '))) {
      S.ftChallengeUsed[i] = true;
    }
  });

  // Quick mode: auto-end after 3 turns
  if (S.ftQuickMode && S.ftTurnCount >= 3) {
    renderFreeTalkChat();
    setTimeout(() => endFreeTalkSession(), 500);
    return;
  }

  renderFreeTalkChat();
  showTyping();

  const topic = FT_ALL_TOPICS.find(t => t.id === S.ftTopic);
  const level = FT_LEVELS.find(l => l.id === S.ftLevel);
  const isRolePlay = topic?.id?.startsWith("si_");
  const resolvedPrompt = topic?.prompt === '__CUSTOM__' ? `Talk about "${S.ftCustomTopic}"` : topic?.prompt?.startsWith('__NEWS__') ? 'Discuss the news article you presented' : (topic?.prompt || "Free conversation");
  const sysPrompt = `You are a friendly English conversation partner.
${level?.sysRules || "Speak naturally."}
Topic: ${resolvedPrompt}.
${isRolePlay ? "Stay in character for this role-play scenario." : ""}`;

  try {
    const reply = await geminiChat(S.chatHistory, sysPrompt);
    S.chatHistory.push({ role: "assistant", content: reply });
    S.chatMessages.push({ type: "ai", text: reply });
    hideTyping();
    renderFreeTalkChat();
    try { await speakText(reply, S.ftVoice); } catch(e) { console.warn("TTS:", e); }
  } catch(e) {
    hideTyping();
    S.chatMessages.push({ type: "system", text: `❌ ${e.message}` });
    renderFreeTalkChat();
  }
}

async function endFreeTalkSession() {
  S.ftSessionActive = false;
  S.isRecording = false;
  srStop(); stopAudio();
  const elapsed = Math.max(1, Math.round((Date.now() - (S.ftStartTime || Date.now())) / 60000));
  const topic = FT_ALL_TOPICS.find(t => t.id === S.ftTopic);

  showTyping();
  // Get feedback from Gemini
  const userMsgs = S.chatHistory.filter(m => m.role === "user" && m.content !== "Start the conversation.").map(m => m.content);
  const level = CEFR_LEVELS[S.ftLevel] || CEFR_LEVELS.B1;
  const feedbackPrompt = `You are an English teacher reviewing a student's conversation practice.
The student's CEFR level: ${level.id} (${level.tag})

${level.feedbackCriteria}

The student said these sentences during a conversation:
${userMsgs.map((m,i) => `${i+1}. "${m}"`).join("\n")}

${S.ftChallengeExprs.length > 0 ? `
CHALLENGE EXPRESSIONS: The student was asked to try using these expressions:
${S.ftChallengeExprs.map((e,i) => `${i+1}. "${e.en}" (${e.ja})`).join("\n")}
For each expression, evaluate: did the student use it (or a close variation)? Was the usage natural and correct?
` : ''}

Provide feedback in this JSON format:
{
  "overallScore": 75,
  "grammar": {"score": 80, "issues": ["specific issue 1"]},
  "vocabulary": {"score": 70, "level": "${level.id}", "suggestions": ["better word choices or expressions the student could have used"]},
  "naturalness": {"score": 75, "notes": ["what sounded natural", "what sounded unnatural"]},
  "corrections": [{"original": "what user said", "corrected": "better version", "explanation": "why"}],
  ${S.ftChallengeExprs.length > 0 ? `"challengeResults": [{"expression": "the expression", "used": true, "natural": true, "comment": "Brief comment in Japanese on usage"}],` : ''}
  "cefrAssessment": "Brief assessment: does the student seem to be at ${level.id} level, or should they move up/down?",
  "encouragement": "A brief encouraging message in Japanese"
}`;

  try {
    const raw = await geminiChat(
      [{ role: "user", content: feedbackPrompt }],
      "You are an English language evaluator. Respond ONLY in valid JSON.",
      true
    );
    hideTyping();
    const fb = safeJSON(raw);
    S._lastFeedback = fb;

    // Save session
    saveSession({
      mode: "freetalk", topic: topic?.label || S.ftTopic,
      level: S.ftLevel, score: fb.overallScore || 0,
      minutes: elapsed, turns: S.ftTurnCount, voice: S.ftVoice,
    });

    // Update streak
    updateStreak();

    // Save conversation log
    saveConversationLog({
      mode: "freetalk", topic: topic?.label || S.ftTopic,
      level: S.ftLevel, voice: S.ftVoice,
      messages: S.chatMessages.map(m => ({type: m.type, text: m.text})),
      feedback: fb,
    });

    // Save mistakes for review
    (fb.corrections || []).forEach(c => {
      addMistake({ original: c.original, corrected: c.corrected, explanation: c.explanation, mode: "freetalk" });
    });

    // Extract vocabulary from AI responses (async, don't block)
    extractVocabulary(S.chatHistory).catch(()=>{});

    S.screen = "review";
    render();
  } catch(e) {
    hideTyping();
    S.chatMessages.push({ type: "system", text: `フィードバック取得失敗: ${e.message}` });
    renderFreeTalkChat();
  }
}

const FLASH_CATEGORIES = [
  { id: "daily", label: "🏠 日常会話" },

  { id: "travel", label: "✈️ 旅行" },
  { id: "opinion", label: "💭 意見・感想" },
];

function initFlash() {
  S.screen = "flash";
  S.flashQuestions = [];
  S.flashCurrent = 0;
  S.flashResults = [];
  renderFlashSetup();
}

function renderFlashSetup() {
  app.innerHTML = `
    <div class="navbar">
      <button class="back" id="flBack">←</button>
      <div class="title">Flash Translation</div>

async function generateFlashQuestions() {
  // Flash用に音声自動選択 & コストリセット
  S.ftVoice = pickVoice("flash");
  S.cost = { sttSeconds: 0, ttsChars: 0, geminiInTokens: 0, geminiOutTokens: 0, searchCalls: 0 };
  app.innerHTML = `
    <div style="text-align:center;padding:80px 0">
      <div class="typing" style="justify-content:center;margin-bottom:16px"><span></span><span></span><span></span></div>
      <div class="text-sm text-muted">問題を生成中...</div>
    </div>
  `;
  const cat = FLASH_CATEGORIES.find(c => c.id === S.flashCategory);
  const prompt = `Generate 10 Japanese-to-English translation exercises.

Category: ${cat.label}

${(CEFR_LEVELS[S.flashLevel] || CEFR_LEVELS.A2).flashRules}

- Make sentences practical and useful in real life
- Provide 1-2 alternative correct answers when possible

Respond ONLY in JSON:
{"questions": [{"ja": "日本語文", "en": "English sentence", "alt": ["alternative answer 1"], "hint": "key grammar/vocab hint"}]}`;

  try {
    const raw = await geminiChat([{ role: "user", content: prompt }], "Generate translation exercises. JSON only.", true);
    const data = safeJSON(raw);
    S.flashQuestions = data.questions || [];
    if (S.flashQuestions.length === 0) throw new Error("問題が生成されませんでした");
    S.flashCurrent = 0;
    S.flashResults = [];
    renderFlashQuestion();
  } catch(e) {
    app.innerHTML = `
      <div class="card" style="text-align:center;padding:32px">
        <div style="font-size:24px;margin-bottom:12px">❌</div>
        <div class="text-sm">${esc(e.message)}</div>
        <button class="btn btn-secondary mt-16" id="flashRetry">リトライ</button>
        <button class="btn btn-ghost mt-8" id="flashBack">戻る</button>
      </div>
    `;
    $("flashRetry").onclick = () => generateFlashQuestions();
    $("flashBack").onclick = () => { S.screen = "home"; render(); };
  }
}

function renderFlashQuestion() {
  const q = S.flashQuestions[S.flashCurrent];
  if (!q) { renderFlashSummary(); return; }
  const progress = ((S.flashCurrent) / S.flashQuestions.length * 100).toFixed(0);

  app.innerHTML = `
    <div class="navbar">
      <button class="back" id="flqBack">←</button>
      <div class="title">Flash Translation</div>
      <div class="text-xs text-muted">${S.flashCurrent + 1}/${S.flashQuestions.length}</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>

    <div class="card flash-card">
      <div class="flash-ja">${esc(q.ja)}</div>
      <div class="flash-hint">💡 ${esc(q.hint || '')}</div>

      <div id="flashInputArea">
        ${srSupported() ? `
        <button class="mic-btn idle" id="flashMic" style="margin:0 auto 16px;display:flex">🎤</button>
        <div class="text-xs text-muted mb-16">タップして英語で答える</div>
        ` : ''}
        <div class="flex gap-8">
          <input class="input" id="flashTextInput" placeholder="Type your answer..." autocomplete="off" style="border-radius:24px">
          <button class="btn btn-primary" id="flashSendBtn" style="padding:12px 16px;border-radius:50%;flex-shrink:0">↑</button>
        </div>
      </div>

      <div id="flashResult" class="hidden"></div>
    </div>

    <button class="btn btn-ghost w-full" id="flashSkipBtn">スキップ →</button>
  `;

  $("flqBack").onclick = () => {
    if (confirm("練習を中断しますか？")) { S.screen = "home"; render(); }
  };
  $("flashSkipBtn").onclick = () => {
    S.flashResults.push({ ja: q.ja, en: q.en, userAnswer: "(skipped)", score: 0 });
    S.flashCurrent++;
    renderFlashQuestion();
  };

  const submitAnswer = (text) => evaluateFlashAnswer(text, q);
  $("flashSendBtn").onclick = () => {
    const t = $("flashTextInput")?.value?.trim();
    if (t) submitAnswer(t);
  };
  $("flashTextInput").onkeydown = e => { if (e.key === "Enter") { const t = e.target.value.trim(); if (t) submitAnswer(t); } };

  if ($("flashMic")) {
    $("flashMic").onclick = function() {
      if (_srActive) {
        srStop();  // callback handles result
      } else {
        var started = srStart(function(text) {
          if ($("flashMic")) { $("flashMic").className = "mic-btn idle"; $("flashMic").textContent = "🎤"; }
          if (text) submitAnswer(text);
        });
        if (started) {
          $("flashMic").className = "mic-btn recording";
          $("flashMic").textContent = "⏹";
        }
      }
    };
  }

  // Focus input
  setTimeout(() => $("flashTextInput")?.focus(), 100);
}

async function evaluateFlashAnswer(userAnswer, q) {
  // Disable inputs
  if ($("flashMic")) $("flashMic").disabled = true;
  if ($("flashSendBtn")) $("flashSendBtn").disabled = true;
  if ($("flashTextInput")) $("flashTextInput").disabled = true;

  const resultEl = $("flashResult");
  resultEl.classList.remove("hidden");
  resultEl.innerHTML = '<div class="typing" style="justify-content:center"><span></span><span></span><span></span></div>';

  try {
    const evalPrompt = `Compare the user's English translation with the correct answer.

Japanese: ${q.ja}
Correct answer: ${q.en}
${q.alt?.length ? `Alternative answers: ${q.alt.join(", ")}` : ""}
User's answer: ${userAnswer}

Evaluate and respond in JSON:
{
  "score": 85,
  "isCorrect": true,
  "feedback": "Brief feedback in Japanese about what was good/wrong",
  "correctedVersion": "The ideal version if user was wrong, or their version if correct"
}

Scoring guide:
- 90-100: Perfect or near-perfect
- 70-89: Minor issues (article, preposition, etc.)
- 50-69: Understandable but significant errors
- 0-49: Major errors or wrong meaning`;

    const raw = await geminiChat([{ role: "user", content: evalPrompt }], "English teacher evaluator. JSON only.", true);
    const ev = safeJSON(raw);

    const scoreColor = ev.score >= 80 ? "var(--green)" : ev.score >= 60 ? "var(--yellow)" : "var(--red)";

    resultEl.innerHTML = `
      <div class="flash-answer">
        <div style="font-size:32px;font-weight:800;color:${scoreColor};margin-bottom:8px">${ev.score}</div>
        <div class="text-sm mb-8"><strong>あなた:</strong> ${esc(userAnswer)}</div>
        <div class="text-sm mb-8"><strong>模範:</strong> <span class="correct">${esc(q.en)}</span></div>
        ${!ev.isCorrect ? `<div class="text-sm mb-8"><strong>修正:</strong> ${esc(ev.correctedVersion)}</div>` : ''}
        <div class="text-xs text-muted">${esc(ev.feedback)}</div>
      </div>
      <button class="btn btn-primary w-full mt-16" id="flashNextBtn">次の問題 →</button>
    `;

    S.flashResults.push({
      ja: q.ja, en: q.en, userAnswer, score: ev.score,
      isCorrect: ev.isCorrect, feedback: ev.feedback
    });

    $("flashNextBtn").onclick = () => { S.flashCurrent++; renderFlashQuestion(); };

    // Speak correct answer
    try { await speakText(q.en, S.ftVoice); } catch(e) { console.warn(e); }

  } catch(e) {
    resultEl.innerHTML = `<div class="text-sm text-red">評価エラー: ${esc(e.message)}</div>
      <button class="btn btn-secondary mt-8" id="flashNextBtn">次へ →</button>`;
    S.flashResults.push({ ja: q.ja, en: q.en, userAnswer, score: 0 });
    $("flashNextBtn").onclick = () => { S.flashCurrent++; renderFlashQuestion(); };
  }
}

function renderFlashSummary() {
  const results = S.flashResults;
  const avg = results.length > 0 ? Math.round(results.reduce((a, r) => a + r.score, 0) / results.length) : 0;
  const perfect = results.filter(r => r.score >= 90).length;
  const good = results.filter(r => r.score >= 60 && r.score < 90).length;
  const poor = results.filter(r => r.score < 60).length;

  S.totalSessions++;
  S.totalMinutes += 5;
  saveSession({
    mode: "flash",
    topic: FLASH_CATEGORIES.find(c => c.id === S.flashCategory)?.label || S.flashCategory,
    level: S.flashLevel, score: avg, minutes: 5, voice: S.ftVoice,
  });
  updateStreak();
  // Save mistakes for review
  results.filter(r => !r.isCorrect && r.userAnswer !== "(skipped)").forEach(r => {
    addMistake({ original: r.userAnswer, corrected: r.en, explanation: r.feedback || "", mode: "flash" });
  });

  const scoreColor = avg >= 80 ? "var(--green)" : avg >= 60 ? "var(--yellow)" : "var(--red)";

  const reviewItems = results.map((r, i) => `
    <div style="padding:12px 0;border-bottom:1px solid var(--border)">
      <div class="flex justify-between items-center">
        <div class="text-sm" style="flex:1">${esc(r.ja)}</div>
        <div class="tag ${r.score>=80?'tag-green':r.score>=60?'tag-orange':'tag-accent'}">${r.score}</div>
      </div>
      <div class="text-xs text-muted mt-8">${esc(r.en)}</div>
      ${r.userAnswer !== "(skipped)" ? `<div class="text-xs mt-8" style="color:${r.isCorrect?'var(--green)':'var(--red)'}">→ ${esc(r.userAnswer)}</div>` : '<div class="text-xs mt-8 text-muted">→ スキップ</div>'}
    </div>
  `).join("");

  app.innerHTML = `
    <div class="navbar">
      <button class="back" id="fsBck">←</button>
      <div class="title">結果</div>
    </div>

    <div class="summary-header">
      <div class="score" style="color:${scoreColor}">${avg}</div>
      <div class="label">Average Score</div>
    </div>

    <div class="stats-grid mb-16">
      <div class="stat-card"><div class="val text-green">${perfect}</div><div class="lbl">Perfect</div></div>
      <div class="stat-card"><div class="val" style="color:var(--yellow)">${good}</div><div class="lbl">Good</div></div>
    </div>

    <div class="card">
      <div style="font-size:14px;font-weight:600;margin-bottom:12px">📋 全問レビュー</div>
      ${reviewItems}
    </div>

    <button class="btn btn-primary w-full mt-16" id="fsHome">ホームに戻る</button>
    <button class="btn btn-secondary w-full mt-8 mb-16" id="fsAgain">もう10問</button>
  `;
  // Insert cost card
  const fsCostPos = app.querySelector('#fsHome');
  if (fsCostPos) fsCostPos.insertAdjacentHTML('beforebegin', calcCostHTML());
  $("fsBck").onclick = $("fsHome").onclick = () => { S.screen = "home"; render(); };
  $("fsAgain").onclick = () => initFlash();
}

// ═══════════════════════════════════
// VOCABULARY EXTRACTION
// ═══════════════════════════════════
async function extractVocabulary(chatHistory) {
  const aiMsgs = chatHistory.filter(m => m.role === "assistant").map(m => m.content).join("\n");
  const userMsgs = chatHistory.filter(m => m.role === "user" && m.content !== "Start the conversation.").map(m => m.content).join("\n");
  try {
    const raw = await geminiChat([{ role: "user", content: `Compare these AI responses and user responses. Extract 3-5 useful English expressions that the AI used but the user did NOT use. These are expressions the user should learn.

AI said: ${aiMsgs}
User said: ${userMsgs}

Return JSON: {"vocab": [{"en": "expression", "ja": "Japanese meaning", "context": "example from the conversation"}]}` }], "JSON only.", true);
    const data = safeJSON(raw);
    if (data.vocab?.length) addVocabEntries(data.vocab);
  } catch(e) { console.warn("Vocab extract:", e); }
}

// ═══════════════════════════════════
// SHADOWING MODE
// ═══════════════════════════════════
function initShadow() {
  S.screen = "shadow";
  S.shadowSentences = [];
  S.shadowCurrent = 0;
  S.shadowResults = [];
  renderShadowSetup();
}

function renderShadowSetup() {
  app.innerHTML = `
    <div class="navbar">
      <button class="back" id="shBack">←</button>
      <div class="title">Shadowing</div>
    </div>
    <div class="card">
      <div class="text-sm" style="font-weight:600;margin-bottom:8px">🎧 シャドーイングとは</div>
      <div class="text-xs text-muted">AIの英語を聞く → 同じ文を繰り返す → 発音を評価。リスニング力と発音を同時に鍛えます。</div>
    </div>
    <div class="card">
      <div style="font-size:14px;font-weight:600;margin-bottom:12px">📊 レベル</div>
      <div class="level-select">
        ${Object.values(CEFR_LEVELS).map(l => `<div class="level-chip ${S.shadowLevel===l.id?'active':''}" data-id="${l.id}">${l.label}</div>`).join("")}
      </div>
    </div>
    <button class="btn btn-primary w-full mt-16" id="shStartBtn">5文スタート</button>
    ${!S.azureKey ? '<p class="text-xs text-red mt-8" style="text-align:center">⚠️ Azure Speech必須</p>' : ''}
  `;
  $("shBack").onclick = () => { S.screen = "home"; render(); };
  document.querySelectorAll(".level-chip").forEach(el => {
    el.onclick = () => { S.shadowLevel = el.dataset.id; renderShadowSetup(); };
  });
  $("shStartBtn").onclick = () => generateShadowSentences();
}

async function generateShadowSentences() {
  S.ftVoice = pickVoice("shadow");
  S.cost = { sttSeconds: 0, ttsChars: 0, geminiInTokens: 0, geminiOutTokens: 0, searchCalls: 0 };
  app.innerHTML = `<div style="text-align:center;padding:80px 0"><div class="typing" style="justify-content:center;margin-bottom:16px"><span></span><span></span><span></span></div><div class="text-sm text-muted">文を生成中...</div></div>`;
  try {
    const lvl = CEFR_LEVELS[S.shadowLevel] || CEFR_LEVELS.B1;
    const raw = await geminiChat([{ role: "user", content: `Generate 5 natural English sentences for shadowing practice at ${lvl.id} level. ${lvl.flashRules}\nReturn JSON: {"sentences": [{"en": "sentence", "ja": "Japanese translation"}]}` }], "JSON only.", true);
    S.shadowSentences = safeJSON(raw).sentences || [];
    if (!S.shadowSentences.length) throw new Error("No sentences");
    S.shadowCurrent = 0;
    S.shadowResults = [];
    renderShadowPractice();
  } catch(e) {
    app.innerHTML = `<div class="card" style="text-align:center;padding:32px"><div class="text-sm text-red">${esc(e.message)}</div><button class="btn btn-secondary mt-16" onclick="initShadow()">リトライ</button></div>`;
  }
}

async function renderShadowPractice() {
  const sent = S.shadowSentences[S.shadowCurrent];
  if (!sent) { renderShadowSummary(); return; }
  const progress = (S.shadowCurrent / S.shadowSentences.length * 100).toFixed(0);
  app.innerHTML = `
    <div class="navbar">
      <button class="back" id="shpBack">←</button>
      <div class="title">Shadowing</div>
      <div class="text-xs text-muted">${S.shadowCurrent+1}/${S.shadowSentences.length}</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    <div class="card shadow-card">
      <div class="shadow-status" id="shStatus">🔊 まずAIの音声を聞きましょう</div>
      <div class="shadow-text" id="shText" style="filter:blur(4px)">${esc(sent.en)}</div>
      <div class="text-xs text-muted mb-16">${esc(sent.ja)}</div>
      <button class="btn btn-primary" id="shListenBtn">🔊 AIの音声を聞く</button>
      <button class="btn btn-secondary mt-8 hidden" id="shRecordBtn">🎤 自分で言ってみる</button>
      <button class="btn btn-ghost mt-8 hidden" id="shNextBtn">次の文 →</button>
      <div id="shResult" class="hidden mt-16"></div>
    </div>
  `;
  $("shpBack").onclick = () => { if(confirm("中断しますか？")) { stopAudio(); S.screen="home"; render(); } };
  $("shListenBtn").onclick = async () => {
    $("shListenBtn").disabled = true;
    $("shListenBtn").textContent = "⏳ 再生中...";
    try { await speakText(sent.en, S.ftVoice); } catch(e) { console.warn(e); }
    $("shText").style.filter = "none";
    $("shStatus").textContent = "🎤 同じ文を繰り返してください";
    $("shRecordBtn").classList.remove("hidden");
    $("shListenBtn").textContent = "🔊 もう一度聞く";
    $("shListenBtn").disabled = false;
  };
  $("shRecordBtn").onclick = async () => {
    $("shRecordBtn").disabled = true;
    $("shRecordBtn").textContent = "⏹ 録音中...";
    $("shRecordBtn").className = "btn btn-danger mt-8";
    try {
      const rec = await recordWav(15000);
      // Wait a moment then stop (or user presses again)
      $("shRecordBtn").onclick = async () => {
        $("shRecordBtn").disabled = true;
        $("shRecordBtn").textContent = "⏳ 評価中...";
        const wav = await rec.stop();
        if (S.azureKey && wav.size > 44) {
          try {
            const result = await azurePronAssess(wav, sent.en);
            const nb = result?.NBest?.[0];
            const pron = nb?.PronunciationAssessment || {};
            const score = pron.PronScore || 0;
            const scoreColor = score >= 80 ? 'var(--green)' : score >= 60 ? 'var(--yellow)' : 'var(--red)';
            S.shadowResults.push({ en: sent.en, score, accuracy: pron.AccuracyScore||0, fluency: pron.FluencyScore||0, completeness: pron.CompletenessScore||0 });
            $("shResult").classList.remove("hidden");
            $("shResult").innerHTML = `
              <div style="font-size:36px;font-weight:800;color:${scoreColor}">${score}</div>
              <div class="stats-grid mt-8">
                <div class="stat-card"><div class="val text-sm">${pron.AccuracyScore||'-'}</div><div class="lbl">正確さ</div></div>
                <div class="stat-card"><div class="val text-sm">${pron.FluencyScore||'-'}</div><div class="lbl">流暢さ</div></div>
              </div>
              <div class="text-xs text-muted mt-8">認識: ${esc(nb?.Display || '')}</div>
            `;
          } catch(e) {
            S.shadowResults.push({ en: sent.en, score: 0 });
            $("shResult").classList.remove("hidden");
            $("shResult").innerHTML = `<div class="text-xs text-red">${esc(e.message)}</div>`;
          }
        }
        $("shNextBtn").classList.remove("hidden");
        $("shRecordBtn").classList.add("hidden");
      };
    } catch(e) { alert("マイクエラー: " + e.message); $("shRecordBtn").disabled = false; }
  };
  $("shNextBtn").onclick = () => { S.shadowCurrent++; renderShadowPractice(); };
}

function renderShadowSummary() {
  const results = S.shadowResults;
  const avg = results.length > 0 ? Math.round(results.reduce((a,r) => a+r.score, 0) / results.length) : 0;
  updateStreak();
  saveSession({ mode: "shadow", topic: "Shadowing", level: S.shadowLevel, score: avg, minutes: 3, voice: S.ftVoice });
  const scoreColor = avg >= 80 ? 'var(--green)' : avg >= 60 ? 'var(--yellow)' : 'var(--red)';
  app.innerHTML = `
    <div class="navbar"><button class="back" id="shsBack">←</button><div class="title">Shadowing 結果</div></div>
    <div class="summary-header"><div class="score" style="color:${scoreColor}">${avg}</div><div class="label">発音スコア平均</div></div>
    <div class="card">
      ${results.map(r => `<div style="padding:10px 0;border-bottom:1px solid var(--border)"><div class="flex justify-between"><div class="text-sm" style="flex:1">${esc(r.en)}</div><div style="font-weight:700;color:${r.score>=80?'var(--green)':r.score>=60?'var(--yellow)':'var(--red)'}">${r.score}</div></div></div>`).join('')}
    </div>
    ${calcCostHTML()}
    <button class="btn btn-primary w-full mt-16" id="shsHome">ホームに戻る</button>
    <button class="btn btn-secondary w-full mt-8 mb-16" id="shsAgain">もう一度</button>
  `;
  $("shsBack").onclick = $("shsHome").onclick = () => { S.screen = "home"; render(); };
  $("shsAgain").onclick = () => initShadow();
}

// ═══════════════════════════════════
// REVIEW QUIZ
// ═══════════════════════════════════
function renderReviewQuiz() {
  const queue = getReviewQueue();
  if (queue.length === 0) {
    app.innerHTML = `<div class="navbar"><button class="back" id="rqBack">←</button><div class="title">復習</div></div>
      <div class="card" style="text-align:center;padding:40px"><div style="font-size:32px;margin-bottom:12px">✅</div><div class="text-sm">復習する問題はありません</div></div>
      <button class="btn btn-primary w-full mt-16" id="rqHome">ホームに戻る</button>`;
    $("rqBack").onclick = $("rqHome").onclick = () => { S.screen = "home"; render(); };
    return;
  }
  const all = getMistakes();
  let currentIdx = 0;
  function showQuestion(i) {
    if (i >= queue.length) { S.screen = "home"; render(); return; }
    const m = queue[i];
    const realIdx = all.findIndex(x => x.original === m.original && x.corrected === m.corrected);
    app.innerHTML = `
      <div class="navbar"><button class="back" id="rqBack">←</button><div class="title">復習 ${i+1}/${queue.length}</div></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${(i/queue.length*100).toFixed(0)}%"></div></div>
      <div class="card" style="padding:28px">
        <div class="text-xs text-muted mb-8">あなたが言った文:</div>
        <div class="text-sm text-red" style="font-weight:600">${esc(m.original)}</div>
        <div class="divider"></div>
        <div class="text-xs text-muted mb-8">正しい表現:</div>
        <div class="text-sm text-green" style="font-weight:600">${esc(m.corrected)}</div>
        <div class="text-xs text-muted mt-16">${esc(m.explanation || '')}</div>
      </div>
      <div class="flex gap-8">
        <button class="btn btn-secondary w-full" id="rqHard">😓 まだ覚えてない</button>
        <button class="btn btn-primary w-full" id="rqEasy">✅ 覚えた！</button>
      </div>
    `;
    $("rqBack").onclick = () => { S.screen = "home"; render(); };
    $("rqHard").onclick = () => showQuestion(i + 1);
    $("rqEasy").onclick = () => { if (realIdx >= 0) markReviewed(realIdx); showQuestion(i + 1); };
  }
  showQuestion(0);
}

// ═══════════════════════════════════
// CONVERSATION LOG
// ═══════════════════════════════════
function renderConvLog() {
  const logs = getConversationLogs().slice().reverse();
  app.innerHTML = `
    <div class="navbar">
      <button class="back" id="clBack">←</button>
      <div class="title">💬 会話ログ (${logs.length})</div>
    </div>
    ${logs.map((log, i) => {
      const d = new Date(log.date);
      const dateStr = (d.getMonth()+1) + '/' + d.getDate() + ' ' + d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');
      return `<div class="card" style="cursor:pointer" data-idx="${i}" class="log-card">
        <div class="flex justify-between items-center">
          <div class="text-sm" style="font-weight:600">🗣️ ${esc(log.topic || '')}</div>
          <div class="text-xs text-muted">${dateStr}</div>

        <div class="text-xs text-muted mt-8">${log.level || ''} · ${(log.messages||[]).filter(m=>m.type==='user').length} turns</div>
        <div id="logDetail${i}" class="hidden mt-8" style="max-height:300px;overflow-y:auto">
          ${(log.messages||[]).filter(m=>m.type==='ai'||m.type==='user').map(m => `<div style="padding:6px 0;font-size:13px;color:${m.type==='user'?'var(--accent)':'var(--text)'}"><strong>${m.type==='user'?'You':'AI'}:</strong> ${esc(m.text)}</div>`).join('')}
        </div>
      </div>`;
    }).join('')}
  `;
  $("clBack").onclick = () => { S.screen = "home"; render(); };
  // Toggle detail
  document.querySelectorAll('.card[data-idx]').forEach(card => {
    card.onclick = () => {
      const det = $("logDetail" + card.dataset.idx);
      if (det) det.classList.toggle("hidden");
    };
  });
}

// ── Service Worker + 強制更新 ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    // 新しいSWが見つかったら即座にアクティベート
    reg.addEventListener('updatefound', () => {
      const nw = reg.installing;
      if (nw) nw.addEventListener('statechange', () => {
        if (nw.state === 'activated') location.reload();
      });
    });
    // ページ読み込みごとにSW更新チェック
    reg.update().catch(() => {});
  }).catch(() => {});

  // バージョン不一致時に強制リフレッシュ
  const cachedVer = localStorage.getItem("ett_cached_version");
  if (cachedVer && cachedVer !== VERSION) {
    console.log(`Version mismatch: ${cachedVer} → ${VERSION}, clearing caches`);
    caches.keys().then(ks => Promise.all(ks.map(k => caches.delete(k)))).then(() => {
      localStorage.setItem("ett_cached_version", VERSION);
      location.reload();
    });
  } else {
    localStorage.setItem("ett_cached_version", VERSION);
  }
}

// ── Init ──
render();
</script>
