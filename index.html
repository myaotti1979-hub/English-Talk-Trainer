        <button class="btn btn-ghost mt-8" id="flashBack">戻る</button>
      </div>
    `;
    $("flashRetry").onclick = () => generateFlashQuestions();
    $("flashBack").onclick = () => { srCancel(); S.screen = "home"; render(); };
  }
}

function renderFlashQuestion() {
  const q = S.flashQuestions[S.flashCurrent];
  if (!q) { renderFlashSummary(); return; }
  const progress = ((S.flashCurrent) / S.flashQuestions.length * 100).toFixed(0);
  const isSituation = S.flashCategory === 'situation';
  const isPattern = S.flashCategory === 'pattern';
  const modeTitle = isSituation ? '⚡ Situation Response' : isPattern ? '🔄 Pattern Drill' : 'Flash Translation';
  const promptLabel = isSituation ? '📌 この状況で英語で応答してください' : isPattern ? '🔄 パターンを使って答えてください' : '';

  app.innerHTML = `
    <div class="navbar">
      <button class="back" id="flqBack">←</button>
      <div class="title">${modeTitle}</div>
      <div class="text-xs text-muted">${S.flashCurrent + 1}/${S.flashQuestions.length}</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>

    <div class="card flash-card">
      ${promptLabel ? `<div class="text-xs text-accent mb-8" style="font-weight:600">${promptLabel}</div>` : ''}
      <div class="flash-ja">${esc(q.ja)}</div>
      <div class="flash-hint">💡 ${esc(q.hint || '')}</div>

      <div id="flashInputArea">
        ${srSupported() ? `
        <button class="mic-btn idle" id="flashMic" style="margin:0 auto 16px;display:flex">🎤</button>
        <div class="text-xs text-muted mb-16">${isSituation ? '英語で応答する' : 'タップして英語で答える'}</div>
        ` : ''}
        <div class="flex gap-8">
          <input class="input" id="flashTextInput" placeholder="${isSituation ? 'Respond in English...' : 'Type your answer...'}" autocomplete="off" style="border-radius:24px">
          <button class="btn btn-primary" id="flashSendBtn" style="padding:12px 16px;border-radius:50%;flex-shrink:0">↑</button>
        </div>
      </div>

      <div id="flashResult" class="hidden"></div>
    </div>

    <button class="btn btn-ghost w-full" id="flashSkipBtn">スキップ →</button>
  `;

  $("flqBack").onclick = () => {
    if (confirm("練習を中断しますか？")) { srCancel(); S.screen = "home"; render(); }
  };
  $("flashSkipBtn").onclick = () => {
    S.flashResults.push({ ja: q.ja, en: q.en, userAnswer: "(skipped)", score: 0 });
    S.flashCurrent++;
    renderFlashQuestion();
  };

  const submitAnswer = (text) => evaluateFlashAnswer(text, q);
  $("flashSendBtn").onclick = () => {
    const t = $("flashTextInput")?.value?.trim();
    if (t) submitAnswer(t);
  };
  $("flashTextInput").onkeydown = e => { if (e.key === "Enter") { const t = e.target.value.trim(); if (t) submitAnswer(t); } };

  if ($("flashMic")) {
    $("flashMic").onclick = function() {
      if (_srActive) {
        // Stop recording — deliver result
        $("flashMic").className = "mic-btn processing";
        $("flashMic").textContent = "⏳";
        srStop();  // callback handles result
      } else {
        var started = srStart(function(text) {
          if ($("flashMic")) {
            $("flashMic").className = "mic-btn idle";
            $("flashMic").textContent = "🎤";
          }
          if (text && text.trim()) {
            submitAnswer(text.trim());
          } else {
            // No text recognized — show message
            if ($("flashResult")) {
              $("flashResult").innerHTML = '<div class="text-xs text-muted">音声が認識できませんでした。もう一度お試しください。</div>';
              $("flashResult").classList.remove("hidden");
              setTimeout(function() { if ($("flashResult")) $("flashResult").classList.add("hidden"); }, 2000);
            }
          }
        });
        if (started) {
          $("flashMic").className = "mic-btn recording";
          $("flashMic").textContent = "⏹";
        }
      }
    };
  }

  // Focus input
  setTimeout(() => $("flashTextInput")?.focus(), 100);
}

async function evaluateFlashAnswer(userAnswer, q) {
  // Disable inputs
  if ($("flashMic")) $("flashMic").disabled = true;
  if ($("flashSendBtn")) $("flashSendBtn").disabled = true;
  if ($("flashTextInput")) $("flashTextInput").disabled = true;

  const resultEl = $("flashResult");
  resultEl.classList.remove("hidden");
  resultEl.innerHTML = '<div class="typing" style="justify-content:center"><span></span><span></span><span></span></div>';

  try {
    var evalMode = S.flashCategory === 'situation' ? 'situation' : S.flashCategory === 'pattern' ? 'pattern' : 'translation';
    var evalPrompt;
    if (evalMode === 'situation') {
      evalPrompt = `Evaluate the user's English response to a situation.

Situation (in Japanese): ${q.ja}
Example good response: ${q.en}
${q.alt?.length ? `Other good responses: ${q.alt.join(", ")}` : ""}
User's response: ${userAnswer}

RULES:
- The user does NOT need to match the example exactly
- Any natural, appropriate English response to this situation is correct
- IGNORE capitalization and punctuation
- Evaluate: Is it natural? Appropriate for the situation? Grammatically correct?

JSON response:
{"score": 85, "isCorrect": true, "feedback": "Japanese feedback on naturalness and appropriateness", "correctedVersion": "A polished version of their response"}`;
    } else if (evalMode === 'pattern') {
      evalPrompt = `Evaluate the user's answer in a pattern drill exercise.

Situation: ${q.ja}
Target pattern: ${q.hint}
Example answer: ${q.en}
${q.alt?.length ? `Alternatives: ${q.alt.join(", ")}` : ""}
User's answer: ${userAnswer}

RULES:
- Did the user correctly use the target pattern?
- IGNORE capitalization and punctuation
- The content doesn't need to match exactly, but the PATTERN must be used

JSON response:
{"score": 85, "isCorrect": true, "feedback": "Japanese feedback - did they use the pattern correctly?", "correctedVersion": "Best version using the pattern"}`;
    } else {
      evalPrompt = `Compare the user's English translation with the correct answer.

Japanese: ${q.ja}
Correct answer: ${q.en}
${q.alt?.length ? `Alternative answers: ${q.alt.join(", ")}` : ""}
User's answer: ${userAnswer}

IMPORTANT RULES:
- IGNORE capitalization completely (speech input cannot control capitals)
- IGNORE punctuation (periods, commas, question marks)
- IGNORE minor article differences (a/the) if meaning is clear
- Focus ONLY on: grammar structure, vocabulary choice, word order, and meaning

Evaluate and respond in JSON:
{
  "score": 85,
  "isCorrect": true,
  "feedback": "Brief feedback in Japanese about what was good/wrong (大文字・句読点は評価しないこと)",
  "correctedVersion": "The ideal version if user was wrong, or their version if correct"
}

Scoring guide:
- 95-100: Perfect meaning and grammar
- 80-94: Correct meaning, minor grammar issues
- 60-79: Understandable but significant errors
- 0-59: Major errors or wrong meaning`;
    }

    const raw = await geminiChat([{ role: "user", content: evalPrompt }], "English teacher evaluator. JSON only.", true);
    const ev = safeJSON(raw);

    const scoreColor = ev.score >= 80 ? "var(--green)" : ev.score >= 60 ? "var(--yellow)" : "var(--red)";

    resultEl.innerHTML = `
      <div class="flash-answer">
        <div style="font-size:32px;font-weight:800;color:${scoreColor};margin-bottom:8px">${ev.score}</div>
        <div class="text-sm mb-8"><strong>あなた:</strong> ${esc(userAnswer)}</div>
        <div class="text-sm mb-8"><strong>${S.flashCategory==='situation'?'良い例':S.flashCategory==='pattern'?'パターン例':'模範'}:</strong> <span class="correct">${esc(q.en)}</span></div>
        ${!ev.isCorrect ? `<div class="text-sm mb-8"><strong>修正:</strong> ${esc(ev.correctedVersion)}</div>` : ''}
        <div class="text-xs text-muted">${esc(ev.feedback)}</div>
      </div>
      <button class="btn btn-primary w-full mt-16" id="flashNextBtn">次の問題 →</button>
    `;

    S.flashResults.push({
      ja: q.ja, en: q.en, userAnswer, score: ev.score,
      isCorrect: ev.isCorrect, feedback: ev.feedback
    });

    $("flashNextBtn").onclick = () => { S.flashCurrent++; renderFlashQuestion(); };

    // Speak correct answer
    try { await speakText(q.en, S.ftVoice); } catch(e) { console.warn(e); }

  } catch(e) {
    resultEl.innerHTML = `<div class="text-sm text-red">評価エラー: ${esc(e.message)}</div>
      <button class="btn btn-secondary mt-8" id="flashNextBtn">次へ →</button>`;
    S.flashResults.push({ ja: q.ja, en: q.en, userAnswer, score: 0 });
    $("flashNextBtn").onclick = () => { S.flashCurrent++; renderFlashQuestion(); };
  }
}

function renderFlashSummary() {
  const results = S.flashResults;
  const avg = results.length > 0 ? Math.round(results.reduce((a, r) => a + r.score, 0) / results.length) : 0;
  const perfect = results.filter(r => r.score >= 90).length;
  const good = results.filter(r => r.score >= 60 && r.score < 90).length;
  const poor = results.filter(r => r.score < 60).length;

  S.totalSessions++;
  S.totalMinutes += 5;
  saveSession({
    mode: "flash",
    topic: FLASH_CATEGORIES.find(c => c.id === S.flashCategory)?.label || S.flashCategory,
    level: S.flashLevel, score: avg, minutes: 5, voice: S.ftVoice,
  });
  addToCumulativeCost(calcSessionTotal());
  updateStreak();
  // Save mistakes for review
  results.filter(r => !r.isCorrect && r.userAnswer !== "(skipped)").forEach(r => {
    addMistake({ original: r.userAnswer, corrected: r.en, explanation: r.feedback || "", mode: "flash" });
  });

  const scoreColor = avg >= 80 ? "var(--green)" : avg >= 60 ? "var(--yellow)" : "var(--red)";

  const reviewItems = results.map((r, i) => `
    <div style="padding:12px 0;border-bottom:1px solid var(--border)">
      <div class="flex justify-between items-center">
        <div class="text-sm" style="flex:1">${esc(r.ja)}</div>
        <div class="tag ${r.score>=80?'tag-green':r.score>=60?'tag-orange':'tag-accent'}">${r.score}</div>
      </div>
      ${r.userAnswer !== "(skipped)" ? `<div class="text-xs mt-8" style="color:${r.isCorrect?'var(--green)':'var(--red)'}">🗣️ ${esc(r.userAnswer)}</div>` : '<div class="text-xs mt-8 text-muted">🗣️ スキップ</div>'}
      ${!r.isCorrect ? `<div class="text-xs mt-8" style="color:var(--green)">✅ ${esc(r.en)}</div>` : ''}
      ${r.feedback ? `<div class="text-xs text-muted mt-4">${esc(r.feedback)}</div>` : ''}
    </div>
  `).join("");

  app.innerHTML = `
    <div class="navbar">
      <button class="back" id="fsBck">←</button>
      <div class="title">結果</div>
    </div>

    <div class="summary-header">
      <div class="score" style="color:${scoreColor}">${avg}</div>
      <div class="label">Average Score</div>
    </div>

    <div class="stats-grid mb-16">
      <div class="stat-card"><div class="val text-green">${perfect}</div><div class="lbl">Perfect</div></div>
      <div class="stat-card"><div class="val" style="color:var(--yellow)">${good}</div><div class="lbl">Good</div></div>
    </div>

    <div class="card">
      <div style="font-size:14px;font-weight:600;margin-bottom:12px">📋 全問レビュー</div>
      ${reviewItems}
    </div>

    <button class="btn btn-primary w-full mt-16" id="fsHome">${S.routine.active?"▶ 次へ (Shadowing)":"ホームに戻る"}</button>
    <button class="btn btn-secondary w-full mt-8 mb-16" id="fsAgain">もう10問</button>
  `;
  // Insert cost card
  const fsCostPos = app.querySelector('#fsHome');
  if (fsCostPos) fsCostPos.insertAdjacentHTML('beforebegin', calcCostHTML());
  $("fsBck").onclick = $("fsHome").onclick = () => {
    if (S.routine.active) { S.routine.scores.push(avg); advanceRoutine(); }
    else { S.screen = "home"; render(); }
  };
  $("fsAgain").onclick = () => initFlash();
}

async function extractVocabulary(chatHistory) {
  const userMsgs = chatHistory.filter(m => m.role === "user" && m.content !== "Start the conversation." && m.content !== "Give me a news article to discuss.").map(m => m.content).join("\n");
  if (!userMsgs.trim()) return;
  try {
    const raw = await geminiChat([{ role: "user", content: `From these English sentences the student said, extract 2-3 useful phrases or expressions they used well, or attempted but could be improved. Focus on phrases (2+ words), not single words.

Student said:
${userMsgs}

Return JSON: {"vocab": [{"en": "phrase the student used", "ja": "Japanese meaning", "note": "Good usage / Could be improved: better alternative"}]}` }], "JSON only.", true);
    const data = safeJSON(raw);
    if (data.vocab?.length) addVocabEntries(data.vocab);
  } catch(e) { console.warn("Phrase extract:", e); }
}

async function generateShadowSentences() {
  S.ftVoice = pickVoice("shadow");
  S.cost = { sttSeconds: 0, pronSeconds: 0, ttsChars: 0, geminiInTokens: 0, geminiOutTokens: 0, searchCalls: 0 };
  app.innerHTML = `<div style="text-align:center;padding:80px 0"><div class="typing" style="justify-content:center;margin-bottom:16px"><span></span><span></span><span></span></div><div class="text-sm text-muted">文を生成中...</div></div>`;
  try {
    const lvl = CEFR_LEVELS[S.shadowLevel] || CEFR_LEVELS.B1;
    // Variety seeds for shadowing
    var shTopics = ["旅行の思い出", "仕事の出来事", "友人との会話", "ニュース・時事", "趣味の話", "家族の話", "将来の計画", "食べ物・レストラン", "季節・天気", "映画・音楽", "スポーツ・運動", "テクノロジー", "買い物", "健康", "学校・勉強"];
    var shPicked = shTopics.sort(function(){return Math.random()-0.5;}).slice(0,3);
    const raw = await geminiChat([{ role: "user", content: `Generate 5 natural spoken English sentences for shadowing practice at ${lvl.id} level.
${lvl.shadowRules}

VARIETY: Use these topics: "${shPicked.join('", "')}". Each sentence MUST be about a DIFFERENT topic. Avoid generic textbook sentences. Make them sound like real things people actually say.

Return JSON: {"sentences": [{"en": "sentence", "ja": "Japanese translation"}]}` }], "JSON only.", true);
    S.shadowSentences = safeJSON(raw).sentences || [];
    if (!S.shadowSentences.length) throw new Error("No sentences");
    S.shadowCurrent = 0;
    S.shadowResults = [];
    renderShadowPractice();
  } catch(e) {
    app.innerHTML = `<div class="card" style="text-align:center;padding:32px"><div class="text-sm text-red">${esc(e.message)}</div><button class="btn btn-secondary mt-16" onclick="initShadow()">リトライ</button></div>`;
  }
}

              $("shResult").classList.remove("hidden");
              $("shResult").innerHTML = `
                <div style="font-size:36px;font-weight:800;color:${scoreColor}">${score}</div>
                <div class="stats-grid mt-8">
                  <div class="stat-card"><div class="val text-sm">${Math.round(accScore||0)}</div><div class="lbl">正確さ</div></div>
                  <div class="stat-card"><div class="val text-sm">${Math.round(fluScore||0)}</div><div class="lbl">流暢さ</div></div>
                </div>
                ${wordsHtml || ''}
                <div class="text-xs text-muted mt-8">🟢正確 🟡要改善 🔴不正確 <span style="color:#9ca3af">取消線=未発話</span></div>
                ${S.shadowLastRecordingUrl ? '<button class="btn btn-ghost btn-sm mt-8" id="shPlayMyRec">🎙️ 自分の録音を聞く</button>' : ''}
              `;
              // Bind playback handler immediately after rendering
              if ($("shPlayMyRec")) {
                $("shPlayMyRec").onclick = function() {
                  if (S.shadowLastRecordingUrl) { stopAudio(); _curAudio = new Audio(S.shadowLastRecordingUrl); _curAudio.play().catch(function(){}); }
                };
              }
            } else {
              // Recognition succeeded but no pronunciation scores - show debug info
              var debugKeys = nb ? Object.keys(nb).join(', ') : 'NBest empty';
              S.shadowResults.push({ en: sent.en, score: 0 });
              $("shResult").classList.remove("hidden");
              $("shResult").innerHTML = `
                <div class="text-xs text-muted">認識: ${esc(nb?.Display || result?.DisplayText || '(不明)')}</div>
                <div class="text-xs text-red mt-8">発音評価スコアを取得できませんでした。</div>
                <div class="text-xs text-muted mt-4" style="word-break:break-all">Debug: ${esc(debugKeys)}</div>
              `;
            }
          } catch(e) {
            S.shadowResults.push({ en: sent.en, score: 0 });
            $("shResult").classList.remove("hidden");
            $("shResult").innerHTML = `<div class="text-xs text-red">${esc(e.message)}</div>`;
          }
        }
        $("shNextBtn").classList.remove("hidden");
        $("shRecordBtn").classList.add("hidden");
      };
    } catch(e) { alert("マイクエラー: " + e.message); $("shRecordBtn").disabled = false; }
  };
  $("shNextBtn").onclick = () => { S.shadowCurrent++; renderShadowPractice(); };
}

function renderShadowSummary() {
  const results = S.shadowResults;
  const avg = results.length > 0 ? Math.round(results.reduce((a,r) => a+r.score, 0) / results.length) : 0;
  updateStreak();
  saveSession({ mode: "shadow", topic: "Shadowing", level: S.shadowLevel, score: avg, minutes: 3, voice: S.ftVoice });
  addToCumulativeCost(calcSessionTotal());
  const scoreColor = avg >= 80 ? 'var(--green)' : avg >= 60 ? 'var(--yellow)' : 'var(--red)';

  // Find worst sentence for retry
  var worstIdx = 0;
  results.forEach(function(r, i) { if (r.score < results[worstIdx].score) worstIdx = i; });

  // Build word-level detail per sentence
  var sentCards = results.map(function(r, i) {
    var wordHtml = '';
    if (r.words && r.words.length > 0) {
      wordHtml = '<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:2px 5px;font-size:13px">' +
        r.words.map(function(w) {
          var wpa = w.PronunciationAssessment || w;
          var wacc = wpa.AccuracyScore ?? 0;
          var errType = wpa.ErrorType || 'None';
          var color = errType === 'Omission' ? '#9ca3af' : wacc >= 80 ? '#059669' : wacc >= 50 ? '#f59e0b' : '#dc2626';
          var dec = errType === 'Omission' ? 'line-through' : 'none';
          return '<span style="color:' + color + ';text-decoration:' + dec + ';font-weight:500">' + esc(w.Word || '') + '</span>';
        }).join('') + '</div>';
    }
    return `<div style="padding:12px 0;border-bottom:1px solid var(--border)">
      <div class="flex justify-between items-center">
        <div class="text-sm" style="flex:1;font-weight:500">${esc(r.en)}</div>
        <div style="font-weight:700;font-size:18px;color:${r.score>=80?'var(--green)':r.score>=60?'var(--yellow)':'var(--red)'}; margin-left:8px">${r.score}</div>
      </div>
      <div class="flex gap-8 mt-4" style="font-size:12px;color:var(--muted)">
        <span>正確さ ${r.accuracy||'-'}</span><span>流暢さ ${r.fluency||'-'}</span>
      </div>
      ${wordHtml}
      <button class="btn-ghost text-xs sh-replay mt-4" data-text="${esc(r.en).replace(/"/g,'&quot;')}" style="color:var(--accent)">🔊 お手本を聞く</button>
    </div>`;
  }).join('');

  app.innerHTML = `
    <div class="navbar"><button class="back" id="shsBack">←</button><div class="title">Shadowing 結果</div></div>
    <div class="summary-header"><div class="score" style="color:${scoreColor}">${avg}</div><div class="label">発音スコア平均</div></div>

    <div class="stats-grid mb-16">
      <div class="stat-card"><div class="val" style="color:var(--green)">${results.filter(r=>r.score>=80).length}</div><div class="lbl">Good</div></div>
      <div class="stat-card"><div class="val" style="color:var(--red)">${results.filter(r=>r.score<60).length}</div><div class="lbl">要練習</div></div>
    </div>

    <div class="card" id="shAdviceCard" style="background:#f0fdf4;border-color:#bbf7d0">
      <div class="flex justify-between items-center">
        <div class="text-sm" style="font-weight:600">💡 発音アドバイス</div>
        <button class="btn btn-ghost btn-sm" id="shGetAdvice" style="color:var(--accent);font-size:12px">✨ AI分析（有料）</button>
      </div>
      <div class="text-xs mt-8 text-muted" id="shAdviceText">ボタンを押すとGeminiが弱点を分析します</div>
    </div>

    <div class="card">${sentCards}</div>

    <div class="text-xs text-muted mt-8 mb-4" style="text-align:center">🟢80+ 🟡50-79 🔴50未満 取消線=未発話</div>

    ${results[worstIdx].score < 80 ? `<button class="btn btn-secondary w-full mt-8" id="shRetryWorst">🔄 最低スコアの文をもう一度練習</button>` : ''}

    ${calcCostHTML()}
    <button class="btn btn-primary w-full mt-16" id="shsHome">${S.routine.active?"🎉 ルーティン完了":"ホームに戻る"}</button>
    <button class="btn btn-secondary w-full mt-8 mb-16" id="shsAgain">もう一度（新しい文）</button>
  `;

  $("shsBack").onclick = $("shsHome").onclick = () => {
    if (S.routine.active) { S.routine.scores.push(avg); advanceRoutine(); }
    else { S.screen = "home"; render(); }
  };
  $("shsAgain").onclick = () => initShadow();
  if ($("shRetryWorst")) {
    $("shRetryWorst").onclick = function() {
      // Reset to practice just the worst sentence
      S.shadowSentences = [{ en: results[worstIdx].en, ja: '' }];
      S.shadowCurrent = 0;
      S.shadowResults = [];
      renderShadowPractice();
    };
  }

  // Replay buttons
  document.querySelectorAll(".sh-replay").forEach(function(btn) {
    btn.onclick = function() {
      speakBrowser(this.dataset.text);
    };
  });

  // AI advice button (opt-in, costs money)
  if ($("shGetAdvice")) {
    $("shGetAdvice").onclick = function() {
      this.disabled = true;
      this.textContent = "⏳ 分析中...";
      generatePronAdvice(results);
    };
  }
}

async function generatePronAdvice(results) {
  try {
    var summary = results.map(function(r) {
      var weakWords = (r.words || []).filter(function(w) {
        var pa = w.PronunciationAssessment || w;
        return (pa.AccuracyScore ?? 100) < 70;
      }).map(function(w) { return w.Word; });
      return r.en + ' (score:' + r.score + ', weak:' + (weakWords.join(',') || 'none') + ')';
    }).join('\n');

    var raw = await geminiChat([{ role: "user", content: `You are a pronunciation coach for a Japanese English learner.

Their shadowing results:
${summary}

Give 2-3 specific, actionable pronunciation tips in Japanese based on their weak words.
Focus on sounds Japanese speakers commonly struggle with (th/s, r/l, v/b, f, w, vowel length).
Keep each tip under 40 characters. Be encouraging.
Return ONLY the tips, one per line. No numbering.` }], "短い日本語アドバイスのみ。", true);

    if ($("shAdviceText")) {
      $("shAdviceText").innerHTML = raw.split('\n').filter(function(l){return l.trim();}).map(function(l){ return '• ' + esc(l.trim()); }).join('<br>');
    }
  } catch(e) {
    if ($("shAdviceText")) $("shAdviceText").textContent = "アドバイスを生成できませんでした";
  }
}

// ═══════════════════════════════════
// REVIEW QUIZ
// ═══════════════════════════════════
function renderReviewQuiz() {
  const queue = getReviewQueue();
  if (queue.length === 0) {
    app.innerHTML = `<div class="navbar"><button class="back" id="rqBack">←</button><div class="title">復習</div></div>
      <div class="card" style="text-align:center;padding:40px"><div style="font-size:32px;margin-bottom:12px">✅</div><div class="text-sm">復習する問題はありません</div></div>
      <button class="btn btn-primary w-full mt-16" id="rqHome">ホームに戻る</button>`;
    $("rqBack").onclick = $("rqHome").onclick = () => { S.screen = "home"; render(); };
    return;
  }
  const all = getMistakes();
  let currentIdx = 0;
  function showQuestion(i) {
    if (i >= queue.length) { S.screen = "home"; render(); return; }
    const m = queue[i];
    const realIdx = all.findIndex(x => x.original === m.original && x.corrected === m.corrected);
    app.innerHTML = `
      <div class="navbar"><button class="back" id="rqBack">←</button><div class="title">復習 ${i+1}/${queue.length}</div></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${(i/queue.length*100).toFixed(0)}%"></div></div>
      <div class="card" style="padding:28px">
        <div class="text-xs text-muted mb-8">あなたが言った文:</div>
        <div class="text-sm text-red" style="font-weight:600">${esc(m.original)}</div>
        <div class="divider"></div>
        <div class="text-xs text-muted mb-8">正しい表現:</div>
        <div class="text-sm text-green" style="font-weight:600">${esc(m.corrected)}</div>
        <div class="text-xs text-muted mt-16">${esc(m.explanation || '')}</div>
      </div>
      <div class="flex gap-8">
        <button class="btn btn-secondary w-full" id="rqHard">😓 まだ覚えてない</button>
        <button class="btn btn-primary w-full" id="rqEasy">✅ 覚えた！</button>
      </div>
    `;
    $("rqBack").onclick = () => { S.screen = "home"; render(); };
    $("rqHard").onclick = () => showQuestion(i + 1);
    $("rqEasy").onclick = () => { if (realIdx >= 0) markReviewed(realIdx); showQuestion(i + 1); };
  }
  showQuestion(0);
}

// ═══════════════════════════════════
// VOCABULARY NOTEBOOK
// ═══════════════════════════════════
function renderVocabNotebook() {
  const vocab = getVocabNotebook().slice().reverse();
  app.innerHTML = `
    <div class="navbar">
      <button class="back" id="vnBack">←</button>
      <div class="title">📚 フレーズ集 (${vocab.length})</div>
    </div>
    ${vocab.length === 0 ? '<div class="card" style="text-align:center;padding:40px"><div class="text-sm text-muted">Free Talkを始めると、あなたが使ったフレーズが自動記録されます</div></div>' :
    vocab.map((v, i) => `<div class="card" style="padding:14px 16px;margin-bottom:8px">
      <div class="flex justify-between items-center">
        <div class="vocab-en" style="flex:1">${esc(v.en)}</div>
        <button class="btn-ghost text-xs vn-del" data-idx="${i}" style="color:var(--red);padding:4px 8px;font-size:18px">✕</button>
      </div>
      <div class="vocab-ja">${esc(v.ja)}</div>
      ${(v.note||v.context) ? `<div class="vocab-ctx">${esc(v.note||v.context)}</div>` : ''}
      ${v.example ? `
        <div style="margin-top:8px;padding:10px 12px;background:#f0fdf4;border-radius:10px;font-size:14px;color:#065f46">
          <div>📝 ${esc(v.example)}</div>
          <button class="btn-ghost text-xs vn-speak" data-text="${esc(v.example).replace(/"/g,'&quot;')}" style="margin-top:6px;color:var(--accent)">🔊 再生</button>
        </div>
      ` : `
        <button class="btn-ghost text-xs vn-gen" data-idx="${i}" style="margin-top:8px;color:var(--accent)">✨ 例文を生成</button>
      `}
    </div>`).join('')}
    ${vocab.length > 0 ? `<button class="btn btn-ghost w-full mt-16 mb-16" id="vnClear" style="color:var(--red)">🗑️ すべてクリア</button>` : ''}
  `;
  $("vnBack").onclick = () => { S.screen = "home"; render(); };
  if ($("vnClear")) $("vnClear").onclick = () => { if(confirm("フレーズ集をすべてクリアしますか？")) { localStorage.removeItem("ett_vocab"); renderVocabNotebook(); } };

  // Individual delete
  document.querySelectorAll(".vn-del").forEach(btn => {
    btn.onclick = function() {
      if (confirm("このフレーズを削除しますか？")) {
        deleteVocabEntry(parseInt(this.dataset.idx));
        renderVocabNotebook();
      }
    };
  });

  // Generate example sentence
  document.querySelectorAll(".vn-gen").forEach(btn => {
    btn.onclick = async function() {
      var idx = parseInt(this.dataset.idx);
      var v = vocab[idx];
      this.textContent = "⏳ 生成中...";
      this.disabled = true;
      try {
        var raw = await geminiChat([{ role: "user", content: `Create one natural English example sentence using the phrase "${v.en}". Keep it simple and practical. Return ONLY the sentence, no quotes, no explanation.` }], "Return only the example sentence.");
        var example = raw.trim().replace(/^["']|["']$/g, '');
        updateVocabEntry(idx, { example: example });
        renderVocabNotebook();
      } catch(e) {
        this.textContent = "❌ 失敗 — リトライ";
        this.disabled = false;
      }
    };
  });

  // Speak example
  document.querySelectorAll(".vn-speak").forEach(btn => {
    btn.onclick = function() {
      var text = this.dataset.text;
      if (!text) return;
      if (window.speechSynthesis) {
        speechSynthesis.cancel();
        var u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US';
        u.rate = 0.9;
        speechSynthesis.speak(u);
      }
    };
  });
}

}

// ── Service Worker + 強制更新 ──
if ('serviceWorker' in navigator) {
  const cachedVer = localStorage.getItem("ett_cached_version");

  // Strip cache-bust query if present
  if (location.search.includes('_cb=')) {
    history.replaceState(null, '', location.pathname);
  }

  if (cachedVer && cachedVer !== VERSION) {
    console.log(`Version mismatch: ${cachedVer} → ${VERSION}, clearing caches`);
    // Unregister old SWs + clear all caches, then re-register new SW
    navigator.serviceWorker.getRegistrations().then(regs => {
      return Promise.all(regs.map(r => r.unregister()));
    }).then(() => {
      return caches.keys().then(ks => Promise.all(ks.map(k => caches.delete(k))));
    }).then(() => {
      // Register fresh SW (current page already has new version - no reload needed)
      localStorage.setItem("ett_cached_version", VERSION);
      return navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' });
    }).catch(() => {
      localStorage.setItem("ett_cached_version", VERSION);
    });
  } else {
    localStorage.setItem("ett_cached_version", VERSION);
    navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' }).then(reg => {
      reg.update().catch(() => {});
    }).catch(() => {});
  }
}

// ── Init ──
render();
</script>
